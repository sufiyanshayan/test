<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form to Gmail</title>

<style>
body{
    font-family: Arial;
    background:#0f0c29;
    color:white;
    display:flex;
    justify-content:center;
}

.container{
    width:360px;
    padding:20px;
}

.box{
    background:#1a1a2e;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    background:#ff00cc;
    border:none;
    border-radius:10px;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="box">
<h3>Submit Your Links</h3>

<form id="form">

<input type="email" id="email" placeholder="Your Email" required>
<input type="text" id="facebook" placeholder="Facebook">
<input type="text" id="instagram" placeholder="Instagram">
<input type="text" id="tiktok" placeholder="TikTok">
<input type="text" id="website" placeholder="Website">

<button type="submit">Submit</button>

</form>
</div>

<!-- LOGIN -->
<div class="box">
<h3>Login</h3>

<input type="text" id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>

</div>

<script>
// login system
const users = {
    "admin":"1234",
    "user1":"1111"
};

function login(){
    let u = document.getElementById("loginUser").value;
    let p = document.getElementById("loginPass").value;

    if(users[u] && users[u] === p){
        localStorage.setItem("user", u);
        alert("Login Success");
    } else {
        alert("Wrong login");
    }
}

function logout(){
    localStorage.removeItem("user");
}

// form submit
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    if(!localStorage.getItem("user")){
        alert("Login first!");
        return;
    }

    let email = document.getElementById("email").value;
    let fb = document.getElementById("facebook").value;
    let ig = document.getElementById("instagram").value;
    let tt = document.getElementById("tiktok").value;
    let web = document.getElementById("website").value;

    let body =
`New Submission:

User Email: ${email}

Facebook: ${fb}
Instagram: ${ig}
TikTok: ${tt}
Website: ${web}
`;

    let gmailURL = `https://mail.google.com/mail/?view=cm&fs=1&to=YOUR_EMAIL@gmail.com&su=New Submission&body=${encodeURIComponent(body)}`;

    window.open(gmailURL, "_blank");
});
</script>

</body>
</html>
