<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>রিকুয়েস্ট ফর্ম - প্রোফাইল সাবমিট</title>

<!-- EmailJS CDN -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<!-- ইউজার ডাটাবেস আলাদা ফাইল থেকে লোড -->
<script src="database.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 500px;
    width: 100%;
    margin: 0 auto;
}

.box {
    background: rgba(26, 26, 46, 0.95);
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

h3 {
    text-align: center;
    margin-bottom: 20px;
    color: #ff00cc;
    font-size: 20px;
}

label {
    font-size: 13px;
    display: block;
    margin-top: 12px;
    margin-bottom: 5px;
    color: #ccc;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 5px 0;
    border: none;
    border-radius: 10px;
    background: #0f0c29;
    color: white;
    font-size: 14px;
    border: 1px solid rgba(255,255,255,0.1);
}

textarea {
    resize: vertical;
    min-height: 60px;
    font-family: inherit;
}

button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, #ff00cc, #3333ff);
    border: none;
    border-radius: 12px;
    color: white;
    margin-top: 20px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s;
}

button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(255, 0, 204, 0.4);
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

.login-btn {
    background: linear-gradient(90deg, #00ccff, #0099cc);
}

.logout-btn {
    background: linear-gradient(90deg, #ff4444, #cc0000);
    margin-top: 10px;
}

.status {
    text-align: center;
    margin-top: 12px;
    padding: 10px;
    border-radius: 10px;
    font-size: 13px;
}

.status-success {
    background: rgba(0,204,136,0.2);
    color: #00ffaa;
}

.status-error {
    background: rgba(255,68,68,0.2);
    color: #ff8888;
}

.status-info {
    background: rgba(0,204,255,0.2);
    color: #00ccff;
}

.loading {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #fff;
    border-radius: 50%;
    border-top-color: transparent;
    animation: spin 0.6s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">

<!-- লগইন বক্স -->
<div class="box">
    <h3>🔑 লগইন করুন</h3>
    <input type="text" id="loginUser" placeholder="ইউজারনেম">
    <input type="password" id="loginPass" placeholder="পাসওয়ার্ড">
    <button class="login-btn" onclick="login()">লগইন</button>
    <button class="logout-btn" id="logoutBtn" onclick="logout()" disabled>লগআউট</button>
    <div id="loginStatus" class="status"></div>
</div>

<!-- ফর্ম বক্স -->
<div class="box">
    <h3>📋 আপনার তথ্য জমা দিন</h3>

    <label>📧 1. Your Email</label>
    <input type="email" id="yourEmail" placeholder="example@gmail.com">

    <label>👤 2. Your Username</label>
    <input type="text" id="yourUsername" placeholder="john_doe">

    <label>🖼️ 3. Your Profile Picture Link</label>
    <input type="url" id="profilePic" placeholder="https://example.com/photo.jpg">

    <label>📘 4. Your Facebook Username</label>
    <input type="text" id="fbUsername" placeholder="johndoe">

    <label>📘 5. Your Facebook Page Username</label>
    <input type="text" id="fbPageUsername" placeholder="johndoepage">

    <label>📷 6. Your Instagram Username</label>
    <input type="text" id="igUsername" placeholder="@johndoe">

    <label>💬 7. Your WhatsApp Number</label>
    <input type="tel" id="whatsapp" placeholder="+8801XXXXXXXXX">

    <label>🎵 8. Your TikTok Username</label>
    <input type="text" id="tiktok" placeholder="@johndoe">

    <label>✈️ 9. Your Telegram Username</label>
    <input type="text" id="telegram" placeholder="@johndoe">

    <label>🐦 10. Your Twitter (X) Username</label>
    <input type="text" id="twitter" placeholder="@johndoe">

    <label>📞 11. Your Phone Number</label>
    <input type="tel" id="phone" placeholder="+8801XXXXXXXXX">

    <label>📝 12. Your About</label>
    <textarea id="about" placeholder="নিজের সম্পর্কে কিছু লিখুন..."></textarea>

    <label>🌐 13. Your Website Link</label>
    <input type="url" id="website" placeholder="https://yourwebsite.com">

    <button type="button" id="submitBtn" onclick="sendEmailDirect()" disabled>🚀 সাবমিট করুন</button>

    <div id="formStatus" class="status"></div>
</div>

</div>

<script>
// ==============================================
// 🔐 EmailJS কনফিগারেশন
// ==============================================
const EMAILJS_PUBLIC_KEY = "YOUR_PUBLIC_KEY";
const EMAILJS_SERVICE_ID = "YOUR_SERVICE_ID";
const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID";
const RECEIVER_EMAIL = "your_email@outlook.com";

// EmailJS Initialize
if (EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
    emailjs.init(EMAILJS_PUBLIC_KEY);
}
// ==============================================

let currentUser = null;
let logoutTimer = null;

// ফরম্যাট সময়
function getFormattedTime() {
    let now = new Date();
    let day = String(now.getDate()).padStart(2, '0');
    let month = String(now.getMonth() + 1).padStart(2, '0');
    let year = now.getFullYear();
    let hours = now.getHours();
    let minutes = String(now.getMinutes()).padStart(2, '0');
    let seconds = String(now.getSeconds()).padStart(2, '0');
    let ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12;
    let formattedHours = String(hours).padStart(2, '0');
    
    return `${day}/${month}/${year} ${formattedHours}:${minutes}:${seconds} ${ampm}`;
}

// অটো লগআউট
function startAutoLogoutTimer() {
    if (logoutTimer) clearTimeout(logoutTimer);
    logoutTimer = setTimeout(function() {
        if (currentUser) {
            logout();
            const statusDiv = document.getElementById("loginStatus");
            statusDiv.innerHTML = '<div class="status-info">⏰ 1 মিনিট নিষ্ক্রিয়তার কারণে লগআউট হয়েছে</div>';
            setTimeout(() => {
                if (statusDiv.innerHTML.includes('লগআউট')) statusDiv.innerHTML = '';
            }, 3000);
        }
    }, 60000);
}

function resetAutoLogoutTimer() {
    if (currentUser) startAutoLogoutTimer();
}

function trackUserActivity() {
    const events = ['click', 'keypress', 'scroll', 'mousemove', 'touchstart'];
    events.forEach(event => {
        document.addEventListener(event, resetAutoLogoutTimer);
    });
}

// UI আপডেট
function updateUI() {
    const submitBtn = document.getElementById("submitBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const formStatus = document.getElementById("formStatus");
    
    if (currentUser) {
        submitBtn.disabled = false;
        logoutBtn.disabled = false;
        formStatus.innerHTML = `<div class="status-success">✅ লগইন করেছেন: ${currentUser}</div>`;
        startAutoLogoutTimer();
        trackUserActivity();
    } else {
        submitBtn.disabled = true;
        logoutBtn.disabled = true;
        formStatus.innerHTML = '<div class="status-error">🔒 ফর্ম জমা দিতে লগইন করুন</div>';
        if (logoutTimer) clearTimeout(logoutTimer);
    }
}

// লগইন - এখানে আলাদা database.js ফাইল ব্যবহার করা হচ্ছে
function login() {
    let u = document.getElementById("loginUser").value.trim();
    let p = document.getElementById("loginPass").value.trim();
    let statusDiv = document.getElementById("loginStatus");

    if (!u || !p) {
        statusDiv.innerHTML = '<div class="status-error">❌ ইউজারনেম ও পাসওয়ার্ড দিন</div>';
        setTimeout(() => { if(statusDiv.innerHTML.includes('দিন')) statusDiv.innerHTML = ''; }, 3000);
        return;
    }

    // database.js থেকে checkLogin ফাংশন ব্যবহার
    if (typeof checkLogin !== 'undefined' && checkLogin(u, p)) {
        currentUser = u;
        updateUI();
        statusDiv.innerHTML = `<div class="status-success">✅ লগইন সফল! স্বাগতম ${u}</div>`;
        document.getElementById("loginUser").value = "";
        document.getElementById("loginPass").value = "";
        
        setTimeout(() => { if(statusDiv.innerHTML.includes('সফল')) statusDiv.innerHTML = ''; }, 3000);
    } else {
        statusDiv.innerHTML = '<div class="status-error">❌ ভুল ইউজারনাম বা পাসওয়ার্ড</div>';
        setTimeout(() => { if(statusDiv.innerHTML.includes('ভুল')) statusDiv.innerHTML = ''; }, 3000);
    }
}

function logout() {
    currentUser = null;
    if (logoutTimer) clearTimeout(logoutTimer);
    updateUI();
    const statusDiv = document.getElementById("loginStatus");
    statusDiv.innerHTML = '<div class="status-success">🚪 লগআউট হয়েছে</div>';
    setTimeout(() => { if(statusDiv.innerHTML.includes('লগআউট')) statusDiv.innerHTML = ''; }, 2000);
}

// ইমেইল বডি তৈরি
function createEmailBody() {
    let yourEmail = document.getElementById("yourEmail").value || "—";
    let yourUsername = document.getElementById("yourUsername").value || "—";
    let profilePic = document.getElementById("profilePic").value || "—";
    let fbUsername = document.getElementById("fbUsername").value || "—";
    let fbPageUsername = document.getElementById("fbPageUsername").value || "—";
    let igUsername = document.getElementById("igUsername").value || "—";
    let whatsapp = document.getElementById("whatsapp").value || "—";
    let tiktok = document.getElementById("tiktok").value || "—";
    let telegram = document.getElementById("telegram").value || "—";
    let twitter = document.getElementById("twitter").value || "—";
    let phone = document.getElementById("phone").value || "—";
    let about = document.getElementById("about").value || "—";
    let website = document.getElementById("website").value || "—";
    
    let submissionTime = getFormattedTime();
    
    return `
📋 রিকুয়েস্ট ফর্ম ডাটা
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

1. Your_Email : ${yourEmail}
2. Your_Username : ${yourUsername}
3. Your_Profile_Picture_Link : ${profilePic}
4. Your_Facebook_Username : ${fbUsername}
5. Your_Facebook_Page_Username : ${fbPageUsername}
6. Your_Instagram_Username : ${igUsername}
7. Your_WhatsApp_Number : ${whatsapp}
8. Your_TikTok_Username : ${tiktok}
9. Your_Telegram_Username : ${telegram}
10. Your_Twitter_Username : ${twitter}
11. Your_Phone_Number : ${phone}
12. Your_About : ${about}
13. Your_Website_Link : ${website}
14. Logged_In_User_Info : ইউজারনেম: ${currentUser}
15. Submission Time : ${submissionTime}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
`;
}

// ইমেইল পাঠানো
async function sendEmailDirect() {
    if (!currentUser) {
        alert("❌ ফর্ম জমা দিতে লগইন করুন!");
        return;
    }
    
    let yourEmail = document.getElementById("yourEmail").value;
    if (!yourEmail || !yourEmail.includes('@')) {
        alert("❌ সঠিক ইমেইল এড্রেস দিন!");
        return;
    }
    
    if (EMAILJS_PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
        alert("⚠️ দয়া করে EmailJS এ রেজিস্টার করে নিচের তথ্য পূরণ করুন!");
        return;
    }
    
    const formStatus = document.getElementById("formStatus");
    const emailBody = createEmailBody();
    const submitTime = getFormattedTime();
    
    formStatus.innerHTML = '<div class="status-info"><span class="loading"></span> ইমেইল পাঠানো হচ্ছে...</div>';
    
    const templateParams = {
        to_email: RECEIVER_EMAIL,
        from_email: yourEmail,
        username: document.getElementById("yourUsername").value || "—",
        form_data: emailBody,
        submit_time: submitTime,
        sender_name: currentUser
    };
    
    try {
        const response = await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
        console.log("Success:", response);
        formStatus.innerHTML = '<div class="status-success">✅ ইমেইল সফলভাবে পাঠানো হয়েছে!</div>';
        
        setTimeout(() => {
            if (formStatus.innerHTML.includes('সফলভাবে')) {
                formStatus.innerHTML = '<div class="status-success">✅ ধন্যবাদ! ফর্ম জমা নেওয়া হয়েছে।</div>';
            }
        }, 5000);
        
        resetAutoLogoutTimer();
        
    } catch(error) {
        console.error("Error:", error);
        formStatus.innerHTML = '<div class="status-error">❌ ইমেইল পাঠাতে ব্যর্থ হয়েছে। আবার চেষ্টা করুন।</div>';
    }
}

// পেজ লোড
window.onload = function() {
    updateUI();
};
</script>

</body>
</html>
