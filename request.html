<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Form</title>

<style>
body{
    font-family: Arial;
    background:#0f0c29;
    color:white;
    display:flex;
    justify-content:center;
}

.container{
    width:360px;
    padding:20px;
}

.box{
    background:#1a1a2e;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    background:#ff00cc;
    border:none;
    border-radius:10px;
    color:white;
    margin-top:8px;
}

.disabled{
    opacity:0.5;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="box" id="formBox">
<h3>Submit Your Links</h3>

<form id="form">

<input type="email" id="email" placeholder="Your Email" required>
<input type="text" id="profile" placeholder="Profile Picture Link">

<input type="text" id="facebook" placeholder="Facebook">
<input type="text" id="instagram" placeholder="Instagram">
<input type="text" id="tiktok" placeholder="TikTok">
<input type="text" id="website" placeholder="Website">

<button type="submit">Submit</button>

</form>

<p id="msg"></p>
</div>

<!-- LOGIN -->
<div class="box">
<h3>Login</h3>

<input type="text" id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>

</div>

<script>
// USER DATABASE
const users = {
    "admin":"1234",
    "user1":"1111",
    "user2":"2222"
};

// form disable by default
const formBox = document.getElementById("formBox");

function checkLogin(){
    if(!localStorage.getItem("user")){
        formBox.classList.add("disabled");
    } else {
        formBox.classList.remove("disabled");
    }
}

// LOGIN
function login(){
    let u = document.getElementById("loginUser").value.trim();
    let p = document.getElementById("loginPass").value.trim();

    if(users[u] && users[u] === p){
        localStorage.setItem("user", u);
        document.getElementById("msg").innerText = "Login Successful ✅";
        checkLogin();
    } else {
        document.getElementById("msg").innerText = "Wrong Login ❌";
    }
}

// LOGOUT
function logout(){
    localStorage.removeItem("user");
    document.getElementById("msg").innerText = "Logged out";
    checkLogin();
}

// SUBMIT CONTROL
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let user = localStorage.getItem("user");

    if(!user){
        document.getElementById("msg").innerText = "Login required ❌";
        return;
    }

    let email = document.getElementById("email").value;
    let facebook = document.getElementById("facebook").value;
    let instagram = document.getElementById("instagram").value;

    let body = `
User: ${user}
Email: ${email}

Facebook: ${facebook}
Instagram: ${instagram}
`;

    let url = `https://mail.google.com/mail/?view=cm&fs=1&to=YOUR_EMAIL@gmail.com&su=Submission&body=${encodeURIComponent(body)}`;

    window.open(url, "_blank");
});

// run on load
checkLogin();
</script>

</body>
</html>
