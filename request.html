<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>রিকুয়েস্ট ফর্ম - প্রোফাইল সাবমিট</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 500px;
    width: 100%;
    margin: 0 auto;
}

.box {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
}

h3 {
    text-align: center;
    margin-bottom: 20px;
    color: #667eea;
    font-size: 20px;
}

label {
    font-size: 13px;
    display: block;
    margin-top: 12px;
    margin-bottom: 5px;
    color: #333;
    font-weight: 500;
}

.label-icon {
    width: 18px;
    height: 18px;
    vertical-align: middle;
    margin-right: 8px;
    filter: brightness(0) saturate(100%) invert(27%) sepia(51%) saturate(2878%) hue-rotate(230deg) brightness(92%) contrast(92%);
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 5px 0;
    border: none;
    border-radius: 10px;
    background: #f0f0f5;
    color: #333;
    font-size: 14px;
    border: 1px solid #e0e0e0;
    transition: all 0.3s;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    background: white;
}

textarea {
    resize: vertical;
    min-height: 60px;
    font-family: inherit;
}

button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, #667eea, #764ba2);
    border: none;
    border-radius: 12px;
    color: white;
    margin-top: 20px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s;
}

button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

.login-btn {
    background: linear-gradient(90deg, #00b4db, #0083b0);
}

.logout-btn {
    background: linear-gradient(90deg, #ff6b6b, #ee5a5a);
    margin-top: 10px;
}

.status {
    text-align: center;
    margin-top: 12px;
    padding: 10px;
    border-radius: 10px;
    font-size: 13px;
}

.status-success {
    background: rgba(0, 200, 100, 0.15);
    color: #00a86b;
    border: 1px solid rgba(0, 200, 100, 0.3);
}

.status-error {
    background: rgba(255, 68, 68, 0.15);
    color: #d63031;
    border: 1px solid rgba(255, 68, 68, 0.3);
}

.status-info {
    background: rgba(102, 126, 234, 0.15);
    color: #667eea;
    border: 1px solid rgba(102, 126, 234, 0.3);
}

/* ইমোজি রঙিন করার জন্য */
label:has(.emoji-only) {
    display: flex;
    align-items: center;
}

.emoji-icon {
    font-size: 16px;
    margin-right: 8px;
}
</style>
</head>

<body>

<div class="container">

<!-- লগইন বক্স -->
<div class="box">
    <h3>🔑 লগইন করুন</h3>
    <input type="text" id="loginUser" placeholder="ইউজারনেম">
    <input type="password" id="loginPass" placeholder="পাসওয়ার্ড">
    <button class="login-btn" onclick="login()">লগইন</button>
    <button class="logout-btn" id="logoutBtn" onclick="logout()" disabled>লগআউট</button>
    <div id="loginStatus" class="status"></div>
</div>

<!-- ফর্ম বক্স -->
<div class="box">
    <h3>📋 আপনার তথ্য জমা দিন</h3>

    <!-- 1. Your Email - ইমোজি -->
    <label><span class="emoji-icon">📧</span> 1. Your Email</label>
    <input type="email" id="yourEmail" placeholder="example@gmail.com">

    <!-- 2. Your Username - ইমোজি -->
    <label><span class="emoji-icon">👤</span> 2. Your Username</label>
    <input type="text" id="yourUsername" placeholder="john_doe">

    <!-- 3. Your Profile Picture Link - ইমোজি -->
    <label><span class="emoji-icon">🖼️</span> 3. Your Profile Picture Link</label>
    <input type="url" id="profilePic" placeholder="https://example.com/photo.jpg">

    <!-- 4. Your Facebook Username - সাদা আইকন -->
    <label><img src="https://cdn.simpleicons.org/facebook/667eea" class="label-icon" alt="facebook"> 4. Your Facebook Username</label>
    <input type="text" id="fbUsername" placeholder="johndoe">

    <!-- 5. Your Facebook Page Username - সাদা আইকন -->
    <label><img src="https://cdn.simpleicons.org/facebook/667eea" class="label-icon" alt="facebook page"> 5. Your Facebook Page Username</label>
    <input type="text" id="fbPageUsername" placeholder="johndoepage">

    <!-- 6. Your Instagram Username - সাদা আইকন -->
    <label><img src="https://cdn.simpleicons.org/instagram/667eea" class="label-icon" alt="instagram"> 6. Your Instagram Username</label>
    <input type="text" id="igUsername" placeholder="@johndoe">

    <!-- 7. Your WhatsApp Number - সাদা আইকন -->
    <label><img src="https://cdn.simpleicons.org/whatsapp/25D366" class="label-icon" alt="whatsapp"> 7. Your WhatsApp Number</label>
    <input type="tel" id="whatsapp" placeholder="+8801XXXXXXXXX">

    <!-- 8. Your TikTok Username - সাদা আইকন -->
    <label><img src="https://cdn.simpleicons.org/tiktok/667eea" class="label-icon" alt="tiktok"> 8. Your TikTok Username</label>
    <input type="text" id="tiktok" placeholder="@johndoe">

    <!-- 9. Your Telegram Username - সাদা আইকন -->
    <label><img src="https://cdn.simpleicons.org/telegram/26A5E4" class="label-icon" alt="telegram"> 9. Your Telegram Username</label>
    <input type="text" id="telegram" placeholder="@johndoe">

    <!-- 10. Your Twitter (X) Username - সাদা আইকন -->
    <label><img src="https://cdn.simpleicons.org/x/667eea" class="label-icon" alt="twitter"> 10. Your Twitter (X) Username</label>
    <input type="text" id="twitter" placeholder="@johndoe">

    <!-- 11. Your Phone Number - ফোন আইকন -->
    <label><img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" class="label-icon" alt="phone" style="filter: brightness(0) saturate(100%) invert(42%) sepia(84%) saturate(1236%) hue-rotate(230deg) brightness(95%) contrast(90%);"> 11. Your Phone Number</label>
    <input type="tel" id="phone" placeholder="880XXXXXXXXX">

    <!-- 12. Your About - আইকন -->
    <label><img src="https://cdn.simpleicons.org/aboutdotme/667eea" class="label-icon" alt="about"> 12. Your About</label>
    <textarea id="about" placeholder="নিজের সম্পর্কে কিছু লিখুন..."></textarea>

    <!-- 13. Your Website Link - ওয়েবসাইট আইকন -->
    <label><img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png" class="label-icon" alt="website" style="filter: brightness(0) saturate(100%) invert(42%) sepia(84%) saturate(1236%) hue-rotate(230deg) brightness(95%) contrast(90%);"> 13. Your Website Link</label>
    <input type="url" id="website" placeholder="https://yourwebsite.com">

    <button type="button" id="submitBtn" onclick="sendEmail()" disabled>🚀 সাবমিট করুন</button>

    <div id="formStatus" class="status"></div>
</div>

</div>

<script>
// ==============================================
// 🔐 আপনার ইমেইল এখানে দিন
// ==============================================
const RECEIVER_EMAIL = "inyt_444@outlook.com";  // <-- এখানে আপনার ইমেইল দিন
// ==============================================

// এনক্রিপশন
function encrypt(pwd) {
    return btoa(pwd.split('').reverse().join('') + 'fix2026');
}

function decrypt(encrypted) {
    try {
        let dec = atob(encrypted);
        return dec.slice(0, -7).split('').reverse().join('');
    } catch(e) { return ''; }
}

// ইউজার ডাটাবেস
let users = {};

function loadUsers() {
    let stored = localStorage.getItem('secure_users');
    if (stored) {
        users = JSON.parse(stored);
    } else {
        users = {
            "admin": encrypt("1234"),
            "user1": encrypt("1111"),
            "user2": encrypt("2222")
        };
        saveUsers();
    }
}

function saveUsers() {
    localStorage.setItem('secure_users', JSON.stringify(users));
}

loadUsers();

let currentUser = null;
let logoutTimer = null;

function getFormattedTime() {
    let now = new Date();
    let day = String(now.getDate()).padStart(2, '0');
    let month = String(now.getMonth() + 1).padStart(2, '0');
    let year = now.getFullYear();
    let hours = now.getHours();
    let minutes = String(now.getMinutes()).padStart(2, '0');
    let seconds = String(now.getSeconds()).padStart(2, '0');
    let ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12;
    let formattedHours = String(hours).padStart(2, '0');
    
    return `${day}/${month}/${year} ${formattedHours}:${minutes}:${seconds} ${ampm}`;
}

function startAutoLogoutTimer() {
    if (logoutTimer) clearTimeout(logoutTimer);
    logoutTimer = setTimeout(function() {
        if (currentUser) {
            logout();
            const statusDiv = document.getElementById("loginStatus");
            statusDiv.innerHTML = '<div class="status-info">⏰ 1 মিনিট নিষ্ক্রিয়তার কারণে লগআউট হয়েছে</div>';
            setTimeout(() => {
                if (statusDiv.innerHTML.includes('লগআউট')) statusDiv.innerHTML = '';
            }, 3000);
        }
    }, 60000);
}

function resetAutoLogoutTimer() {
    if (currentUser) startAutoLogoutTimer();
}

function trackUserActivity() {
    const events = ['click', 'keypress', 'scroll', 'mousemove', 'touchstart'];
    events.forEach(event => {
        document.addEventListener(event, resetAutoLogoutTimer);
    });
}

function updateUI() {
    const submitBtn = document.getElementById("submitBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const formStatus = document.getElementById("formStatus");
    
    if (currentUser) {
        submitBtn.disabled = false;
        logoutBtn.disabled = false;
        formStatus.innerHTML = `<div class="status-success">✅ লগইন করেছেন: ${currentUser}</div>`;
        startAutoLogoutTimer();
        trackUserActivity();
    } else {
        submitBtn.disabled = true;
        logoutBtn.disabled = true;
        formStatus.innerHTML = '<div class="status-error">🔒 ফর্ম জমা দিতে লগইন করুন</div>';
        if (logoutTimer) clearTimeout(logoutTimer);
    }
}

function login() {
    let u = document.getElementById("loginUser").value.trim();
    let p = document.getElementById("loginPass").value.trim();
    let statusDiv = document.getElementById("loginStatus");

    if (!u || !p) {
        statusDiv.innerHTML = '<div class="status-error">❌ ইউজারনেম ও পাসওয়ার্ড দিন</div>';
        setTimeout(() => { if(statusDiv.innerHTML.includes('দিন')) statusDiv.innerHTML = ''; }, 3000);
        return;
    }

    if (users[u] && decrypt(users[u]) === p) {
        currentUser = u;
        updateUI();
        statusDiv.innerHTML = `<div class="status-success">✅ লগইন সফল! স্বাগতম ${u}</div>`;
        document.getElementById("loginUser").value = "";
        document.getElementById("loginPass").value = "";
        
        setTimeout(() => { if(statusDiv.innerHTML.includes('সফল')) statusDiv.innerHTML = ''; }, 3000);
    } else {
        statusDiv.innerHTML = '<div class="status-error">❌ ভুল ইউজারনাম বা পাসওয়ার্ড</div>';
        setTimeout(() => { if(statusDiv.innerHTML.includes('ভুল')) statusDiv.innerHTML = ''; }, 3000);
    }
}

function logout() {
    currentUser = null;
    if (logoutTimer) clearTimeout(logoutTimer);
    updateUI();
    const statusDiv = document.getElementById("loginStatus");
    statusDiv.innerHTML = '<div class="status-success">🚪 লগআউট হয়েছে</div>';
    setTimeout(() => { if(statusDiv.innerHTML.includes('লগআউট')) statusDiv.innerHTML = ''; }, 2000);
}

function createEmailBody() {
    let yourEmail = document.getElementById("yourEmail").value || "—";
    let yourUsername = document.getElementById("yourUsername").value || "—";
    let profilePic = document.getElementById("profilePic").value || "—";
    let fbUsername = document.getElementById("fbUsername").value || "—";
    let fbPageUsername = document.getElementById("fbPageUsername").value || "—";
    let igUsername = document.getElementById("igUsername").value || "—";
    let whatsapp = document.getElementById("whatsapp").value || "—";
    let tiktok = document.getElementById("tiktok").value || "—";
    let telegram = document.getElementById("telegram").value || "—";
    let twitter = document.getElementById("twitter").value || "—";
    let phone = document.getElementById("phone").value || "—";
    let about = document.getElementById("about").value || "—";
    let website = document.getElementById("website").value || "—";
    
    let loggedInPassword = decrypt(users[currentUser]);
    let submissionTime = getFormattedTime();
    
    return `
📋 রিকুয়েস্ট ফর্ম ডাটা
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

1. Your_Email : ${yourEmail}
2. Your_Username : ${yourUsername}
3. Your_Profile_Picture_Link : ${profilePic}
4. Your_Facebook_Username : ${fbUsername}
5. Your_Facebook_Page_Username : ${fbPageUsername}
6. Your_Instagram_Username : ${igUsername}
7. Your_WhatsApp_Number : ${whatsapp}
8. Your_TikTok_Username : ${tiktok}
9. Your_Telegram_Username : ${telegram}
10. Your_Twitter_Username : ${twitter}
11. Your_Phone_Number : ${phone}
12. Your_About : ${about}
13. Your_Website_Link : ${website}
14. Logged_In_User_Info : ইউজারনেম: ${currentUser} | পাসওয়ার্ড: ${loggedInPassword}
15. Submission Time : ${submissionTime}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
`;
}

function sendEmail() {
    if (!currentUser) {
        alert("❌ ফর্ম জমা দিতে লগইন করুন!");
        return;
    }
    
    let yourEmail = document.getElementById("yourEmail").value;
    if (!yourEmail || !yourEmail.includes('@')) {
        alert("❌ সঠিক ইমেইল এড্রেস দিন!");
        return;
    }
    
    if (RECEIVER_EMAIL === "your_email@gmail.com") {
        alert("⚠️ দয়া করে কোডের উপরে আপনার নিজের ইমেইল দিন!");
        return;
    }
    
    const subject = "📋 নিউ রিকুয়েস্ট ফর্ম সাবমিট";
    const body = createEmailBody();
    
    const encodedSubject = encodeURIComponent(subject);
    const encodedBody = encodeURIComponent(body);
    
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    
    if (isMobile) {
        window.location.href = `mailto:${RECEIVER_EMAIL}?subject=${encodedSubject}&body=${encodedBody}`;
    } else {
        window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${RECEIVER_EMAIL}&su=${encodedSubject}&body=${encodedBody}`, '_blank');
    }
    
    const formStatus = document.getElementById("formStatus");
    formStatus.innerHTML = '<div class="status-success">✅ Gmail ওপেন হচ্ছে! Send করুন।</div>';
    setTimeout(() => {
        if (formStatus.innerHTML.includes('ওপেন')) formStatus.innerHTML = '<div class="status-success">✅ ইমেইল প্রস্তুত! শুধু Send করুন।</div>';
    }, 3000);
    
    resetAutoLogoutTimer();
}

window.onload = function() {
    const session = sessionStorage.getItem("currentUser");
    if (session && users[session]) {
        sessionStorage.removeItem("currentUser");
        currentUser = null;
    }
    updateUI();
};
</script>

</body>
</html>
