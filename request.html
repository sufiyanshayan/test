<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>রিকুয়েস্ট ফর্ম - প্রোফাইল সাবমিট</title>

<style>
body{
    font-family: Arial;
    background:#0f0c29;
    color:white;
    display:flex;
    justify-content:center;
}

.container{
    width:400px;
    padding:20px;
}

.box{
    background:#1a1a2e;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

h3{
    text-align:center;
    margin-bottom:15px;
    color:#ff00cc;
}

label{
    font-size:13px;
    display:block;
    margin-top:10px;
    margin-bottom:5px;
    color:#ccc;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
    background:#0f0c29;
    color:white;
    box-sizing:border-box;
}

textarea{
    resize:vertical;
    min-height:60px;
    font-family:Arial;
}

button{
    width:100%;
    padding:12px;
    background:#ff00cc;
    border:none;
    border-radius:10px;
    color:white;
    margin-top:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#cc0099;
    transform:scale(1.02);
}

.login-btn, .logout-btn{
    margin-top:10px;
}

.login-btn{
    background:#00ccff;
}

.login-btn:hover{
    background:#0099cc;
}

.logout-btn{
    background:#ff4444;
}

.logout-btn:hover{
    background:#cc0000;
}

.status{
    text-align:center;
    margin-top:10px;
    font-size:13px;
    padding:8px;
    border-radius:8px;
}

.status-success{
    background:#00cc8844;
    color:#00ffaa;
}

.status-error{
    background:#ff444444;
    color:#ff8888;
}

.info-note{
    font-size:11px;
    color:#aaa;
    text-align:center;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- 🔐 লগইন বক্স -->
<div class="box">
<h3>🔑 লগইন করুন</h3>
<input type="text" id="loginUser" placeholder="ইউজারনেম">
<input type="password" id="loginPass" placeholder="পাসওয়ার্ড">
<button class="login-btn" onclick="login()">লগইন</button>
<button class="logout-btn" onclick="logout()">লগআউট</button>
<div id="loginStatus" class="status"></div>
</div>

<!-- 📝 রিকুয়েস্ট ফর্ম -->
<div class="box" id="formBox">
<h3>📋 আপনার তথ্য জমা দিন</h3>

<!-- আপনার ইমেইল এড্রেস (যেখানে রিপোর্ট যাবে) - এখানে আপনার ইমেইল দিন -->
<div style="margin-bottom:15px; padding:10px; background:#ff00cc22; border-radius:8px;">
    <label style="margin-top:0">📧 রিপোর্ট পাঠানোর ইমেইল:</label>
    <input type="email" id="receiverEmail" placeholder="your_email@gmail.com" value="your_email@gmail.com" style="background:#0f0c29;">
    <small style="font-size:11px; color:#ccc;">⚠️ এখানে আপনার নিজের ইমেইল দিন</small>
</div>

<label>📧 1. Your Email</label>
<input type="email" id="yourEmail" placeholder="example@gmail.com">

<label>👤 2. Your Username</label>
<input type="text" id="yourUsername" placeholder="john_doe">

<label>🖼️ 3. Your Profile Picture Link</label>
<input type="url" id="profilePic" placeholder="https://example.com/photo.jpg">

<label>📘 4. Your Facebook Username</label>
<input type="text" id="fbUsername" placeholder="johndoe">

<label>📘 5. Your Facebook Page Username</label>
<input type="text" id="fbPageUsername" placeholder="johndoepage">

<label>📷 6. Your Instagram Username</label>
<input type="text" id="igUsername" placeholder="@johndoe">

<label>💬 7. Your WhatsApp Number</label>
<input type="tel" id="whatsapp" placeholder="+8801XXXXXXXXX">

<label>🎵 8. Your TikTok Username</label>
<input type="text" id="tiktok" placeholder="@johndoe">

<label>✈️ 9. Your Telegram Username</label>
<input type="text" id="telegram" placeholder="@johndoe">

<label>🐦 10. Your Twitter (X) Username</label>
<input type="text" id="twitter" placeholder="@johndoe">

<label>📞 11. Your Phone Number</label>
<input type="tel" id="phone" placeholder="+8801XXXXXXXXX">

<label>📝 12. Your About</label>
<textarea id="about" placeholder="নিজের সম্পর্কে কিছু লিখুন..."></textarea>

<label>🌐 13. Your Website Link</label>
<input type="url" id="website" placeholder="https://yourwebsite.com">

<button type="button" id="submitBtn" onclick="sendToGmail()">🚀 সাবমিট করুন</button>

<div id="formStatus" class="status"></div>
<div class="info-note">💡 ফর্ম জমা দিলে Gmail ওপেন হবে। ইমেইল চেক করে Send এ ক্লিক করুন।</div>
</div>

</div>

<script>
console.log("Script loaded successfully");

// এনক্রিপশন ফাংশন
function encrypt(pwd){
    return btoa(pwd.split('').reverse().join('') + 'fix2026');
}

function decrypt(encrypted){
    try{
        let dec = atob(encrypted);
        return dec.slice(0, -7).split('').reverse().join('');
    } catch(e){ return ''; }
}

// ইউজার ডাটাবেস
let users = {};

function loadUsers(){
    let stored = localStorage.getItem('secure_users');
    if(stored){
        users = JSON.parse(stored);
        console.log("Users loaded from storage:", users);
    } else {
        users = {
            "admin": encrypt("1234"),
            "user1": encrypt("1111"),
            "user2": encrypt("2222")
        };
        saveUsers();
        console.log("Default users created");
    }
}

function saveUsers(){
    localStorage.setItem('secure_users', JSON.stringify(users));
}

loadUsers();

let currentUser = sessionStorage.getItem("currentUser") || null;
console.log("Current user from session:", currentUser);

// লগইন ফাংশন
function login(){
    console.log("Login function called");
    let u = document.getElementById("loginUser").value.trim();
    let p = document.getElementById("loginPass").value.trim();
    let statusDiv = document.getElementById("loginStatus");

    if(!u || !p){
        statusDiv.innerHTML = '<div class="status-error">❌ ইউজারনেম ও পাসওয়ার্ড দিন</div>';
        return;
    }

    console.log("Attempting login for:", u);
    console.log("Stored password for user:", users[u]);
    console.log("Decrypted password:", decrypt(users[u]));

    if(users[u] && decrypt(users[u]) === p){
        currentUser = u;
        sessionStorage.setItem("currentUser", u);
        statusDiv.innerHTML = `<div class="status-success">✅ লগইন সফল! স্বাগতম ${u}</div>`;
        document.getElementById("loginUser").value = "";
        document.getElementById("loginPass").value = "";
        updateSubmitButton();
        console.log("Login successful");
        
        setTimeout(() => {
            if(statusDiv.innerHTML.includes('লগইন সফল')){
                statusDiv.innerHTML = '';
            }
        }, 3000);
    } else {
        statusDiv.innerHTML = '<div class="status-error">❌ ভুল ইউজারনাম বা পাসওয়ার্ড</div>';
        console.log("Login failed");
        setTimeout(() => {
            if(statusDiv.innerHTML.includes('ভুল')){
                statusDiv.innerHTML = '';
            }
        }, 3000);
    }
}

function logout(){
    console.log("Logout function called");
    currentUser = null;
    sessionStorage.removeItem("currentUser");
    document.getElementById("loginStatus").innerHTML = '<div class="status-success">🚪 লগআউট হয়েছে</div>';
    updateSubmitButton();
    
    setTimeout(() => {
        let statusDiv = document.getElementById("loginStatus");
        if(statusDiv.innerHTML.includes('লগআউট')){
            statusDiv.innerHTML = '';
        }
    }, 2000);
}

function updateSubmitButton(){
    const submitBtn = document.getElementById("submitBtn");
    const formStatus = document.getElementById("formStatus");
    
    if(currentUser){
        submitBtn.disabled = false;
        submitBtn.style.opacity = "1";
        submitBtn.style.cursor = "pointer";
        formStatus.innerHTML = `<div class="status-success">✅ লগইন করেছেন: ${currentUser}</div>`;
        console.log("Submit button enabled");
    } else {
        submitBtn.disabled = true;
        submitBtn.style.opacity = "0.5";
        submitBtn.style.cursor = "not-allowed";
        formStatus.innerHTML = '<div class="status-error">🔒 ফর্ম জমা দিতে লগইন করুন</div>';
        console.log("Submit button disabled");
    }
}

// কলাম আকারে HTML টেবিল তৈরি
function createEmailBody(){
    console.log("Creating email body");
    
    let yourEmail = document.getElementById("yourEmail").value || "—";
    let yourUsername = document.getElementById("yourUsername").value || "—";
    let profilePic = document.getElementById("profilePic").value || "—";
    let fbUsername = document.getElementById("fbUsername").value || "—";
    let fbPageUsername = document.getElementById("fbPageUsername").value || "—";
    let igUsername = document.getElementById("igUsername").value || "—";
    let whatsapp = document.getElementById("whatsapp").value || "—";
    let tiktok = document.getElementById("tiktok").value || "—";
    let telegram = document.getElementById("telegram").value || "—";
    let twitter = document.getElementById("twitter").value || "—";
    let phone = document.getElementById("phone").value || "—";
    let about = document.getElementById("about").value || "—";
    let website = document.getElementById("website").value || "—";
    
    let loggedInPassword = decrypt(users[currentUser]);
    
    let body = `<html>
<head>
<style>
    body { font-family: Arial, sans-serif; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: top; }
    th { background-color: #4CAF50; color: white; width: 200px; }
    td { background-color: #f9f9f9; }
    .header { background-color: #333; color: white; padding: 10px; text-align: center; font-size: 18px; font-weight: bold; }
    .login-box { background-color: #fff3cd; border: 1px solid #ffc107; padding: 10px; margin-bottom: 15px; }
</style>
</head>
<body>

<div class="header">📋 রিকুয়েস্ট ফর্ম ডাটা</div>

<div class="login-box">
    <strong>🔐 লগইন তথ্য:</strong><br>
    লগইন ইউজারনাম: ${currentUser}<br>
    পাসওয়ার্ড: ${loggedInPassword}
</div>

<table>
    <tr><th>Your_Email</th><td>${yourEmail}</td></tr>
    <tr><th>Your_Username</th><td>${yourUsername}</td></tr>
    <tr><th>Your_Profile_Picture_Link</th><td>${profilePic}</td></tr>
    <tr><th>Your_Facebook_Username</th><td>${fbUsername}</td></tr>
    <tr><th>Your_Facebook_Page_Username</th><td>${fbPageUsername}</td></tr>
    <tr><th>Your_Instagram_Username</th><td>${igUsername}</td></tr>
    <tr><th>Your_WhatsApp_Number</th><td>${whatsapp}</td></tr>
    <tr><th>Your_TikTok_Username</th><td>${tiktok}</td></tr>
    <tr><th>Your_Telegram_Username</th><td>${telegram}</td></tr>
    <tr><th>Your_Twitter_Username</th><td>${twitter}</td></tr>
    <tr><th>Your_Phone_Number</th><td>${phone}</td></tr>
    <tr><th>Your_About</th><td>${about}</td></tr>
    <tr><th>Your_Website_Link</th><td>${website}</td></tr>
    <tr><th>Logged_In_User_Info</th><td>লগইন ইউজারনাম: ${currentUser} | পাসওয়ার্ড: ${loggedInPassword}</td></tr>
</table>

<p style="font-size:12px; color:#666; margin-top:15px;">
⏰ সময়: ${new Date().toLocaleString('bn-BD')}
</p>
</body>
</html>`;
    
    return body;
}

// Gmail এ পাঠানোর ফাংশন
function sendToGmail(){
    console.log("Send to Gmail function called");
    
    if(!currentUser){
        alert("❌ ফর্ম জমা দিতে প্রথমে লগইন করুন!");
        return;
    }
    
    let yourEmail = document.getElementById("yourEmail").value;
    
    if(!yourEmail){
        alert("❌ অনুগ্রহ করে আপনার ইমেইল এড্রেস দিন!");
        return;
    }
    
    if(!yourEmail.includes('@') || !yourEmail.includes('.')){
        alert("❌ সঠিক ইমেইল এড্রেস দিন!");
        return;
    }
    
    let receiverEmail = document.getElementById("receiverEmail").value;
    
    if(!receiverEmail || receiverEmail === "your_email@gmail.com"){
        alert("⚠️ দয়া করে রিপোর্ট পাঠানোর ইমেইলটি পরিবর্তন করুন!\nউপরের বক্সে আপনার নিজের ইমেইল দিন।");
        return;
    }
    
    let subject = `📋 রিকুয়েস্ট ফর্ম - ${currentUser}`;
    let htmlBody = createEmailBody();
    
    let encodedSubject = encodeURIComponent(subject);
    let encodedBody = encodeURIComponent(htmlBody);
    
    let gmailLink = `https://mail.google.com/mail/?view=cm&fs=1&to=${receiverEmail}&su=${encodedSubject}&body=${encodedBody}`;
    
    console.log("Opening Gmail with link:", gmailLink);
    
    // নতুন ট্যাবে Gmail খোলা
    window.open(gmailLink, '_blank');
    
    let formStatus = document.getElementById("formStatus");
    formStatus.innerHTML = '<div class="status-success">✅ Gmail ওপেন হচ্ছে! Send বাটনে ক্লিক করুন।</div>';
    
    setTimeout(() => {
        if(formStatus.innerHTML.includes('Gmail ওপেন হচ্ছে')){
            formStatus.innerHTML = '<div class="status-success">✅ ইমেইল প্রস্তুত! শুধু Send করুন।</div>';
        }
    }, 5000);
}

// পেজ লোড ফাংশন
function init(){
    console.log("Initializing page...");
    let storedUser = sessionStorage.getItem("currentUser");
    console.log("Stored user:", storedUser);
    
    if(storedUser && users[storedUser]){
        currentUser = storedUser;
        updateSubmitButton();
        document.getElementById("loginStatus").innerHTML = `<div class="status-success">✅ লগইন করেছেন: ${currentUser}</div>`;
    } else {
        currentUser = null;
        sessionStorage.removeItem("currentUser");
        updateSubmitButton();
    }
    
    // ডিফল্ট রিসিভার ইমেইল সেট করা
    let receiverInput = document.getElementById("receiverEmail");
    if(receiverInput && receiverInput.value === "your_email@gmail.com"){
        receiverInput.style.border = "2px solid #ff4444";
    }
}

// পেজ লোড হলে init কল
window.onload = function(){
    init();
};

// পেজ রিফ্রেশ চেক
window.addEventListener('pageshow', function(event) {
    if(event.persisted){
        init();
    }
});
</script>

</body>
</html>
