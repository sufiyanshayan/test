<!DOCTYPE html>

<meta charset="UTF-8">

<title>রিকুয়েস্ট ফর্ম - প্রোফাইল সাবমিট</title>

<style>
body{
    font-family: Arial;
    background:#0f0c29;
    color:white;

h3{

    margin-bottom:15px;
    color:#ff00cc;
}

label{
    font-size:13px;
    display:block;
    margin-top:10px;
    margin-bottom:5px;
    color:#ccc;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
    background:#0f0c29;
    color:white;
    box-sizing:border-box;
}

textarea{
    resize:vertical;
    min-height:60px;
    font-family:Arial;
}

button{
    width:100%;
    padding:12px;
    background:#ff00cc;
    border:none;
    border-radius:10px;
    color:white;
    margin-top:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#cc0099;
    transform:scale(1.02);
}

.login-btn, .logout-btn{
    margin-top:10px;
}

.login-btn{
    background:#00ccff;
}

.login-btn:hover{
    background:#0099cc;
}

.logout-btn{
    background:#ff4444;
}

.logout-btn:hover{
    background:#cc0000;
}

.status{

    margin-top:10px;
    font-size:13px;
    padding:8px;
    border-radius:8px;
}

.status-success{
    background:#00cc8844;
    color:#00ffaa;
}

.status-error{
    background:#ff444444;
    color:#ff8888;
}

hr{
    border-color:#ff00cc33;
    margin:15px 0;
}

.info-note{
    font-size:11px;
    color:#aaa;
    text-align:center;
    margin-top:10px;

</head>

<body>

<div class="container">

<!-- 🔐 লগইন বক্স -->
<div class="box">
<h3>🔑 লগইন করুন</h3>
<input type="text" id="loginUser" placeholder="ইউজারনেম">
<input type="password" id="loginPass" placeholder="পাসওয়ার্ড">
<button class="login-btn" onclick="login()">লগইন</button>
<button class="logout-btn" onclick="logout()">লগআউট</button>
<div id="loginStatus" class="status"></div>
</div>

<!-- 📝 রিকুয়েস্ট ফর্ম -->
<div class="box" id="formBox">
<h3>📋 আপনার তথ্য জমা দিন</h3>

<form id="requestForm">

<!-- 📧 আপনার ইমেইল এড্রেস (যেখানে রিপোর্ট যাবে) - এখানে আপনার ইমেইল দিন -->
<input type="hidden" id="receiverEmail" value="inyt_444@outlook.com">

<!-- ১. Your Email -->
<label>📧 1. Your Email</label>
<input type="email" id="yourEmail" placeholder="example@gmail.com" required>

<!-- ২. Your Username -->
<label>👤 2. Your Username</label>
<input type="text" id="yourUsername" placeholder="john_doe">

<!-- ৩. Your Profile Picture Link -->
<label>🖼️ 3. Your Profile Picture Link</label>
<input type="url" id="profilePic" placeholder="https://example.com/photo.jpg">

<!-- ৪. Your Facebook Username -->
<label>📘 4. Your Facebook Username</label>
<input type="text" id="fbUsername" placeholder="johndoe">

<!-- ৫. Your Facebook Page Username -->
<label>📘 5. Your Facebook Page Username</label>
<input type="text" id="fbPageUsername" placeholder="johndoepage">

<!-- ৬. Your Instagram Username -->
<label>📷 6. Your Instagram Username</label>
<input type="text" id="igUsername" placeholder="@johndoe">

<!-- ৭. Your WhatsApp Number -->
<label>💬 7. Your WhatsApp Number</label>
<input type="tel" id="whatsapp" placeholder="+8801XXXXXXXXX">

<!-- ৮. Your TikTok Username -->
<label>🎵 8. Your TikTok Username</label>
<input type="text" id="tiktok" placeholder="@johndoe">

<!-- ৯. Your Telegram Username -->
<label>✈️ 9. Your Telegram Username</label>
<input type="text" id="telegram" placeholder="@johndoe">

<!-- ১০. Your Twitter (X) Username -->
<label>🐦 10. Your Twitter (X) Username</label>
<input type="text" id="twitter" placeholder="@johndoe">

<!-- ১১. Your Phone Number -->
<label>📞 11. Your Phone Number</label>
<input type="tel" id="phone" placeholder="+8801XXXXXXXXX">

<!-- ১২. Your About -->
<label>📝 12. Your About</label>
<textarea id="about" placeholder="নিজের সম্পর্কে কিছু লিখুন..."></textarea>

<!-- ১৩. Your Website Link -->
<label>🌐 13. Your Website Link</label>
<input type="url" id="website" placeholder="https://yourwebsite.com">

<button type="button" id="submitBtn" onclick="sendToGmail()">🚀 সাবমিট করুন</button>

</form>

<div id="formStatus" class="status"></div>
<div class="info-note">💡 ফর্ম জমা দিলে Gmail ওপেন হবে। ইমেইল চেক করে Send এ ক্লিক করুন।</div>
</div>

</div>

<script>
// =============== ইউজার ডাটাবেস (পাসওয়ার্ড এনক্রিপ্টেড) ===============
function encrypt(pwd){
    return btoa(pwd.split('').reverse().join('') + 'fix2026');
}

function decrypt(encrypted){
    try{
        let dec = atob(encrypted);
        return dec.slice(0, -7).split('').reverse().join('');
    } catch(e){ return ''; }
}

// লোকাল স্টোরেজ থেকে ইউজার লোড
let users = {};

function loadUsers(){
    let stored = localStorage.getItem('secure_users');
    if(stored){
        users = JSON.parse(stored);
    } else {
        // ডিফল্ট ইউজার: admin / 1234 , user1 / 1111 , user2 / 2222
        users = {
            "admin": encrypt("1234"),
            "user1": encrypt("1111"),
            "user2": encrypt("2222")
        };
        saveUsers();
    }
}

function saveUsers(){
    localStorage.setItem('secure_users', JSON.stringify(users));
}

loadUsers();

// কারেন্ট লগইন ইউজার - সেশন স্টোরেজ ব্যবহার করা হচ্ছে (পেজ রিফ্রেশে লগআউট হবে)
let currentUser = sessionStorage.getItem("currentUser") || null;

// =============== লগইন ফাংশন ===============
function login(){
    let u = document.getElementById("loginUser").value.trim();
    let p = document.getElementById("loginPass").value.trim();
    let statusDiv = document.getElementById("loginStatus");

    if(!u || !p){
        statusDiv.innerHTML = '<div class="status-error">❌ ইউজারনেম ও পাসওয়ার্ড দিন</div>';
        return;
    }

    if(users[u] && decrypt(users[u]) === p){
        currentUser = u;
        sessionStorage.setItem("currentUser", u);
        statusDiv.innerHTML = `<div class="status-success">✅ লগইন সফল! স্বাগতম ${u}</div>`;
        document.getElementById("loginUser").value = "";
        document.getElementById("loginPass").value = "";
        updateSubmitButton();
        
        setTimeout(() => {
            if(statusDiv.innerHTML.includes('লগইন সফল')){
                statusDiv.innerHTML = '';
            }
        }, 3000);
    } else {
        statusDiv.innerHTML = '<div class="status-error">❌ ভুল ইউজারনেম বা পাসওয়ার্ড</div>';
        setTimeout(() => {
            if(statusDiv.innerHTML.includes('ভুল')){
                statusDiv.innerHTML = '';
            }
        }, 3000);
    }
}

function logout(){
    currentUser = null;
    sessionStorage.removeItem("currentUser");
    document.getElementById("loginStatus").innerHTML = '<div class="status-success">🚪 লগআউট হয়েছে</div>';
    updateSubmitButton();
    
    setTimeout(() => {
        let statusDiv = document.getElementById("loginStatus");
        if(statusDiv.innerHTML.includes('লগআউট')){
            statusDiv.innerHTML = '';
        }
    }, 2000);
}

function updateSubmitButton(){
    const submitBtn = document.getElementById("submitBtn");
    const formStatus = document.getElementById("formStatus");
    
    if(currentUser){
        submitBtn.disabled = false;
        submitBtn.style.opacity = "1";
        submitBtn.style.cursor = "pointer";
        formStatus.innerHTML = `<div class="status-success">✅ লগইন করেছেন: ${currentUser} | এখন ফর্ম জমা দিতে পারবেন</div>`;
    } else {
        submitBtn.disabled = true;
        submitBtn.style.opacity = "0.5";
        submitBtn.style.cursor = "not-allowed";
        formStatus.innerHTML = '<div class="status-error">🔒 ফর্ম জমা দিতে উপরে লগইন করুন</div>';
    }
}

// আপনার ছবির মতো সুন্দর টেবিল ফরম্যাটে ইমেইল বডি তৈরি
function createEmailBody(){
    let yourEmail = document.getElementById("yourEmail").value;
    let yourUsername = document.getElementById("yourUsername").value;
    let profilePic = document.getElementById("profilePic").value;
    let fbUsername = document.getElementById("fbUsername").value;
    let fbPageUsername = document.getElementById("fbPageUsername").value;
    let igUsername = document.getElementById("igUsername").value;
    let whatsapp = document.getElementById("whatsapp").value;
    let tiktok = document.getElementById("tiktok").value;
    let telegram = document.getElementById("telegram").value;
    let twitter = document.getElementById("twitter").value;
    let phone = document.getElementById("phone").value;
    let about = document.getElementById("about").value;
    let website = document.getElementById("website").value;
    
    let loggedInPassword = decrypt(users[currentUser]);
    
    // আপনার ছবির মতো ঠিক একই ফরম্যাটে টেবিল তৈরি
    let body = `

<style>

<body>
<div class="email-container">
    <div class="header">
        <h2>📋 রিকুয়েস্ট ফর্ম ডাটা</h2>

    </div>
    <div class="content">
        
        <div class="login-section">
            <h4>🔐 লগইন তথ্য</h4>
            <p><strong>লগইন ইউজারনাম:</strong> ${currentUser}</p>
            <p><strong>পাসওয়ার্ড:</strong> ${loggedInPassword}</p>
        </div>
        
        <table class="data-table">

// =============== Gmail এ পাঠানোর ফাংশন ===============
function sendToGmail(){
    if(!currentUser){
        alert("❌ ফর্ম জমা দিতে প্রথমে লগইন করুন!");
        return;
    }
    
    let yourEmail = document.getElementById("yourEmail").value;
    
    if(!yourEmail){
        alert("❌ অনুগ্রহ করে আপনার ইমেইল এড্রেস দিন!");
        return;
    }
    
    if(!yourEmail.includes('@') || !yourEmail.includes('.')){
        alert("❌ সঠিক ইমেইল এড্রেস দিন! (উদাহরণ: name@domain.com)");
        return;
    }
    
    let receiverEmail = document.getElementById("receiverEmail").value;
    let yourUsername = document.getElementById("yourUsername").value || yourEmail.split('@')[0];
    let subject = `📋 রিকুয়েস্ট ফর্ম ডাটা - ${yourUsername}`;
    
    let htmlBody = createEmailBody();
    
    let encodedSubject = encodeURIComponent(subject);
    let encodedBody = encodeURIComponent(htmlBody);
    
    let gmailLink = `https://mail.google.com/mail/?view=cm&fs=1&to=${receiverEmail}&su=${encodedSubject}&body=${encodedBody}`;
    
    let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    if(isMobile){
        let mobileLink = `mailto:${receiverEmail}?subject=${encodedSubject}&body=${encodedBody}`;
        window.location.href = mobileLink;
        
        setTimeout(() => {
            window.open(gmailLink, '_blank');
        }, 500);
    } else {
        window.open(gmailLink, '_blank');
    }
    
    let formStatus = document.getElementById("formStatus");
    formStatus.innerHTML = '<div class="status-success">✅ Gmail ওপেন হচ্ছে! দয়া করে ইমেইল চেক করে Send এ ক্লিক করুন।</div>';
    
    setTimeout(() => {
        if(formStatus.innerHTML.includes('Gmail ওপেন হচ্ছে')){
            formStatus.innerHTML = '<div class="status-success">✅ ফর্ম প্রস্তুত! ইমেইল পাঠানোর জন্য Send বাটনে ক্লিক করুন।</div>';
        }
    }, 5000);
}

function init(){
    let storedUser = sessionStorage.getItem("currentUser");
    if(storedUser && users[storedUser]){
        currentUser = storedUser;
        updateSubmitButton();
        document.getElementById("loginStatus").innerHTML = `<div class="status-success">✅ লগইন করেছেন: ${currentUser}</div>`;
    } else {
        currentUser = null;
        sessionStorage.removeItem("currentUser");
        updateSubmitButton();
    }
}

init();

window.addEventListener('pageshow', function(event) {
    if(event.persisted || performance.getEntriesByType('navigation')[0].type === 'reload') {
        let storedUser = sessionStorage.getItem("currentUser");
        if(!storedUser){
            currentUser = null;
            updateSubmitButton();
        }
    }
});
</script>
