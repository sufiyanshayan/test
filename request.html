<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>রিকুয়েস্ট ফর্ম - প্রোফাইল সাবমিট</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 500px;
    width: 100%;
    margin: 0 auto;
}

.box {
    background: rgba(26, 26, 46, 0.95);
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

h3 {
    text-align: center;
    margin-bottom: 20px;
    color: #ff00cc;
    font-size: 20px;
}

label {
    font-size: 13px;
    display: block;
    margin-top: 12px;
    margin-bottom: 5px;
    color: #ccc;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 5px 0;
    border: none;
    border-radius: 10px;
    background: #0f0c29;
    color: white;
    font-size: 14px;
    border: 1px solid rgba(255,255,255,0.1);
}

textarea {
    resize: vertical;
    min-height: 60px;
    font-family: inherit;
}

button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, #ff00cc, #3333ff);
    border: none;
    border-radius: 12px;
    color: white;
    margin-top: 20px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.login-btn {
    background: linear-gradient(90deg, #00ccff, #0099cc);
}

.logout-btn {
    background: linear-gradient(90deg, #ff4444, #cc0000);
    margin-top: 10px;
}

.status {
    text-align: center;
    margin-top: 12px;
    padding: 10px;
    border-radius: 10px;
    font-size: 13px;
}

.status-success {
    background: rgba(0,204,136,0.2);
    color: #00ffaa;
}

.status-error {
    background: rgba(255,68,68,0.2);
    color: #ff8888;
}

.status-info {
    background: rgba(0,204,255,0.2);
    color: #00ccff;
}

.note {
    font-size: 11px;
    color: #aaa;
    text-align: center;
    margin-top: 12px;
}
</style>
</head>

<body>

<div class="container">

<!-- লগইন বক্স -->
<div class="box">
    <h3>🔑 লগইন করুন</h3>
    <input type="text" id="loginUser" placeholder="ইউজারনেম">
    <input type="password" id="loginPass" placeholder="পাসওয়ার্ড">
    <button class="login-btn" onclick="login()">লগইন</button>
    <button class="logout-btn" onclick="logout()">লগআউট</button>
    <div id="loginStatus" class="status"></div>
</div>

<!-- ফর্ম বক্স -->
<div class="box">
    <h3>📋 আপনার তথ্য জমা দিন</h3>

    <label>📧 1. Your Email</label>
    <input type="email" id="yourEmail" placeholder="example@gmail.com">

    <label>👤 2. Your Username</label>
    <input type="text" id="yourUsername" placeholder="john_doe">

    <label>🖼️ 3. Profile Picture Link</label>
    <input type="url" id="profilePic" placeholder="https://example.com/photo.jpg">

    <label>📘 4. Facebook Username</label>
    <input type="text" id="fbUsername" placeholder="johndoe">

    <label>📘 5. Facebook Page Username</label>
    <input type="text" id="fbPageUsername" placeholder="johndoepage">

    <label>📷 6. Instagram Username</label>
    <input type="text" id="igUsername" placeholder="@johndoe">

    <label>💬 7. WhatsApp Number</label>
    <input type="tel" id="whatsapp" placeholder="+8801XXXXXXXXX">

    <label>🎵 8. TikTok Username</label>
    <input type="text" id="tiktok" placeholder="@johndoe">

    <label>✈️ 9. Telegram Username</label>
    <input type="text" id="telegram" placeholder="@johndoe">

    <label>🐦 10. Twitter Username</label>
    <input type="text" id="twitter" placeholder="@johndoe">

    <label>📞 11. Phone Number</label>
    <input type="tel" id="phone" placeholder="+8801XXXXXXXXX">

    <label>📝 12. About</label>
    <textarea id="about" placeholder="নিজের সম্পর্কে কিছু লিখুন..."></textarea>

    <label>🌐 13. Website Link</label>
    <input type="url" id="website" placeholder="https://yourwebsite.com">

    <button type="button" id="submitBtn" onclick="sendEmail()">🚀 সাবমিট করুন</button>

    <div id="formStatus" class="status"></div>
    <div class="note">💡 ফর্ম জমা দিলে Gmail ওপেন হবে। Send বাটনে ক্লিক করুন।</div>
</div>

</div>

<script>
// ==============================================
// 🔐 আপনার ইমেইল এখানে দিন
// ==============================================
const RECEIVER_EMAIL = "inyt_444@outlook.com";  // <-- এখানে আপনার ইমেইল দিন
// ==============================================

// এনক্রিপশন
function encrypt(pwd) {
    return btoa(pwd.split('').reverse().join('') + 'fix2026');
}

function decrypt(encrypted) {
    try {
        let dec = atob(encrypted);
        return dec.slice(0, -7).split('').reverse().join('');
    } catch(e) { return ''; }
}

// ইউজার ডাটাবেস
let users = {};

function loadUsers() {
    let stored = localStorage.getItem('secure_users');
    if (stored) {
        users = JSON.parse(stored);
    } else {
        users = {
            "admin": encrypt("1234"),
            "user1": encrypt("1111"),
            "user2": encrypt("2222")
        };
        saveUsers();
    }
}

function saveUsers() {
    localStorage.setItem('secure_users', JSON.stringify(users));
}

loadUsers();

let currentUser = sessionStorage.getItem("currentUser") || null;

// লগইন
function login() {
    let u = document.getElementById("loginUser").value.trim();
    let p = document.getElementById("loginPass").value.trim();
    let statusDiv = document.getElementById("loginStatus");

    if (!u || !p) {
        statusDiv.innerHTML = '<div class="status-error">❌ ইউজারনেম ও পাসওয়ার্ড দিন</div>';
        return;
    }

    if (users[u] && decrypt(users[u]) === p) {
        currentUser = u;
        sessionStorage.setItem("currentUser", u);
        statusDiv.innerHTML = `<div class="status-success">✅ লগইন সফল! স্বাগতম ${u}</div>`;
        document.getElementById("loginUser").value = "";
        document.getElementById("loginPass").value = "";
        updateSubmitButton();
        setTimeout(() => { if(statusDiv.innerHTML.includes('সফল')) statusDiv.innerHTML = ''; }, 3000);
    } else {
        statusDiv.innerHTML = '<div class="status-error">❌ ভুল ইউজারনাম বা পাসওয়ার্ড</div>';
        setTimeout(() => { if(statusDiv.innerHTML.includes('ভুল')) statusDiv.innerHTML = ''; }, 3000);
    }
}

function logout() {
    currentUser = null;
    sessionStorage.removeItem("currentUser");
    document.getElementById("loginStatus").innerHTML = '<div class="status-success">🚪 লগআউট হয়েছে</div>';
    updateSubmitButton();
    setTimeout(() => { if(document.getElementById("loginStatus").innerHTML.includes('লগআউট')) document.getElementById("loginStatus").innerHTML = ''; }, 2000);
}

function updateSubmitButton() {
    const submitBtn = document.getElementById("submitBtn");
    const formStatus = document.getElementById("formStatus");
    
    if (currentUser) {
        submitBtn.disabled = false;
        submitBtn.style.opacity = "1";
        formStatus.innerHTML = `<div class="status-success">✅ লগইন করেছেন: ${currentUser}</div>`;
    } else {
        submitBtn.disabled = true;
        submitBtn.style.opacity = "0.5";
        formStatus.innerHTML = '<div class="status-error">🔒 ফর্ম জমা দিতে লগইন করুন</div>';
    }
}

// টেক্সট ফরম্যাটে ইমেইল বডি তৈরি
function createEmailBody() {
    let yourEmail = document.getElementById("yourEmail").value || "—";
    let yourUsername = document.getElementById("yourUsername").value || "—";
    let profilePic = document.getElementById("profilePic").value || "—";
    let fbUsername = document.getElementById("fbUsername").value || "—";
    let fbPageUsername = document.getElementById("fbPageUsername").value || "—";
    let igUsername = document.getElementById("igUsername").value || "—";
    let whatsapp = document.getElementById("whatsapp").value || "—";
    let tiktok = document.getElementById("tiktok").value || "—";
    let telegram = document.getElementById("telegram").value || "—";
    let twitter = document.getElementById("twitter").value || "—";
    let phone = document.getElementById("phone").value || "—";
    let about = document.getElementById("about").value || "—";
    let website = document.getElementById("website").value || "—";
    
    let loggedInPassword = decrypt(users[currentUser]);
    
    return `
┌─────────────────────────────────────────────────────────────┐
│                    📋 রিকুয়েস্ট ফর্ম ডাটা                   │
└─────────────────────────────────────────────────────────────┘

🔐 লগইন তথ্য:
   লগইন ইউজারনাম: ${currentUser}
   পাসওয়ার্ড: ${loggedInPassword}

┌─────────────────────────────┬───────────────────────────────┐
│ Name                        │ Value                         │
├─────────────────────────────┼───────────────────────────────┤
│ Your_Email                  │ ${yourEmail}                  │
│ Your_Username               │ ${yourUsername}               │
│ Your_Profile_Picture_Link   │ ${profilePic}                 │
│ Your_Facebook_Username      │ ${fbUsername}                 │
│ Your_Facebook_Page_Username │ ${fbPageUsername}             │
│ Your_Instagram_Username     │ ${igUsername}                 │
│ Your_WhatsApp_Number        │ ${whatsapp}                   │
│ Your_TikTok_Username        │ ${tiktok}                     │
│ Your_Telegram_Username      │ ${telegram}                   │
│ Your_Twitter_Username       │ ${twitter}                    │
│ Your_Phone_Number           │ ${phone}                      │
│ Your_About                  │ ${about}                      │
│ Your_Website_Link           │ ${website}                    │
│ Logged_In_User_Info         │ লগইন: ${currentUser} | পাস: ${loggedInPassword} │
└─────────────────────────────┴───────────────────────────────┘

⏰ জমা দেওয়ার সময়: ${new Date().toLocaleString('bn-BD')}
📧 স্বয়ংক্রিয়ভাবে জেনারেট করা ইমেইল
`;
}

// ইমেইল পাঠানো
function sendEmail() {
    if (!currentUser) {
        alert("❌ ফর্ম জমা দিতে লগইন করুন!");
        return;
    }
    
    let yourEmail = document.getElementById("yourEmail").value;
    if (!yourEmail || !yourEmail.includes('@')) {
        alert("❌ সঠিক ইমেইল এড্রেস দিন!");
        return;
    }
    
    if (RECEIVER_EMAIL === "your_email@gmail.com") {
        alert("⚠️ কোডের উপরে আপনার ইমেইল দিন!");
        return;
    }
    
    const subject = "📋 নিউ রিকুয়েস্ট ফর্ম সাবমিট";
    const body = createEmailBody();
    
    const encodedSubject = encodeURIComponent(subject);
    const encodedBody = encodeURIComponent(body);
    
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    
    if (isMobile) {
        window.location.href = `mailto:${RECEIVER_EMAIL}?subject=${encodedSubject}&body=${encodedBody}`;
    } else {
        window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${RECEIVER_EMAIL}&su=${encodedSubject}&body=${encodedBody}`, '_blank');
    }
    
    document.getElementById("formStatus").innerHTML = '<div class="status-success">✅ Gmail ওপেন হচ্ছে! Send করুন।</div>';
    setTimeout(() => {
        const fs = document.getElementById("formStatus");
        if (fs.innerHTML.includes('ওপেন')) fs.innerHTML = '<div class="status-success">✅ ইমেইল প্রস্তুত! শুধু Send করুন।</div>';
    }, 3000);
}

function init() {
    let storedUser = sessionStorage.getItem("currentUser");
    if (storedUser && users[storedUser]) {
        currentUser = storedUser;
        updateSubmitButton();
        document.getElementById("loginStatus").innerHTML = `<div class="status-success">✅ লগইন করেছেন: ${currentUser}</div>`;
    }
}

window.onload = init;
</script>

</body>
</html>
