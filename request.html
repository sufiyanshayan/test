<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Hologram Request Form</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Space Grotesk', sans-serif;
        background: linear-gradient(145deg, #0a0a0f, #1a1a2e);
        color: #fff;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
    }

    .app {
        max-width: 550px;
        margin: 0 auto;
        background: #0f0f17;
        min-height: 100vh;
        position: relative;
        border-left: 1px solid rgba(255,255,255,0.05);
        border-right: 1px solid rgba(255,255,255,0.05);
        box-shadow: 0 0 50px rgba(0,0,0,0.5);
    }

    .cyber-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: 
            radial-gradient(circle at 20% 50%, rgba(255, 50, 100, 0.15) 0%, transparent 50%),
            radial-gradient(circle at 80% 80%, rgba(80, 200, 255, 0.15) 0%, transparent 50%),
            radial-gradient(circle at 40% 20%, rgba(200, 100, 255, 0.15) 0%, transparent 50%),
            linear-gradient(145deg, #0a0a0f, #1a1a2e);
        z-index: -2;
        animation: breathe 10s ease-in-out infinite;
        pointer-events: none;
    }

    @keyframes breathe {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 1; }
    }

    .particle {
        position: fixed;
        width: 4px;
        height: 4px;
        background: rgba(255,255,255,0.3);
        border-radius: 50%;
        pointer-events: none;
        z-index: -1;
        animation: float 20s linear infinite;
    }

    @keyframes float {
        0% { transform: translateY(100vh) translateX(0); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(-20vh) translateX(50px); opacity: 0; }
    }

    /* Header & Menu Styles */
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 1.5rem;
        background: #14141e;
        border-bottom: 1px solid rgba(255,100,200,0.2);
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .logo {
        font-weight: 700;
        font-size: 1.3rem;
        background: linear-gradient(135deg, #fff, #a0a0ff, #ffa0ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .logo i {
        font-size: 1.1rem;
        color: #ffa0ff;
        -webkit-text-fill-color: initial;
        filter: drop-shadow(0 0 8px #ffa0ff);
    }

    .hologram-btn {
        width: 48px;
        height: 48px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        border-radius: 40px;
        background: #1e1e2a;
        border: 1px solid rgba(255,255,255,0.1);
        transition: 0.3s;
        box-shadow: 0 0 15px rgba(255,100,200,0.2);
    }

    .hologram-btn:hover {
        background: #2a2a3a;
        border-color: rgba(255,200,255,0.3);
        box-shadow: 0 0 25px rgba(255,100,255,0.4);
    }

    .hologram-btn .line {
        width: 22px;
        height: 2px;
        background: linear-gradient(90deg, #ffa0ff, #a0a0ff);
        border-radius: 4px;
        transition: 0.2s;
    }

    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s;
        z-index: 200;
    }

    .overlay.active {
        opacity: 1;
        pointer-events: all;
    }

    .sidebar {
        position: fixed;
        right: -360px;
        top: 0;
        width: 300px;
        height: 100%;
        background: #1a1a26;
        box-shadow: -25px 0 50px rgba(0,0,0,0.5);
        transition: right 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        z-index: 300;
        padding: 2rem 1.2rem;
        border-left: 1px solid rgba(255,100,255,0.3);
    }

    .sidebar.active {
        right: 0;
    }

    .close-btn {
        text-align: right;
        margin-bottom: 1.5rem;
        cursor: pointer;
    }

    .close-btn i {
        font-size: 1.6rem;
        color: rgba(255,200,255,0.8);
        text-shadow: 0 0 15px #ffa0ff;
        transition: transform 0.3s;
    }

    .close-btn:hover i {
        transform: rotate(180deg) scale(1.1);
    }

    .profile {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid rgba(255,100,255,0.2);
        margin-bottom: 1.5rem;
    }

    .avatar {
        width: 55px;
        height: 55px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ff50a0, #a050ff);
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid rgba(255,255,255,0.5);
        box-shadow: 0 0 30px rgba(255,100,255,0.5);
        overflow: hidden;
    }

    .avatar i {
        font-size: 1.8rem;
        color: white;
    }

    .profile-text h3 {
        font-weight: 700;
        font-size: 1.1rem;
        margin-bottom: 0.2rem;
        background: linear-gradient(135deg, #fff, #ffa0ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .profile-text p {
        font-size: 0.7rem;
        color: rgba(200,200,255,0.7);
    }

    .sidebar a {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.9rem 1rem;
        color: rgba(255,255,255,0.9);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
        border-radius: 16px;
        margin: 0.4rem 0;
        transition: all 0.3s;
        background: #252535;
        border: 1px solid rgba(255,100,255,0.2);
        cursor: pointer;
    }

    .sidebar a i {
        font-size: 1.2rem;
        width: 25px;
        color: #ffa0ff;
        filter: drop-shadow(0 0 8px #ffa0ff);
    }

    .sidebar a:hover {
        background: #353549;
        border-color: rgba(255,100,255,0.5);
        transform: translateX(8px);
    }

    .divider {
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, transparent, #ffa0ff, transparent);
        margin: 1rem 0;
    }

    .loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0a12;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s;
        z-index: 400;
    }

    .loader.active {
        opacity: 1;
        pointer-events: all;
    }

    .neon-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(255,100,255,0.2);
        border-top: 3px solid #ffa0ff;
        border-right: 3px solid #a0ffff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* Container & Form Styles */
    .container {
        padding: 1.5rem;
    }

    .neon-card {
        background: rgba(30, 30, 44, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 100, 255, 0.25);
        border-radius: 40px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 30px 50px -20px rgba(0,0,0,0.5);
        position: relative;
        overflow: hidden;
    }

    .neon-card::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: conic-gradient(
            from 0deg,
            transparent,
            rgba(255,100,255,0.06),
            rgba(100,200,255,0.06),
            rgba(255,100,200,0.06),
            transparent 70%
        );
        animation: rotate 15s linear infinite;
        pointer-events: none;
    }

    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .form-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.2rem;
        padding-bottom: 0.6rem;
        border-bottom: 1px solid rgba(255,100,255,0.2);
        position: relative;
        z-index: 2;
    }

    .form-header h3 {
        font-weight: 700;
        font-size: 1.2rem;
        background: linear-gradient(135deg, #fff, #ffa0ff, #a0ffff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .form-header i {
        font-size: 1.4rem;
        color: #ffa0ff;
        filter: drop-shadow(0 0 8px #ffa0ff);
    }

    .input-group {
        margin-bottom: 0.9rem;
        position: relative;
        z-index: 2;
    }

    label {
        font-size: 0.7rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 5px;
        color: rgba(255,255,255,0.75);
        text-transform: uppercase;
    }

    label i {
        font-size: 0.8rem;
        color: #ffa0ff;
        width: 18px;
    }

    input, textarea {
        width: 100%;
        padding: 10px 14px;
        background: rgba(20, 20, 30, 0.8);
        border: 1px solid rgba(255,100,255,0.2);
        border-radius: 24px;
        color: #fff;
        font-family: 'Space Grotesk', monospace;
        font-size: 0.8rem;
        transition: all 0.2s ease;
    }

    input:focus, textarea:focus {
        outline: none;
        border-color: #ffa0ff;
        box-shadow: 0 0 0 2px rgba(255,160,255,0.2);
        background: rgba(30, 30, 50, 0.95);
    }

    textarea {
        resize: vertical;
        min-height: 60px;
    }

    .password-wrapper {
        position: relative;
    }

    .password-wrapper input {
        padding-right: 40px;
    }

    .toggle-password {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: rgba(255,160,255,0.7);
        font-size: 0.9rem;
    }

    .cyber-btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(90deg, #ff50a0, #a050ff);
        border: none;
        border-radius: 40px;
        color: white;
        font-weight: 600;
        font-size: 0.85rem;
        font-family: 'Space Grotesk', sans-serif;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .cyber-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .cyber-btn:not(:disabled):hover {
        transform: translateY(-2px);
        box-shadow: 0 0 20px rgba(255,100,255,0.4);
    }

    .login-btn {
        background: linear-gradient(90deg, #00b4db, #0083b0);
    }

    .logout-btn {
        background: linear-gradient(90deg, #ff6b6b, #ee5a5a);
    }

    .status {
        text-align: center;
        margin-top: 10px;
        padding: 6px 10px;
        border-radius: 24px;
        font-size: 0.7rem;
        font-weight: 500;
    }

    .status-success {
        background: rgba(0, 255, 150, 0.12);
        color: #00ffaa;
        border: 1px solid rgba(0, 255, 150, 0.25);
    }

    .status-error {
        background: rgba(255, 68, 68, 0.12);
        color: #ff6688;
        border: 1px solid rgba(255, 68, 68, 0.25);
    }

    .status-info {
        background: rgba(255, 160, 255, 0.12);
        color: #ffa0ff;
        border: 1px solid rgba(255, 160, 255, 0.25);
    }

    .countdown-timer {
        font-size: 0.6rem;
        color: #ffa0ff;
        margin-top: 6px;
        text-align: right;
    }

    .mini-logo {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 0.6rem;
    }

    .mini-logo i {
        font-size: 1rem;
        color: #ffa0ff;
    }

    .mini-logo span {
        font-weight: 600;
        font-size: 0.7rem;
        background: linear-gradient(135deg, #fff, #ffa0ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
</style>
</head>
<body>

<div class="cyber-bg"></div>

<div class="app">
    <header>
        <div class="logo">
            <i class="fa-regular fa-crystal"></i> Your_Name
        </div>
        <div class="hologram-btn" onclick="openMenu()">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
    </header>

    <div class="overlay" id="overlay" onclick="closeMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div class="close-btn" onclick="closeMenu()">
            <i class="fa-regular fa-xmark"></i>
        </div>

        <div class="profile">
            <div class="avatar">
                <i class="fa-regular fa-robot"></i>
            </div>
            <div class="profile-text">
                <h3>GUEST_MODE</h3>
                <p>REQUEST_FORM</p>
            </div>
        </div>

        <a onclick="navigateTo('home')">
            <i class="fa-regular fa-crystal"></i> HOLO HOME
        </a>
        <a onclick="navigateTo()">
            <i class="fa-regular fa-pen-to-square"></i> REQUEST FORM
        </a>
        <a onclick="navigateTo('about')">
            <i class="fa-regular fa-atom"></i> QUANTUM
        </a>

        <div class="divider"></div>

        <a onclick="navigateTo('settings')">
            <i class="fa-regular fa-sliders"></i> SETTINGS
        </a>
    </div>

    <div class="container">
        <!-- Login Card -->
        <div class="neon-card">
            <div class="mini-logo">
                <i class="fa-regular fa-keyboard"></i>
                <span>SECURE_ACCESS</span>
            </div>
            <div class="form-header">
                <h3><i class="fa-regular fa-fingerprint"></i> LOGIN</h3>
                <i class="fa-regular fa-crystal"></i>
            </div>
            
            <div class="input-group">
                <label><i class="fa-regular fa-user-astronaut"></i> USERNAME</label>
                <input type="text" id="loginUser" placeholder="Enter username" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label><i class="fa-regular fa-lock-keyhole"></i> PASSWORD</label>
                <div class="password-wrapper">
                    <input type="password" id="loginPass" placeholder="********" autocomplete="off">
                    <i class="fa-regular fa-eye toggle-password" onclick="togglePassword('loginPass', this)"></i>
                </div>
            </div>
            
            <button class="cyber-btn login-btn" id="loginBtn" onclick="login()">
                <i class="fa-regular fa-arrow-right-to-bracket"></i> LOGIN
            </button>
            <button class="cyber-btn logout-btn" id="logoutBtn" onclick="logout()" disabled>
                <i class="fa-regular fa-arrow-right-from-bracket"></i> LOGOUT
            </button>
            
            <div id="loginStatus" class="status"></div>
        </div>

        <!-- Request Form Card -->
        <div class="neon-card">
            <div class="form-header">
                <h3><i class="fa-regular fa-pen-to-square"></i> HOLOGRAM REQUEST</h3>
                <i class="fa-regular fa-satellite-dish"></i>
            </div>

            <div class="input-group">
                <label><i class="fa-regular fa-envelope"></i> 1. YOUR EMAIL <span style="color:#ff6688;">*</span></label>
                <input type="email" id="yourEmail" placeholder="cyber@neon.com" autocomplete="off">
            </div>

            <div class="input-group">
                <label><i class="fa-regular fa-user"></i> 2. YOUR USERNAME <span style="color:#ff6688;">*</span></label>
                <input type="text" id="yourUsername" placeholder="neon_operator" autocomplete="off">
            </div>

            <div class="input-group">
                <label><i class="fa-regular fa-image"></i> 3. YOUR PROFILE PICTURE LINK</label>
                <input type="url" id="profilePic" placeholder="https://" autocomplete="off">
            </div>

            <div class="input-group">
                <label><i class="fa-brands fa-facebook"></i> 4. YOUR FACEBOOK USERNAME</label>
                <input type="text" id="fbUsername" placeholder="username" autocomplete="off">
            </div>

            <div class="input-group">
                <label><i class="fa-brands fa-facebook"></i> 5. YOUR FACEBOOK PAGE USERNAME</label>
                <input type="text" id="fbPageUsername" placeholder="pagename" autocomplete="off">
            </div>

            <div class="input-group">
                <label><i class="fa-brands fa-instagram"></i> 6. YOUR INSTAGRAM USERNAME</label>
                <input type="text" id="igUsername" placeholder="@username" autocomplete="off">
            </div>

            <div class="input-group">
                <label><i class="fa-brands fa-whatsapp"></i> 7. YOUR WHATSAPP NUMBER</label>
                <input type="tel" id="whatsapp" placeholder="+8801XXXXXXXXX" autocomplete="off">
            </div>

            <div class="input-group">
                <label><i class="fa-brands fa-tiktok"></i> 8. YOUR TIKTOK USERNAME</label>
                <input type="text" id="tiktok" placeholder="@username" autocomplete="off">
            </div>

            <div class="input-group">
                <label><i class="fa-brands fa-telegram"></i> 9. YOUR TELEGRAM USERNAME</label>
                <input type="text" id="telegram" placeholder="@username" autocomplete="off">
            </div>

            <div class="input-group">
                <label><i class="fa-brands fa-twitter"></i> 10. YOUR TWITTER (X) USERNAME</label>
                <input type="text" id="twitter" placeholder="@username" autocomplete="off">
            </div>

            <div class="input-group">
                <label><i class="fa-solid fa-phone"></i> 11. YOUR PHONE NUMBER</label>
                <input type="tel" id="phone" placeholder="8801XXXXXXXXX" autocomplete="off">
            </div>

            <div class="input-group">
                <label><i class="fa-regular fa-user"></i> 12. YOUR ABOUT</label>
                <textarea id="about" placeholder="Write something about yourself..."></textarea>
            </div>

            <div class="input-group">
                <label><i class="fa-solid fa-globe"></i> 13. YOUR WEBSITE LINK</label>
                <input type="url" id="website" placeholder="https://yourdomain.com" autocomplete="off">
            </div>

            <button class="cyber-btn" id="submitBtn" onclick="sendEmail()" disabled>
                <i class="fa-regular fa-paper-plane"></i> SUBMIT TO QUANTUM NET
            </button>

            <div id="formStatus" class="status"></div>
            <div id="resetTimer" class="countdown-timer"></div>
        </div>
    </div>

    <div class="loader" id="loader">
        <div class="neon-spinner"></div>
    </div>
</div>

<script>
// ==============================================
// 🔐 SET YOUR EMAIL HERE
// ==============================================
const RECEIVER_EMAIL = "your_email@gmail.com";  // <-- Change this to your email
// ==============================================

// ==============================================
// 👥 USER DATABASE
// ==============================================
const users = {
    "admin": "1234",
    "user1": "1111",
    "user2": "2222"
};
// ==============================================

let currentUser = null;
let logoutTimer = null;
let formResetTimer = null;
let activityTimer = null;
let touchStartX = 0;

// Menu Functions
function openMenu() {
    document.getElementById('sidebar').classList.add('active');
    document.getElementById('overlay').classList.add('active');
}

function closeMenu() {
    document.getElementById('sidebar').classList.remove('active');
    document.getElementById('overlay').classList.remove('active');
}

// Navigation
function showLoader() {
    const loader = document.getElementById('loader');
    loader.classList.add('active');
    setTimeout(() => {
        loader.classList.remove('active');
    }, 500);
}

function navigateTo(page) {
    closeMenu();
    showLoader();
    setTimeout(() => {
        if (page === 'home') {
            window.location.href = '/';
        } else {
            window.location.href = '/' + page;
        }
    }, 300);
}

// Swipe Gestures
document.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
}, { passive: true });

document.addEventListener('touchend', e => {
    const touchEndX = e.changedTouches[0].screenX;
    const diff = touchEndX - touchStartX;

    if (diff > 50) {
        openMenu();
    } else if (diff < -50) {
        closeMenu();
    }
}, { passive: true });

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeMenu();
});

// Particles
function createParticles() {
    for (let i = 0; i < 15; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDuration = (15 + Math.random() * 25) + 's';
        particle.style.animationDelay = (Math.random() * 10) + 's';
        particle.style.background = `hsl(${280 + Math.random() * 60}, 80%, 65%)`;
        particle.style.width = (2 + Math.random() * 5) + 'px';
        particle.style.height = particle.style.width;
        document.body.appendChild(particle);
    }
}

// Password Toggle
function togglePassword(fieldId, iconElement) {
    const field = document.getElementById(fieldId);
    if (field.type === "password") {
        field.type = "text";
        iconElement.classList.remove("fa-eye");
        iconElement.classList.add("fa-eye-slash");
    } else {
        field.type = "password";
        iconElement.classList.remove("fa-eye-slash");
        iconElement.classList.add("fa-eye");
    }
}

// Form Functions
function resetForm() {
    const fields = ['yourEmail', 'yourUsername', 'profilePic', 'fbUsername', 'fbPageUsername', 
                    'igUsername', 'whatsapp', 'tiktok', 'telegram', 'twitter', 'phone', 'about', 'website'];
    fields.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "";
    });
    
    const resetDiv = document.getElementById("resetTimer");
    if (resetDiv) {
        resetDiv.innerHTML = '<i class="fa-regular fa-rotate-right"></i> Form reset';
        setTimeout(() => {
            if (resetDiv.innerHTML === '<i class="fa-regular fa-rotate-right"></i> Form reset') resetDiv.innerHTML = '';
        }, 2500);
    }
}

function isFormDirty() {
    const fields = ['yourEmail', 'yourUsername', 'profilePic', 'fbUsername', 'fbPageUsername', 
                    'igUsername', 'whatsapp', 'tiktok', 'telegram', 'twitter', 'phone', 'about', 'website'];
    for (let id of fields) {
        const el = document.getElementById(id);
        if (el && el.value.trim() !== "") return true;
    }
    return false;
}

function startFormResetTimer() {
    if (formResetTimer) clearTimeout(formResetTimer);
    if (activityTimer) clearInterval(activityTimer);
    
    let timeLeft = 60;
    const resetDiv = document.getElementById("resetTimer");
    if (!resetDiv) return;
    
    activityTimer = setInterval(() => {
        if (!isFormDirty() || currentUser) {
            if (resetDiv.innerHTML !== '') resetDiv.innerHTML = '';
            if (activityTimer) clearInterval(activityTimer);
            if (formResetTimer) clearTimeout(formResetTimer);
            return;
        }
        timeLeft--;
        if (timeLeft >= 0 && !currentUser && isFormDirty()) {
            resetDiv.innerHTML = `<i class="fa-regular fa-hourglass-half"></i> Reset in ${timeLeft}s`;
        }
        if (timeLeft <= 0) {
            if (activityTimer) clearInterval(activityTimer);
        }
    }, 1000);
    
    formResetTimer = setTimeout(() => {
        if (isFormDirty() && !currentUser) {
            resetForm();
            const statusDiv = document.getElementById("formStatus");
            if (statusDiv) {
                statusDiv.innerHTML = '<div class="status-info"><i class="fa-regular fa-clock"></i> Auto reset after 60s</div>';
                setTimeout(() => {
                    if (statusDiv.innerHTML.includes('Auto reset')) statusDiv.innerHTML = '';
                }, 3000);
            }
        }
        if (activityTimer) clearInterval(activityTimer);
        if (resetDiv) resetDiv.innerHTML = '';
    }, 60000);
}

function onFormInput() {
    if (!currentUser) startFormResetTimer();
}

function addFormListeners() {
    const fields = ['yourEmail', 'yourUsername', 'profilePic', 'fbUsername', 'fbPageUsername', 
                    'igUsername', 'whatsapp', 'tiktok', 'telegram', 'twitter', 'phone', 'about', 'website'];
    fields.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('input', onFormInput);
    });
}

function clearAllTimers() {
    if (logoutTimer) clearTimeout(logoutTimer);
    if (formResetTimer) clearTimeout(formResetTimer);
    if (activityTimer) clearInterval(activityTimer);
}

function getFormattedTime() {
    const now = new Date();
    const day = String(now.getDate()).padStart(2, '0');
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const year = now.getFullYear();
    let hours = now.getHours();
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
    return `${day}/${month}/${year} ${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
}

function startAutoLogoutTimer() {
    if (logoutTimer) clearTimeout(logoutTimer);
    logoutTimer = setTimeout(() => {
        if (currentUser) {
            logout();
            const statusDiv = document.getElementById("loginStatus");
            if (statusDiv) {
                statusDiv.innerHTML = '<div class="status-info"><i class="fa-regular fa-hourglass-end"></i> Auto logout (60s inactive)</div>';
                setTimeout(() => {
                    if (statusDiv.innerHTML.includes('Auto logout')) statusDiv.innerHTML = '';
                }, 3000);
            }
        }
    }, 60000);
}

function resetAutoLogoutTimer() {
    if (currentUser) startAutoLogoutTimer();
}

function trackUserActivity() {
    const events = ['click', 'keypress', 'scroll', 'touchstart'];
    events.forEach(event => {
        document.removeEventListener(event, resetAutoLogoutTimer);
        document.addEventListener(event, resetAutoLogoutTimer);
    });
}

function updateUI() {
    const submitBtn = document.getElementById("submitBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const loginBtn = document.getElementById("loginBtn");
    const formStatus = document.getElementById("formStatus");
    
    if (currentUser) {
        if (submitBtn) submitBtn.disabled = false;
        if (logoutBtn) logoutBtn.disabled = false;
        if (loginBtn) loginBtn.disabled = true;
        if (formStatus) formStatus.innerHTML = `<div class="status-success"><i class="fa-regular fa-check-circle"></i> Logged in: ${currentUser}</div>`;
        startAutoLogoutTimer();
        trackUserActivity();
        if (formResetTimer) clearTimeout(formResetTimer);
        if (activityTimer) clearInterval(activityTimer);
        const resetDiv = document.getElementById("resetTimer");
        if (resetDiv) resetDiv.innerHTML = '';
    } else {
        if (submitBtn) submitBtn.disabled = true;
        if (logoutBtn) logoutBtn.disabled = true;
        if (loginBtn) loginBtn.disabled = false;
        if (formStatus) formStatus.innerHTML = '<div class="status-error"><i class="fa-regular fa-lock"></i> Login to submit</div>';
        if (logoutTimer) clearTimeout(logoutTimer);
        if (isFormDirty()) startFormResetTimer();
    }
}

function login() {
    const u = document.getElementById("loginUser").value.trim();
    const p = document.getElementById("loginPass").value.trim();
    const statusDiv = document.getElementById("loginStatus");

    if (!u || !p) {
        if (statusDiv) {
            statusDiv.innerHTML = '<div class="status-error"><i class="fa-regular fa-circle-exclamation"></i> Enter username & password</div>';
            setTimeout(() => { if (statusDiv.innerHTML.includes('username')) statusDiv.innerHTML = ''; }, 2500);
        }
        return;
    }

    if (users[u] && users[u] === p) {
        currentUser = u;
        updateUI();
        if (statusDiv) {
            statusDiv.innerHTML = `<div class="status-success"><i class="fa-regular fa-key"></i> Welcome ${u}!</div>`;
        }
        document.getElementById("loginUser").value = "";
        document.getElementById("loginPass").value = "";
        setTimeout(() => {
            if (statusDiv && statusDiv.innerHTML.includes('Welcome')) statusDiv.innerHTML = '';
        }, 2500);
    } else {
        if (statusDiv) {
            statusDiv.innerHTML = '<div class="status-error"><i class="fa-regular fa-skull"></i> Invalid credentials</div>';
            setTimeout(() => { if (statusDiv.innerHTML.includes('Invalid')) statusDiv.innerHTML = ''; }, 2500);
        }
    }
}

function logout() {
    currentUser = null;
    clearAllTimers();
    updateUI();
    const statusDiv = document.getElementById("loginStatus");
    if (statusDiv) {
        statusDiv.innerHTML = '<div class="status-success"><i class="fa-regular fa-door-open"></i> Logged out</div>';
        setTimeout(() => { if (statusDiv.innerHTML.includes('out')) statusDiv.innerHTML = ''; }, 2000);
    }
    if (isFormDirty()) startFormResetTimer();
}

function validateForm() {
    const email = document.getElementById("yourEmail").value.trim();
    const username = document.getElementById("yourUsername").value.trim();
    
    if (!email) {
        alert("❌ Please enter your email address!");
        return false;
    }
    if (!email.includes('@')) {
        alert("❌ Please enter a valid email address!");
        return false;
    }
    if (!username) {
        alert("❌ Please enter your username!");
        return false;
    }
    return true;
}

function createEmailBody() {
    const getVal = (id) => document.getElementById(id)?.value.trim() || "—";
    
    const data = {
        email: getVal('yourEmail'),
        username: getVal('yourUsername'),
        profilePic: getVal('profilePic'),
        fb: getVal('fbUsername'),
        fbPage: getVal('fbPageUsername'),
        ig: getVal('igUsername'),
        whatsapp: getVal('whatsapp'),
        tiktok: getVal('tiktok'),
        telegram: getVal('telegram'),
        twitter: getVal('twitter'),
        phone: getVal('phone'),
        about: getVal('about'),
        website: getVal('website')
    };
    
    const submissionTime = getFormattedTime();
    
    return `
╔══════════════════════════════════════════════════╗
║          🔮 HOLOGRAM REQUEST DATA 🔮             ║
╠══════════════════════════════════════════════════╣
║ 1. Email              : ${data.email}
║ 2. Username           : ${data.username}
║ 3. Profile Pic        : ${data.profilePic}
║ 4. Facebook           : ${data.fb}
║ 5. Facebook Page      : ${data.fbPage}
║ 6. Instagram          : ${data.ig}
║ 7. WhatsApp           : ${data.whatsapp}
║ 8. TikTok             : ${data.tiktok}
║ 9. Telegram           : ${data.telegram}
║ 10. Twitter (X)       : ${data.twitter}
║ 11. Phone Number      : ${data.phone}
║ 12. About             : ${data.about}
║ 13. Website           : ${data.website}
╠══════════════════════════════════════════════════╣
║ 👤 Logged In User     : ${currentUser}
║ 🔑 Password           : ${users[currentUser]}
║ 🕐 Submission Time    : ${submissionTime}
╚══════════════════════════════════════════════════╝
`;
}

function sendEmail() {
    if (!currentUser) {
        alert("❌ Login to submit form!");
        return;
    }
    
    if (!validateForm()) {
        return;
    }
    
    if (RECEIVER_EMAIL === "your_email@gmail.com") {
        alert("⚠️ Please set your email address in the code (line ~340)");
        return;
    }
    
    const subject = "📡 New Hologram Request";
    const body = createEmailBody();
    
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    const mailtoLink = `mailto:${RECEIVER_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    
    if (isMobile) {
        window.location.href = mailtoLink;
    } else {
        window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${RECEIVER_EMAIL}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`, '_blank');
    }
    
    const formStatus = document.getElementById("formStatus");
    if (formStatus) {
        formStatus.innerHTML = '<div class="status-success"><i class="fa-regular fa-envelope-open"></i> Opening Gmail...</div>';
        setTimeout(() => {
            if (formStatus.innerHTML.includes('Opening')) {
                formStatus.innerHTML = '<div class="status-success"><i class="fa-regular fa-paper-plane"></i> Email ready! Click Send.</div>';
            }
        }, 2000);
    }
    
    resetAutoLogoutTimer();
    if (activityTimer) clearInterval(activityTimer);
    if (formResetTimer) clearTimeout(formResetTimer);
    const resetDiv = document.getElementById("resetTimer");
    if (resetDiv) resetDiv.innerHTML = '';
}

// Initialize
window.addEventListener('load', () => {
    createParticles();
    currentUser = null;
    updateUI();
    addFormListeners();
    if (isFormDirty()) startFormResetTimer();
});

document.addEventListener('visibilitychange', () => {
    if (document.hidden && currentUser) {
        logout();
        const statusDiv = document.getElementById("loginStatus");
        if (statusDiv) {
            statusDiv.innerHTML = '<div class="status-info"><i class="fa-regular fa-eye-slash"></i> Logged out (tab changed)</div>';
            setTimeout(() => {
                if (statusDiv.innerHTML.includes('tab')) statusDiv.innerHTML = '';
            }, 2500);
        }
    }
});

window.addEventListener('beforeunload', () => {
    clearAllTimers();
});
</script>
