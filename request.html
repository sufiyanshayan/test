<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Request Form</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 20px; }
        form { max-width: 500px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input[type="text"], input[type="url"] { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; border: none; border-radius: 5px; background: #007bff; color: #fff; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h2>Social Media Request Form</h2>
    <form id="requestForm">
        <label>Name:</label>
        <input type="text" id="name" required placeholder="Your Name">

        <label>Facebook Link:</label>
        <input type="url" id="facebook" placeholder="https://facebook.com/username">

        <label>Instagram Link:</label>
        <input type="url" id="instagram" placeholder="https://instagram.com/username">

        <label>Twitter Link:</label>
        <input type="url" id="twitter" placeholder="https://twitter.com/username">

        <button type="submit">Submit Request</button>
    </form>

    <p id="status"></p>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        // 🔹 Firebase Config (Firebase Project থেকে পাবে)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Form Submit
        const form = document.getElementById('requestForm');
        const status = document.getElementById('status');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const facebook = document.getElementById('facebook').value;
            const instagram = document.getElementById('instagram').value;
            const twitter = document.getElementById('twitter').value;

            const newRequest = {
                name,
                facebook,
                instagram,
                twitter,
                timestamp: new Date().toISOString()
            };

            // Save to Firebase
            const requestRef = database.ref('requests').push();
            requestRef.set(newRequest)
            .then(() => {
                status.textContent = "Request submitted successfully!";
                form.reset();
            })
            .catch((error) => {
                status.textContent = "Error submitting request: " + error;
            });
        });
    </script>
</body>
</html>
