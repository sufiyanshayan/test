<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Form</title>

<style>
body{
    font-family: Arial;
    background:#0f0c29;
    color:white;
    display:flex;
    justify-content:center;
}

.container{
    width:360px;
    padding:20px;
}

.box{
    background:#1a1a2e;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
}

h3{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    background:#ff00cc;
    border:none;
    border-radius:10px;
    color:white;
    margin-top:8px;
}
</style>
</head>

<body>

<div class="container">

<!-- 🔥 FORM -->
<div class="box">
<h3>Submit Your Links</h3>

<form id="form" action="https://formsubmit.co/inyt_444@outlook.com" method="POST">

<!-- USER EMAIL -->
<input type="email" name="email" placeholder="Your Email" required>

<!-- YOUR FIELDS -->
<input type="text" name="profile_pic" placeholder="Profile Picture Link">

<input type="text" name="facebook" placeholder="Facebook">
<input type="text" name="facebook_page" placeholder="Facebook Page">
<input type="text" name="instagram" placeholder="Instagram">
<input type="text" name="whatsapp" placeholder="WhatsApp">
<input type="text" name="tiktok" placeholder="TikTok">
<input type="text" name="telegram" placeholder="Telegram">
<input type="text" name="twitter" placeholder="Twitter (X)">
<input type="text" name="call" placeholder="Phone Number">
<input type="text" name="about" placeholder="About">
<input type="text" name="website" placeholder="Website">

<!-- HIDDEN SETTINGS -->
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="New User Submission">
<input type="hidden" name="_template" value="table">

<button type="submit">Submit</button>

</form>

<p id="msg" style="text-align:center;"></p>
</div>

<!-- 🔐 LOGIN -->
<div class="box">
<h3>Login</h3>

<input type="text" id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>

</div>

<script>
// 🔐 USER DATABASE
const users = {
    "admin":"admin",
    "user1":"1111",
    "user2":"2222"
};

// LOGIN
function login(){
    let u = document.getElementById("loginUser").value.trim();
    let p = document.getElementById("loginPass").value.trim();

    if(users[u] && users[u] === p){
        localStorage.setItem("user", u);
        alert("Login Successful ✅");
    } else {
        alert("Wrong Username or Password ❌");
    }
}

// LOGOUT
function logout(){
    localStorage.removeItem("user");
    alert("Logged out 🚪");
}

// SUBMIT CONTROL
document.getElementById("form").addEventListener("submit", function(e){

    if(!localStorage.getItem("user")){
        e.preventDefault();
        alert("Login required ❌");
        return;
    }

});
</script>

</body>
</html>
