<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your_Name · dynamic logo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', 'Times New Roman', serif;
            background: #faf7f2;
            color: #2c2c2c;
            line-height: 1.6;
            overflow-x: hidden;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500&display=swap');

        /* Navigation */
        .navbar {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            font-family: 'Montserrat', sans-serif;
        }

        /* ===== EDITABLE LOGO ===== */
        .logo {
            display: inline-block;
            white-space: nowrap;
            font-weight: 300;
            letter-spacing: 8px;
            color: #1a1a1a;
            text-decoration: none;
            text-transform: uppercase;
            position: relative;
            z-index: 1001;
            font-size: 28px;
            padding: 0 2px 0 0;
            line-height: 1.2;
            transform-origin: left center;
            transition: font-size 0.2s ease;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 40px;
            height: 1px;
            background: #9b8b7a;
            transition: width 0.3s ease;
        }

        .logo:hover::after {
            width: 100%;
        }

        /* Hamburger Menu */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            z-index: 1001;
            padding: 15px;
            background: rgba(155, 139, 122, 0.05);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .hamburger:hover {
            background: rgba(155, 139, 122, 0.1);
            transform: scale(1.05);
        }

        .hamburger span {
            width: 30px;
            height: 2px;
            background: #2c2c2c;
            margin: 3px 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-radius: 4px;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 6px);
            width: 25px;
            background: #9b8b7a;
        }

        .hamburger.active span:nth-child(2) {
            transform: translateX(-20px);
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(8px, -6px);
            width: 25px;
            background: #9b8b7a;
        }

        /* Navigation Links */
        .nav-links {
            display: flex;
            gap: 40px;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .nav-links a {
            color: #3a3a3a;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
            position: relative;
            padding: 10px 15px;
            transition: all 0.3s ease;
            border-radius: 30px;
            overflow: hidden;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(155, 139, 122, 0.1), transparent);
            transition: left 0.5s ease;
            z-index: -1;
        }

        .nav-links a:hover::before {
            left: 100%;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 20px;
            height: 2px;
            background: #9b8b7a;
            transition: transform 0.3s ease;
            border-radius: 2px;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            transform: translateX(-50%) scaleX(1);
        }

        .nav-links a.active {
            color: #9b8b7a;
            background: rgba(155, 139, 122, 0.05);
        }

        /* Mobile Menu */
        @media (max-width: 768px) {
            .navbar {
                padding: 15px 25px;
            }

            .hamburger {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 100%;
                height: 100vh;
                background: rgba(255, 255, 255, 0.98);
                backdrop-filter: blur(10px);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 25px;
                transition: right 0.6s cubic-bezier(0.77, 0, 0.175, 1);
                z-index: 1000;
            }

            .nav-links.active {
                right: 0;
            }

            .nav-links.active a {
                animation: slideIn 0.5s forwards;
                animation-delay: calc(0.1s * var(--i));
                opacity: 0;
            }

            @keyframes slideIn {
                0% {
                    opacity: 0;
                    transform: translateY(30px) scale(0.9);
                }
                100% {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }

            .nav-links a {
                font-size: 24px;
                padding: 15px 30px;
                width: 80%;
                text-align: center;
            }

            .nav-links a:active {
                transform: scale(0.95);
            }
        }

        /* Main Container */
        .main-container {
            margin-top: 100px;
            padding: 0 60px 60px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Page Transitions */
        .page {
            animation: pageFade 0.8s ease;
        }

        @keyframes pageFade {
            from { 
                opacity: 0; 
                transform: translateY(30px);
            }
            to { 
                opacity: 1; 
                transform: translateY(0);
            }
        }

        /* Home Page */
        .home-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
            min-height: 80vh;
        }

        .hero-left {
            padding-right: 40px;
            border-right: 1px solid rgba(0, 0, 0, 0.1);
        }

        .hero-title {
            font-size: 80px;
            font-weight: 300;
            line-height: 1.1;
            margin-bottom: 30px;
            font-family: 'Cormorant Garamond', serif;
        }

        .hero-title span {
            display: block;
            font-style: italic;
            color: #9b8b7a;
            font-size: 60px;
            margin-top: 10px;
        }

        .hero-subtitle {
            font-size: 18px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            color: #666;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .hero-quote {
            font-size: 20px;
            font-style: italic;
            color: #9b8b7a;
            margin: 40px 0;
            padding: 20px 0;
            border-top: 1px solid rgba(155, 139, 122, 0.3);
            border-bottom: 1px solid rgba(155, 139, 122, 0.3);
        }

        .hero-right {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .art-piece {
            background: #fff;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .art-piece:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        .art-piece h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            letter-spacing: 3px;
            color: #9b8b7a;
            margin-bottom: 15px;
        }

        .floral-sketch {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #f8f4ed 0%, #fff 100%);
            position: relative;
            overflow: hidden;
            margin-top: 20px;
            border-radius: 4px;
        }

        .floral-sketch::before {
            content: '✧';
            font-size: 200px;
            position: absolute;
            top: -20px;
            right: -20px;
            color: rgba(155, 139, 122, 0.1);
            transform: rotate(15deg);
            animation: spin 20s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(15deg); }
            to { transform: rotate(375deg); }
        }

        /* Page Containers (Empty) */
        .page-container {
            background: #fff;
            padding: 60px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.02);
            border-radius: 4px;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-placeholder {
            text-align: center;
            color: #999;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            letter-spacing: 2px;
        }

        .page-placeholder::before {
            content: '✦';
            display: block;
            font-size: 60px;
            color: rgba(155, 139, 122, 0.2);
            margin-bottom: 20px;
        }

        /* Footer */
        .footer {
            margin-top: 100px;
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            color: #999;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .main-container {
                padding: 0 30px 40px;
            }

            .home-grid {
                grid-template-columns: 1fr;
            }

            .hero-left {
                border-right: none;
                padding-right: 0;
            }

            .hero-title {
                font-size: 60px;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 48px;
            }

            .hero-title span {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <!-- ============================================== -->
    <!-- ========== শুধু এই অংশটুকু এডিট করুন ========== -->
    <!-- ============================================== -->
    <script>
        // ================= আপনার তথ্য দিন =================
        const SITE_CONFIG = {
            // লোগো - আপনার নাম/ব্র্যান্ড
            logo: "FERNFIX",
            
            // ফুটার টেক্সট
            footer: "✦ MD ABU SUFIYAN MRIDHA SHAYAN ✦",
            
            // নেভিগেশন মেনুর নাম (৪টি)
            navLinks: ["Home", "Contact", "About", "Collection"],
            
            // হোম পেজের কন্টেন্ট
            home: {
                title: "Terrariums",
                titleSpan: "as Art",
                subtitle: "Handcrafted botanical sculptures",
                quote: "Bringing nature's architecture indoors",
                
                // প্রথম আর্ট পিস
                art1: {
                    title: "✦ THE PHILOSOPHY",
                    text: "Each piece is a delicate balance of form, texture, and living art. We create miniature landscapes that breathe life into your space."
                },
                
                // দ্বিতীয় আর্ট পিস
                art2: {
                    title: "✦ LATEST CREATION",
                    text: "The Emerald Cascade - A vertical garden of mosses and ferns"
                },
                
                // তৃতীয় আর্ট পিস
                art3: {
                    title: "✦ UPCOMING EXHIBITION",
                    text1: "March 15-30 | Botanical Arts Gallery",
                    text2: "Private viewing by appointment"
                }
            },
            
            // অন্যান্য পেজের কন্টেন্ট
            pages: {
                contact: "YOUR CONTENT HERE\n(Contact page)",
                about: "YOUR CONTENT HERE\n(About page)",
                products: "YOUR CONTENT HERE\n(Collection page)"
            }
        };
        // ========== আপনার তথ্য দেওয়া শেষ ==========
    </script>
    <!-- ============================================== -->

    <nav class="navbar">
        <!-- লোগো - উপরের SITE_CONFIG থেকে অটো আপডেট হবে -->
        <span class="logo" id="dynamicLogo"></span>

        <!-- Hamburger Icon -->
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- Navigation Links - অটো জেনারেট হবে -->
        <div class="nav-links" id="navLinks"></div>
    </nav>

    <div class="main-container">
        <!-- Home Page -->
        <div id="home-page" class="page">
            <div class="home-grid">
                <div class="hero-left">
                    <h1 class="hero-title" id="homeTitle">
                        <span id="homeTitleSpan"></span>
                    </h1>
                    <p class="hero-subtitle" id="homeSubtitle"></p>
                    
                    <div class="hero-quote" id="homeQuote"></div>
                    
                    <div class="art-piece">
                        <h3 id="art1Title"></h3>
                        <p id="art1Text"></p>
                    </div>
                </div>
                
                <div class="hero-right">
                    <div class="art-piece">
                        <h3 id="art2Title"></h3>
                        <p id="art2Text"></p>
                        <div class="floral-sketch"></div>
                    </div>
                    
                    <div class="art-piece">
                        <h3 id="art3Title"></h3>
                        <p id="art3Text1"></p>
                        <p style="font-size: 14px; margin-bottom: 0;" id="art3Text2"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Contact Page -->
        <div id="contact-page" class="page" style="display: none;">
            <div class="page-container">
                <div class="page-placeholder" id="contactContent"></div>
            </div>
        </div>

        <!-- About Page -->
        <div id="about-page" class="page" style="display: none;">
            <div class="page-container">
                <div class="page-placeholder" id="aboutContent"></div>
            </div>
        </div>

        <!-- Products Page -->
        <div id="products-page" class="page" style="display: none;">
            <div class="page-container">
                <div class="page-placeholder" id="productsContent"></div>
            </div>
        </div>
        
        <div class="footer" id="footerText"></div>
    </div>

    <script>
        // ========== কনফিগারেশন থেকে সব কন্টেন্ট লোড ==========
        function loadContent() {
            // লোগো সেট করুন
            document.getElementById('dynamicLogo').innerText = SITE_CONFIG.logo;
            
            // ফুটার সেট করুন
            document.getElementById('footerText').innerText = SITE_CONFIG.footer;
            
            // হোম পেজ কন্টেন্ট সেট করুন
            document.querySelector('.hero-title').innerHTML = `${SITE_CONFIG.home.title} <span>${SITE_CONFIG.home.titleSpan}</span>`;
            document.getElementById('homeSubtitle').innerText = SITE_CONFIG.home.subtitle;
            document.getElementById('homeQuote').innerText = SITE_CONFIG.home.quote;
            document.getElementById('art1Title').innerText = SITE_CONFIG.home.art1.title;
            document.getElementById('art1Text').innerText = SITE_CONFIG.home.art1.text;
            document.getElementById('art2Title').innerText = SITE_CONFIG.home.art2.title;
            document.getElementById('art2Text').innerText = SITE_CONFIG.home.art2.text;
            document.getElementById('art3Title').innerText = SITE_CONFIG.home.art3.title;
            document.getElementById('art3Text1').innerText = SITE_CONFIG.home.art3.text1;
            document.getElementById('art3Text2').innerText = SITE_CONFIG.home.art3.text2;
            
            // অন্যান্য পেজ কন্টেন্ট সেট করুন
            document.getElementById('contactContent').innerHTML = SITE_CONFIG.pages.contact.replace(/\n/g, '<br>');
            document.getElementById('aboutContent').innerHTML = SITE_CONFIG.pages.about.replace(/\n/g, '<br>');
            document.getElementById('productsContent').innerHTML = SITE_CONFIG.pages.products.replace(/\n/g, '<br>');
            
            // নেভিগেশন লিংক জেনারেট করুন
            const navLinks = document.getElementById('navLinks');
            navLinks.innerHTML = '';
            
            SITE_CONFIG.navLinks.forEach((linkName, index) => {
                const pageId = linkName.toLowerCase();
                const a = document.createElement('a');
                a.href = '#';
                a.setAttribute('onclick', `showPage('${pageId}'); closeMenu();`);
                a.id = `${pageId}-link`;
                a.style.setProperty('--i', index + 1);
                a.innerText = linkName;
                
                if (linkName === 'Home') a.classList.add('active');
                
                navLinks.appendChild(a);
            });
        }

        // ========== ডায়নামিক লোগো সাইজ অ্যাডজাস্ট ==========
        function adjustLogoSize() {
            const logo = document.getElementById('dynamicLogo');
            if (!logo) return;

            const maxFontSize = 28;
            const minFontSize = 10;
            
            const parentNav = document.querySelector('.navbar');
            const navLinks = document.querySelector('.nav-links');
            const hamburger = document.querySelector('.hamburger');
            
            const navRect = parentNav.getBoundingClientRect();
            const linksRect = navLinks.getBoundingClientRect();
            const hamburgerRect = hamburger.getBoundingClientRect();
            
            let rightBoundary;
            if (window.getComputedStyle(hamburger).display !== 'none') {
                rightBoundary = hamburgerRect.left;
            } else {
                rightBoundary = linksRect.left - 20;
            }
            
            const logoRect = logo.getBoundingClientRect();
            const startX = logoRect.left;
            const maxAllowedWidth = rightBoundary - startX - 5;
            
            if (maxAllowedWidth < 10) {
                logo.style.fontSize = maxFontSize + 'px';
                return;
            }
            
            const measureSpan = document.createElement('span');
            measureSpan.style.position = 'absolute';
            measureSpan.style.left = '-9999px';
            measureSpan.style.top = '-9999px';
            measureSpan.style.visibility = 'hidden';
            measureSpan.style.whiteSpace = 'nowrap';
            measureSpan.style.fontFamily = window.getComputedStyle(logo).fontFamily;
            measureSpan.style.fontWeight = window.getComputedStyle(logo).fontWeight;
            measureSpan.style.letterSpacing = window.getComputedStyle(logo).letterSpacing;
            measureSpan.style.textTransform = window.getComputedStyle(logo).textTransform;
            measureSpan.style.fontSize = maxFontSize + 'px';
            measureSpan.innerText = logo.innerText;
            
            document.body.appendChild(measureSpan);
            
            let currentFontSize = maxFontSize;
            let textWidth = measureSpan.getBoundingClientRect().width;
            
            if (textWidth <= maxAllowedWidth) {
                logo.style.fontSize = maxFontSize + 'px';
                document.body.removeChild(measureSpan);
                return;
            }
            
            let low = minFontSize;
            let high = maxFontSize;
            let bestFit = minFontSize;
            
            for (let i = 0; i < 10; i++) {
                let mid = (low + high) / 2;
                measureSpan.style.fontSize = mid + 'px';
                let width = measureSpan.getBoundingClientRect().width;
                
                if (width <= maxAllowedWidth) {
                    bestFit = mid;
                    low = mid;
                } else {
                    high = mid;
                }
            }
            
            logo.style.fontSize = Math.floor(bestFit * 10) / 10 + 'px';
            document.body.removeChild(measureSpan);
        }

        // ========== মেনু ফাংশন ==========
        function toggleMenu() {
            const hamburger = document.querySelector('.hamburger');
            const navLinks = document.querySelector('.nav-links');
            
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
            
            if (navLinks.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }

        function closeMenu() {
            const hamburger = document.querySelector('.hamburger');
            const navLinks = document.querySelector('.nav-links');
            
            hamburger.classList.remove('active');
            navLinks.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function showPage(pageName) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => {
                page.style.display = 'none';
            });

            const selectedPage = document.getElementById(pageName + '-page');
            if (selectedPage) {
                selectedPage.style.display = 'block';
            }

            const links = document.querySelectorAll('.nav-links a');
            links.forEach(link => {
                link.classList.remove('active');
            });
            
            const activeLink = document.getElementById(pageName + '-link');
            if (activeLink) {
                activeLink.classList.add('active');
            }

            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // ========== ইভেন্ট লিসেনার ==========
        window.addEventListener('load', function() {
            loadContent();
            adjustLogoSize();
            showPage('home');
        });
        
        window.addEventListener('resize', function() {
            adjustLogoSize();
        });

        window.addEventListener('orientationchange', function() {
            setTimeout(adjustLogoSize, 50);
        });

        // Close menu when clicking outside
        document.addEventListener('click', function(event) {
            const navLinks = document.querySelector('.nav-links');
            const hamburger = document.querySelector('.hamburger');
            
            if (navLinks.classList.contains('active') && 
                !navLinks.contains(event.target) && 
                !hamburger.contains(event.target)) {
                closeMenu();
            }
        });

        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) {
                closeMenu();
            }
        });
    </script>
</body>
</html>
