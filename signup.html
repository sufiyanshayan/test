<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sign Up | Hologram Access</title>
    <link rel="icon" href="#" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(145deg, #0a0a0f, #1a1a2e);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            background: #0f0f17;
            min-height: 100vh;
            position: relative;
            border-left: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 50, 100, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(80, 200, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(200, 100, 255, 0.15) 0%, transparent 50%),
                linear-gradient(145deg, #0a0a0f, #1a1a2e);
            z-index: -2;
            animation: breathe 10s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) translateX(50px); opacity: 0; }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: #14141e;
            border-bottom: 1px solid rgba(255,100,200,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #fff, #a0a0ff, #ffa0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo i {
            font-size: 1.1rem;
            color: #ffa0ff;
            filter: drop-shadow(0 0 8px #ffa0ff);
        }

        .hologram-btn {
            width: 48px;
            height: 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            border-radius: 40px;
            background: #1e1e2a;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .hologram-btn:hover {
            background: #2a2a3a;
            border-color: rgba(255,200,255,0.3);
        }

        .hologram-btn .line {
            width: 22px;
            height: 2px;
            background: linear-gradient(90deg, #ffa0ff, #a0a0ff);
            border-radius: 4px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 200;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .sidebar {
            position: fixed;
            right: -360px;
            top: 0;
            width: 300px;
            height: 100%;
            background: #1a1a26;
            box-shadow: -25px 0 50px rgba(0,0,0,0.5);
            transition: right 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 300;
            padding: 2rem 1.2rem;
            border-left: 1px solid rgba(255,100,255,0.3);
        }

        .sidebar.active {
            right: 0;
        }

        .close-btn {
            text-align: right;
            margin-bottom: 1.5rem;
            cursor: pointer;
        }

        .close-btn i {
            font-size: 1.6rem;
            color: rgba(255,200,255,0.8);
            transition: transform 0.3s;
        }

        .close-btn:hover i {
            transform: rotate(180deg) scale(1.1);
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,100,255,0.2);
            margin-bottom: 1.5rem;
        }

        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff50a0, #a050ff);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255,255,255,0.5);
        }

        .avatar i {
            font-size: 1.8rem;
            color: white;
        }

        .profile-text h3 {
            font-weight: 700;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #fff, #ffa0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-text p {
            font-size: 0.7rem;
            color: rgba(200,200,255,0.7);
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1rem;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            border-radius: 16px;
            margin: 0.4rem 0;
            transition: all 0.3s;
            background: #252535;
            border: 1px solid rgba(255,100,255,0.2);
            cursor: pointer;
        }

        .sidebar a i {
            font-size: 1.2rem;
            width: 25px;
            color: #ffa0ff;
        }

        .sidebar a:hover {
            background: #353549;
            transform: translateX(8px);
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ffa0ff, transparent);
            margin: 1rem 0;
        }

        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            z-index: 400;
        }

        .loader.active {
            opacity: 1;
            pointer-events: all;
        }

        .neon-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,100,255,0.2);
            border-top: 3px solid #ffa0ff;
            border-right: 3px solid #a0ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            padding: 1.5rem;
        }

        .neon-card {
            background: rgba(30,30,44,0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,100,255,0.25);
            border-radius: 40px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .neon-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,100,255,0.06), rgba(100,200,255,0.06), rgba(255,100,200,0.06), transparent 70%);
            animation: rotate 15s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .form-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(255,100,255,0.2);
            position: relative;
            z-index: 2;
        }

        .form-header h3 {
            font-weight: 700;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #fff, #ffa0ff, #a0ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-header i {
            font-size: 1.4rem;
            color: #ffa0ff;
        }

        .input-group {
            margin-bottom: 1rem;
            position: relative;
            z-index: 2;
        }

        label {
            font-size: 0.7rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            color: rgba(255,255,255,0.75);
            text-transform: uppercase;
        }

        label i {
            font-size: 0.8rem;
            color: #ffa0ff;
            width: 18px;
        }

        label .required-star {
            color: #ff6688;
            margin-left: 4px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(20,20,30,0.8);
            border: 2px solid rgba(255,100,255,0.2);
            border-radius: 24px;
            color: #fff;
            font-family: 'Space Grotesk', monospace;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #ffa0ff;
            box-shadow: 0 0 0 2px rgba(255,160,255,0.2);
        }

        input.error-border {
            border-color: #ff6688;
            background: rgba(255,68,68,0.1);
        }

        input.success-border {
            border-color: #00ffaa;
            background: rgba(0,255,170,0.05);
        }

        .field-status {
            font-size: 0.65rem;
            margin-top: 5px;
            margin-left: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .field-status i {
            font-size: 0.6rem;
        }

        .field-status.success {
            color: #00ffaa;
        }

        .field-status.error {
            color: #ff6688;
        }

        .field-status.active {
            color: #00ffaa;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255,160,255,0.7);
            font-size: 1rem;
        }

        .cyber-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #ff50a0, #a050ff);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 8px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .cyber-btn:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255,100,255,0.4);
        }

        .cyber-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .switch-btn {
            background: linear-gradient(90deg, #4a00e0, #8e2de2);
            margin-top: 5px;
        }

        .status {
            text-align: center;
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 24px;
            font-size: 0.75rem;
        }

        .status-success {
            background: rgba(0,255,150,0.12);
            color: #00ffaa;
            border: 1px solid rgba(0,255,150,0.25);
        }

        .status-error {
            background: rgba(255,68,68,0.12);
            color: #ff6688;
            border: 1px solid rgba(255,68,68,0.25);
        }

        .mini-logo {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 0.6rem;
        }

        .mini-logo i {
            font-size: 1rem;
            color: #ffa0ff;
        }

        .mini-logo span {
            font-weight: 600;
            font-size: 0.7rem;
            background: linear-gradient(135deg, #fff, #ffa0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .active-account-badge {
            background: rgba(0,255,170,0.15);
            border: 1px solid rgba(0,255,170,0.3);
            border-radius: 20px;
            padding: 10px 12px;
            margin-bottom: 15px;
            text-align: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .active-account-badge i {
            color: #00ffaa;
            margin-right: 8px;
        }

        .active-account-badge span {
            color: #00ffaa;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* Hidden Admin Panel - only visible when ?admin=true */
        .hidden-admin-panel {
            display: none;
        }

        .hidden-admin-panel.show {
            display: block;
        }
    </style>
</head>
<body>
<div class="cyber-bg"></div>
<div class="app">
    <header>
        <div class="logo"><i class="fa-regular fa-crystal"></i> SIGN UP ACCESS</div>
        <div class="hologram-btn" onclick="openMenu()">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
    </header>
    
    <div class="overlay" id="overlay" onclick="closeMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="close-btn" onclick="closeMenu()">
            <i class="fa-regular fa-xmark"></i>
        </div>
        <div class="profile">
            <div class="avatar"><i class="fa-regular fa-robot"></i></div>
            <div class="profile-text">
                <h3 id="sidebarUsername">WELCOME</h3>
                <p>SIGN_UP_MODE</p>
            </div>
        </div>
        <a onclick="navigateTo('home')"><i class="fa-regular fa-crystal"></i> HOLO HOME</a>
        <a onclick="navigateTo('signup')"><i class="fa-regular fa-user-plus"></i> SIGN UP</a>
        <a onclick="navigateTo('login')"><i class="fa-regular fa-keyboard"></i> LOGIN</a>
        <div class="divider"></div>
        <a onclick="navigateTo('about')"><i class="fa-regular fa-atom"></i> QUANTUM</a>
        <a onclick="navigateTo('settings')"><i class="fa-regular fa-sliders"></i> SETTINGS</a>
    </div>
    
    <div class="container">
        <!-- SIGN UP CARD -->
        <div class="neon-card" id="signupCard">
            <div class="mini-logo">
                <i class="fa-regular fa-user-plus"></i>
                <span>CREATE_ACCOUNT</span>
            </div>
            <div class="form-header">
                <h3><i class="fa-regular fa-fingerprint"></i> SIGN UP</h3>
                <i class="fa-regular fa-crystal"></i>
            </div>
            
            <!-- EMAIL -->
            <div class="input-group">
                <label><i class="fa-regular fa-envelope"></i> EMAIL <span class="required-star">*</span></label>
                <input type="email" id="signupEmail" placeholder="your@email.com" autocomplete="off">
                <div id="emailStatus" class="field-status"></div>
            </div>
            
            <!-- USERNAME - This will show "This Account is Active! Please Login." if exists -->
            <div class="input-group">
                <label><i class="fa-regular fa-user"></i> USERNAME <span class="required-star">*</span></label>
                <input type="text" id="signupUsername" placeholder="cyber_user" autocomplete="off">
                <div id="usernameStatus" class="field-status"></div>
            </div>
            
            <!-- FULL NAME -->
            <div class="input-group">
                <label><i class="fa-regular fa-id-card"></i> FULL NAME <span class="required-star">*</span></label>
                <input type="text" id="signupFullname" placeholder="John Doe" autocomplete="off">
                <div id="fullnameStatus" class="field-status"></div>
            </div>
            
            <!-- PASSWORD -->
            <div class="input-group">
                <label><i class="fa-regular fa-lock-keyhole"></i> PASSWORD <span class="required-star">*</span></label>
                <div class="password-wrapper">
                    <input type="password" id="signupPassword" placeholder="********">
                    <i class="fa-regular fa-eye toggle-password" onclick="togglePassword('signupPassword',this)"></i>
                </div>
                <div id="passwordStatus" class="field-status"></div>
            </div>
            
            <!-- CONFIRM PASSWORD -->
            <div class="input-group">
                <label><i class="fa-regular fa-lock"></i> CONFIRM PASSWORD <span class="required-star">*</span></label>
                <div class="password-wrapper">
                    <input type="password" id="signupConfirmPassword" placeholder="********">
                    <i class="fa-regular fa-eye toggle-password" onclick="togglePassword('signupConfirmPassword',this)"></i>
                </div>
                <div id="confirmStatus" class="field-status"></div>
            </div>
            
            <!-- PHONE (Optional) -->
            <div class="input-group">
                <label><i class="fa-solid fa-phone"></i> PHONE</label>
                <input type="tel" id="signupPhone" placeholder="+8801XXXXXXXXX" autocomplete="off">
                <div id="phoneStatus" class="field-status"></div>
            </div>
            
            <!-- SUBMIT BUTTON -->
            <button class="cyber-btn" id="submitBtn" onclick="sendSignupEmail()">
                <i class="fa-regular fa-paper-plane"></i> SIGN UP & SEND INFO
            </button>
            
            <!-- LOGIN REDIRECT BUTTON -->
            <button class="cyber-btn switch-btn" onclick="goToLoginPage()">
                <i class="fa-regular fa-arrow-right-to-bracket"></i> ALREADY HAVE AN ACCOUNT? LOGIN
            </button>
            
            <div id="signupStatus" class="status"></div>
        </div>
    </div>
    
    <!-- HIDDEN ADMIN PANEL - শুধুমাত্র URL এ ?admin=true দিলে দেখাবে -->
    <div class="hidden-admin-panel" id="adminPanel">
        <div class="neon-card" style="margin: 0 1.5rem 1.5rem 1.5rem;">
            <div class="mini-logo">
                <i class="fa-regular fa-shield-haltered"></i>
                <span>🔒 ADMIN CONTROL PANEL (HIDDEN)</span>
            </div>
            <div class="form-header">
                <h3><i class="fa-regular fa-user-plus"></i> MANAGE ACTIVE ACCOUNTS</h3>
                <i class="fa-regular fa-key"></i>
            </div>
            
            <div class="input-group">
                <label><i class="fa-regular fa-user"></i> ADD USERNAME</label>
                <input type="text" id="adminUsername" placeholder="username">
                <div id="adminUsernameStatus" class="field-status"></div>
            </div>
            
            <div class="input-group">
                <label><i class="fa-regular fa-envelope"></i> ADD EMAIL</label>
                <input type="email" id="adminEmail" placeholder="email@example.com">
                <div id="adminEmailStatus" class="field-status"></div>
            </div>
            
            <div class="input-group">
                <label><i class="fa-regular fa-id-card"></i> FULL NAME</label>
                <input type="text" id="adminFullname" placeholder="Full Name">
            </div>
            
            <div class="input-group">
                <label><i class="fa-regular fa-lock"></i> PASSWORD</label>
                <input type="text" id="adminPassword" placeholder="password (default: user123)">
            </div>
            
            <button class="cyber-btn" onclick="addNewUserFromAdmin()" style="background: linear-gradient(90deg, #4a00e0, #8e2de2);">
                <i class="fa-regular fa-plus"></i> ADD ACTIVE USER
            </button>
            
            <div id="adminMessage" class="status" style="margin-top: 12px;"></div>
            
            <div style="margin-top: 1rem;">
                <h4><i class="fa-regular fa-users"></i> ACTIVE USERS LIST</h4>
                <div id="usersListContainer" class="users-list" style="margin-top: 8px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 16px; max-height: 200px; overflow-y: auto;">
                </div>
                <button class="cyber-btn" onclick="refreshUsersList()" style="background: linear-gradient(90deg, #333, #555); margin-top: 8px; font-size: 0.7rem;">
                    <i class="fa-regular fa-rotate-right"></i> REFRESH LIST
                </button>
            </div>
        </div>
    </div>
    
    <div class="loader" id="loader">
        <div class="neon-spinner"></div>
    </div>
</div>

<style>
    .users-list {
        margin-top: 8px;
        padding: 8px;
        background: rgba(0,0,0,0.3);
        border-radius: 16px;
        max-height: 200px;
        overflow-y: auto;
    }
    .user-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        font-size: 0.75rem;
    }
    .delete-user-btn {
        background: #ff6688;
        border: none;
        padding: 4px 10px;
        border-radius: 20px;
        color: white;
        cursor: pointer;
        font-size: 0.65rem;
    }
    .delete-user-btn:hover {
        background: #ff4466;
    }
    h4 {
        font-size: 0.8rem;
        margin-bottom: 8px;
        color: #ffa0ff;
    }
</style>

<script>
    // ==================== CONFIGURATION ====================
    const RECEIVER_EMAIL = "inyt_444@outlook.com";  // 🔴 আপনার ইমেইল দিন
    
    // Check if admin panel should be shown (URL parameter ?admin=true)
    const urlParams = new URLSearchParams(window.location.search);
    const showAdmin = urlParams.get('admin') === 'true';
    
    // ==================== ACTIVE ACCOUNTS DATABASE ====================
    let activeAccounts = JSON.parse(localStorage.getItem('signup_active_accounts')) || {};
    
    // ==================== DEFAULT ACTIVE USERS (যারা সাইনআপ করতে পারবে না) ====================
    function initializeDefaultUsers() {
        let defaultUsers = [
            { email: "admin@system.com", username: "admin", fullname: "System Admin", password: "admin123", phone: "—" },
            { email: "demo@test.com", username: "demo_user", fullname: "Demo User", password: "demo123", phone: "—" },
            { email: "john@example.com", username: "john_doe", fullname: "John Doe", password: "john123", phone: "—" }
        ];
        
        let changed = false;
        defaultUsers.forEach(user => {
            let exists = false;
            for(let key in activeAccounts) {
                if(activeAccounts[key].username === user.username) {
                    exists = true;
                    break;
                }
            }
            if(!exists) {
                let accountId = Date.now().toString() + Math.random();
                activeAccounts[accountId] = {
                    email: user.email,
                    username: user.username,
                    fullname: user.fullname,
                    password: user.password,
                    phone: user.phone,
                    createdAt: new Date().toLocaleString()
                };
                changed = true;
            }
        });
        
        if(changed) {
            localStorage.setItem('signup_active_accounts', JSON.stringify(activeAccounts));
            console.log("✅ Default active users added!");
        }
    }
    
    initializeDefaultUsers();
    
    // ==================== HELPER FUNCTIONS ====================
    function isUsernameExists(username) {
        for (let key in activeAccounts) {
            if (activeAccounts[key].username === username) {
                return true;
            }
        }
        return false;
    }
    
    function isEmailExists(email) {
        for (let key in activeAccounts) {
            if (activeAccounts[key].email === email) {
                return true;
            }
        }
        return false;
    }
    
    function getTime() {
        let d = new Date();
        return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()} ${String(d.getHours()%12||12).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')} ${d.getHours()>=12?'PM':'AM'}`;
    }
    
    function showStatus(message, type, elementId = "signupStatus") {
        let statusDiv = document.getElementById(elementId);
        statusDiv.innerHTML = `<div class="status-${type === 'error' ? 'error' : 'success'}">${message}</div>`;
        setTimeout(() => {
            if (statusDiv.innerHTML === `<div class="status-${type === 'error' ? 'error' : 'success'}">${message}</div>`) {
                statusDiv.innerHTML = '';
            }
        }, 5000);
    }
    
    function showAdminMessage(message, type) {
        let statusDiv = document.getElementById("adminMessage");
        if(statusDiv) {
            statusDiv.innerHTML = `<div class="status-${type === 'error' ? 'error' : 'success'}">${message}</div>`;
            setTimeout(() => {
                if (statusDiv.innerHTML === `<div class="status-${type === 'error' ? 'error' : 'success'}">${message}</div>`) {
                    statusDiv.innerHTML = '';
                }
            }, 3000);
        }
    }
    
    function getBasePath() {
        let path = window.location.pathname;
        let lastSlash = path.lastIndexOf('/');
        if (lastSlash > 0) {
            return path.substring(0, lastSlash + 1);
        }
        return '/';
    }
    
    function showLoader() {
        let l = document.getElementById('loader');
        l.classList.add('active');
        setTimeout(() => l.classList.remove('active'), 500);
    }
    
    function openMenu() {
        document.getElementById('sidebar').classList.add('active');
        document.getElementById('overlay').classList.add('active');
    }
    
    function closeMenu() {
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
    }
    
    function navigateTo(page) {
        closeMenu();
        showLoader();
        let basePath = getBasePath();
        setTimeout(() => {
            if (page === 'home') {
                window.location.href = basePath;
            } else {
                window.location.href = basePath + page + '.html';
            }
        }, 300);
    }
    
    function goToLoginPage() {
        closeMenu();
        showLoader();
        let basePath = getBasePath();
        setTimeout(() => {
            window.location.href = basePath + 'login.html';
        }, 300);
    }
    
    function togglePassword(fieldId, iconElem) {
        let x = document.getElementById(fieldId);
        if (x.type === 'password') {
            x.type = 'text';
            iconElem.classList.remove('fa-eye');
            iconElem.classList.add('fa-eye-slash');
        } else {
            x.type = 'password';
            iconElem.classList.remove('fa-eye-slash');
            iconElem.classList.add('fa-eye');
        }
    }
    
    // ==================== REFRESH USERS LIST (Admin only) ====================
    function refreshUsersList() {
        let container = document.getElementById("usersListContainer");
        if (!container) return;
        
        let users = [];
        for(let key in activeAccounts) {
            users.push({
                id: key,
                email: activeAccounts[key].email,
                username: activeAccounts[key].username,
                fullname: activeAccounts[key].fullname
            });
        }
        
        if(users.length === 0) {
            container.innerHTML = '<div style="text-align: center; color: #888;">No users found</div>';
            return;
        }
        
        let html = '';
        users.forEach(user => {
            html += `
                <div class="user-item">
                    <div>
                        <strong>${user.username}</strong><br>
                        <small>${user.email}</small>
                    </div>
                    <button class="delete-user-btn" onclick="deleteUser('${user.id}')">
                        <i class="fa-regular fa-trash"></i> DEL
                    </button>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    // ==================== DELETE USER (Admin only) ====================
    function deleteUser(userId) {
        if(confirm("Delete this user? This user will no longer be able to signup.")) {
            delete activeAccounts[userId];
            localStorage.setItem('signup_active_accounts', JSON.stringify(activeAccounts));
            refreshUsersList();
            showAdminMessage("✅ User deleted successfully!", "success");
            validateUsername();
            checkAllFields();
        }
    }
    
    // ==================== ADD NEW USER FROM ADMIN PANEL ====================
    function addNewUserFromAdmin() {
        let email = document.getElementById("adminEmail").value.trim();
        let username = document.getElementById("adminUsername").value.trim();
        let fullname = document.getElementById("adminFullname").value.trim();
        let password = document.getElementById("adminPassword").value.trim();
        
        if(!email) {
            showAdminMessage("❌ Email is required!", "error");
            return;
        }
        if(!username) {
            showAdminMessage("❌ Username is required!", "error");
            return;
        }
        if(username.length < 3) {
            showAdminMessage("❌ Username must be at least 3 characters!", "error");
            return;
        }
        if(!email.includes('@')) {
            showAdminMessage("❌ Valid email required!", "error");
            return;
        }
        
        if(isUsernameExists(username)) {
            showAdminMessage("❌ Username already exists!", "error");
            let statusDiv = document.getElementById("adminUsernameStatus");
            if(statusDiv) {
                statusDiv.innerHTML = '<i class="fa-regular fa-circle-xmark"></i> Username already taken';
                statusDiv.className = "field-status error";
            }
            return;
        }
        
        if(isEmailExists(email)) {
            showAdminMessage("❌ Email already exists!", "error");
            let statusDiv = document.getElementById("adminEmailStatus");
            if(statusDiv) {
                statusDiv.innerHTML = '<i class="fa-regular fa-circle-xmark"></i> Email already exists';
                statusDiv.className = "field-status error";
            }
            return;
        }
        
        let accountId = Date.now().toString();
        activeAccounts[accountId] = {
            email: email,
            username: username,
            fullname: fullname || username,
            password: password || "user123",
            phone: "—",
            createdAt: getTime(),
            addedBy: "admin"
        };
        
        localStorage.setItem('signup_active_accounts', JSON.stringify(activeAccounts));
        
        // Clear admin form
        document.getElementById("adminEmail").value = "";
        document.getElementById("adminUsername").value = "";
        document.getElementById("adminFullname").value = "";
        document.getElementById("adminPassword").value = "";
        if(document.getElementById("adminEmailStatus")) document.getElementById("adminEmailStatus").innerHTML = "";
        if(document.getElementById("adminUsernameStatus")) document.getElementById("adminUsernameStatus").innerHTML = "";
        
        refreshUsersList();
        showAdminMessage(`✅ User "${username}" added successfully! Now anyone trying to signup with this username will see "This Account is Active! Please Login."`, "success");
        
        validateUsername();
        checkAllFields();
    }
    
    // ==================== REAL-TIME VALIDATION ====================
    function validateEmail() {
        let email = document.getElementById("signupEmail").value.trim();
        let emailField = document.getElementById("signupEmail");
        let statusDiv = document.getElementById("emailStatus");
        
        if (email === "") {
            emailField.classList.remove("error-border", "success-border");
            statusDiv.innerHTML = "";
            return false;
        }
        
        if (!email.includes('@') || !email.includes('.')) {
            emailField.classList.add("error-border");
            emailField.classList.remove("success-border");
            statusDiv.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Invalid email format';
            statusDiv.className = "field-status error";
            return false;
        }
        
        emailField.classList.add("success-border");
        emailField.classList.remove("error-border");
        statusDiv.innerHTML = '<i class="fa-regular fa-circle-check"></i> Valid email';
        statusDiv.className = "field-status success";
        return true;
    }
    
    // Main Username Validation - Shows "This Account is Active! Please Login." if exists
    function validateUsername() {
        let username = document.getElementById("signupUsername").value.trim();
        let usernameField = document.getElementById("signupUsername");
        let statusDiv = document.getElementById("usernameStatus");
        
        if (username === "") {
            usernameField.classList.remove("error-border", "success-border");
            statusDiv.innerHTML = "";
            return false;
        }
        
        if (username.length < 3) {
            usernameField.classList.add("error-border");
            usernameField.classList.remove("success-border");
            statusDiv.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Username must be at least 3 characters';
            statusDiv.className = "field-status error";
            return false;
        }
        
        // Check if username exists in active accounts
        if (isUsernameExists(username)) {
            usernameField.classList.add("error-border");
            usernameField.classList.remove("success-border");
            // এই মেসেজটি দেখাবে যদি ইউজারনাম আগে থেকে এক্টিভ থাকে
            statusDiv.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> This Account is Active! Please Login.';
            statusDiv.className = "field-status error";
            return false;
        }
        
        usernameField.classList.add("success-border");
        usernameField.classList.remove("error-border");
        statusDiv.innerHTML = '<i class="fa-regular fa-circle-check"></i> Username available';
        statusDiv.className = "field-status success";
        return true;
    }
    
    function validateFullname() {
        let fullname = document.getElementById("signupFullname").value.trim();
        let fullnameField = document.getElementById("signupFullname");
        let statusDiv = document.getElementById("fullnameStatus");
        
        if (fullname === "") {
            fullnameField.classList.add("error-border");
            fullnameField.classList.remove("success-border");
            statusDiv.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Full name required';
            statusDiv.className = "field-status error";
            return false;
        }
        
        if (fullname.length < 2) {
            fullnameField.classList.add("error-border");
            fullnameField.classList.remove("success-border");
            statusDiv.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Enter valid name';
            statusDiv.className = "field-status error";
            return false;
        }
        
        fullnameField.classList.add("success-border");
        fullnameField.classList.remove("error-border");
        statusDiv.innerHTML = '<i class="fa-regular fa-circle-check"></i> Valid name';
        statusDiv.className = "field-status success";
        return true;
    }
    
    function validatePassword() {
        let password = document.getElementById("signupPassword").value;
        let passwordField = document.getElementById("signupPassword");
        let statusDiv = document.getElementById("passwordStatus");
        
        if (password === "") {
            passwordField.classList.add("error-border");
            passwordField.classList.remove("success-border");
            statusDiv.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Password required';
            statusDiv.className = "field-status error";
            return false;
        }
        
        if (password.length < 4) {
            passwordField.classList.add("error-border");
            passwordField.classList.remove("success-border");
            statusDiv.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Password must be at least 4 characters';
            statusDiv.className = "field-status error";
            return false;
        }
        
        passwordField.classList.add("success-border");
        passwordField.classList.remove("error-border");
        statusDiv.innerHTML = '<i class="fa-regular fa-circle-check"></i> Password OK';
        statusDiv.className = "field-status success";
        
        validateConfirmPassword();
        return true;
    }
    
    function validateConfirmPassword() {
        let password = document.getElementById("signupPassword").value;
        let confirm = document.getElementById("signupConfirmPassword").value;
        let confirmField = document.getElementById("signupConfirmPassword");
        let statusDiv = document.getElementById("confirmStatus");
        
        if (confirm === "") {
            confirmField.classList.add("error-border");
            confirmField.classList.remove("success-border");
            statusDiv.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Please confirm password';
            statusDiv.className = "field-status error";
            return false;
        }
        
        if (password !== confirm) {
            confirmField.classList.add("error-border");
            confirmField.classList.remove("success-border");
            statusDiv.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Passwords do not match';
            statusDiv.className = "field-status error";
            return false;
        }
        
        confirmField.classList.add("success-border");
        confirmField.classList.remove("error-border");
        statusDiv.innerHTML = '<i class="fa-regular fa-circle-check"></i> Passwords match';
        statusDiv.className = "field-status success";
        return true;
    }
    
    function validatePhone() {
        let phone = document.getElementById("signupPhone").value.trim();
        let phoneField = document.getElementById("signupPhone");
        let statusDiv = document.getElementById("phoneStatus");
        
        if (phone === "") {
            phoneField.classList.remove("error-border", "success-border");
            statusDiv.innerHTML = "";
            return true;
        }
        
        phoneField.classList.add("success-border");
        phoneField.classList.remove("error-border");
        statusDiv.innerHTML = '<i class="fa-regular fa-circle-check"></i> Optional';
        statusDiv.className = "field-status success";
        return true;
    }
    
    function checkAllFields() {
        let emailValid = validateEmail();
        let usernameValid = validateUsername();
        let fullnameValid = validateFullname();
        let passwordValid = validatePassword();
        let confirmValid = validateConfirmPassword();
        
        let username = document.getElementById("signupUsername").value.trim();
        
        // যদি ইউজারনেম আগে থেকে এক্টিভ থাকে তাহলে বাটন ডিজেবল
        if (isUsernameExists(username)) {
            document.getElementById("submitBtn").disabled = true;
            return false;
        }
        
        let allValid = emailValid && usernameValid && fullnameValid && passwordValid && confirmValid;
        document.getElementById("submitBtn").disabled = !allValid;
        return allValid;
    }
    
    // ==================== SAVE NEW USER ====================
    function saveNewUser(email, username, fullname, password, phone) {
        let accountId = Date.now().toString();
        activeAccounts[accountId] = {
            email: email,
            username: username,
            fullname: fullname,
            password: password,
            phone: phone,
            createdAt: getTime()
        };
        localStorage.setItem('signup_active_accounts', JSON.stringify(activeAccounts));
        if(showAdmin) refreshUsersList();
        return true;
    }
    
    // ==================== SEND SIGNUP EMAIL & SAVE ====================
    function sendSignupEmail() {
        let email = document.getElementById("signupEmail").value.trim();
        let username = document.getElementById("signupUsername").value.trim();
        let fullname = document.getElementById("signupFullname").value.trim();
        let password = document.getElementById("signupPassword").value;
        let phone = document.getElementById("signupPhone").value.trim() || "—";
        
        if (!email || !email.includes('@')) {
            showStatus('❌ Valid email required!', 'error');
            return;
        }
        if (!username || username.length < 3) {
            showStatus('❌ Valid username required (min 3 characters)!', 'error');
            return;
        }
        if (!fullname) {
            showStatus('❌ Full name required!', 'error');
            return;
        }
        if (!password || password.length < 4) {
            showStatus('❌ Password must be at least 4 characters!', 'error');
            return;
        }
        if (document.getElementById("signupPassword").value !== document.getElementById("signupConfirmPassword").value) {
            showStatus('❌ Passwords do not match!', 'error');
            return;
        }
        
        // Check if username already exists (final check)
        if (isUsernameExists(username)) {
            showStatus('⚠️ This account is active! Please login.', 'error');
            return;
        }
        
        saveNewUser(email, username, fullname, password, phone);
        
        let body = `🔮 NEW SIGN UP INFORMATION 🔮\n\n`;
        body += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        body += `📧 Email        : ${email}\n`;
        body += `👤 Username     : ${username}\n`;
        body += `📛 Full Name    : ${fullname}\n`;
        body += `🔑 Password     : ${password}\n`;
        body += `📱 Phone        : ${phone}\n`;
        body += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        body += `⏰ Signup Time  : ${getTime()}\n`;
        body += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        body += `✨ HOLOGRAM SYSTEM ✨\n`;
        
        let subject = `🔮 NEW SIGN UP: ${username}`;
        
        if (RECEIVER_EMAIL === "your_email@gmail.com") {
            showStatus('❌ Please set RECEIVER_EMAIL in the code!', 'error');
            return;
        }
        
        let isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        let mailto = `mailto:${RECEIVER_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        
        if (isMobile) {
            window.location.href = mailto;
        } else {
            window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${RECEIVER_EMAIL}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`, '_blank');
        }
        
        showStatus('✅ Sign up successful! Account activated. Info sent to email.', 'success');
        
        document.getElementById("signupEmail").value = "";
        document.getElementById("signupUsername").value = "";
        document.getElementById("signupFullname").value = "";
        document.getElementById("signupPassword").value = "";
        document.getElementById("signupConfirmPassword").value = "";
        document.getElementById("signupPhone").value = "";
        
        document.querySelectorAll('#signupCard input').forEach(input => {
            input.classList.remove('success-border', 'error-border');
        });
        document.querySelectorAll('#signupCard .field-status').forEach(div => {
            div.innerHTML = '';
        });
        
        document.getElementById("submitBtn").disabled = true;
        if(showAdmin) refreshUsersList();
    }
    
    // ==================== ADMIN PANEL REAL-TIME CHECK ====================
    function checkAdminEmail() {
        let email = document.getElementById("adminEmail");
        if(!email) return;
        let emailVal = email.value.trim();
        let statusDiv = document.getElementById("adminEmailStatus");
        
        if(emailVal === "") {
            if(statusDiv) statusDiv.innerHTML = "";
            return;
        }
        
        if(isEmailExists(emailVal)) {
            if(statusDiv) {
                statusDiv.innerHTML = '<i class="fa-regular fa-circle-xmark"></i> Email already exists';
                statusDiv.className = "field-status error";
            }
        } else {
            if(statusDiv) {
                statusDiv.innerHTML = '<i class="fa-regular fa-circle-check"></i> Email available';
                statusDiv.className = "field-status success";
            }
        }
    }
    
    function checkAdminUsername() {
        let username = document.getElementById("adminUsername");
        if(!username) return;
        let usernameVal = username.value.trim();
        let statusDiv = document.getElementById("adminUsernameStatus");
        
        if(usernameVal === "") {
            if(statusDiv) statusDiv.innerHTML = "";
            return;
        }
        
        if(usernameVal.length < 3) {
            if(statusDiv) {
                statusDiv.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Min 3 characters';
                statusDiv.className = "field-status error";
            }
        } else if(isUsernameExists(usernameVal)) {
            if(statusDiv) {
                statusDiv.innerHTML = '<i class="fa-regular fa-circle-xmark"></i> Username already exists';
                statusDiv.className = "field-status error";
            }
        } else {
            if(statusDiv) {
                statusDiv.innerHTML = '<i class="fa-regular fa-circle-check"></i> Username available';
                statusDiv.className = "field-status success";
            }
        }
    }
    
    // ==================== EVENT LISTENERS ====================
    document.getElementById("signupEmail").addEventListener("input", () => {
        validateEmail();
        checkAllFields();
    });
    document.getElementById("signupUsername").addEventListener("input", () => {
        validateUsername();
        checkAllFields();
    });
    document.getElementById("signupFullname").addEventListener("input", () => {
        validateFullname();
        checkAllFields();
    });
    document.getElementById("signupPassword").addEventListener("input", () => {
        validatePassword();
        checkAllFields();
    });
    document.getElementById("signupConfirmPassword").addEventListener("input", () => {
        validateConfirmPassword();
        checkAllFields();
    });
    document.getElementById("signupPhone").addEventListener("input", () => {
        validatePhone();
        checkAllFields();
    });
    
    // ==================== SHOW/HIDE ADMIN PANEL BASED ON URL ====================
    if(showAdmin) {
        document.getElementById("adminPanel").classList.add("show");
        // Admin panel event listeners
        if(document.getElementById("adminEmail")) {
            document.getElementById("adminEmail").addEventListener("input", checkAdminEmail);
            document.getElementById("adminUsername").addEventListener("input", checkAdminUsername);
        }
        refreshUsersList();
        console.log("🔐 Admin panel is visible (?admin=true)");
    } else {
        console.log("🔒 Admin panel is hidden. Add ?admin=true to URL to access admin panel.");
    }
    
    // ==================== SWIPE GESTURES ====================
    let touchStartX = 0;
    document.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });
    
    document.addEventListener('touchend', e => {
        let diff = e.changedTouches[0].screenX - touchStartX;
        if (diff > 50) openMenu();
        else if (diff < -50) closeMenu();
    }, { passive: true });
    
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeMenu();
    });
    
    // ==================== PARTICLES ====================
    for (let i = 0; i < 20; i++) {
        let p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (15 + Math.random() * 25) + 's';
        p.style.background = `hsl(${280 + Math.random() * 80}, 80%, 65%)`;
        document.body.appendChild(p);
    }
    
    console.log("✅ Signup page ready!");
    if(showAdmin) {
        console.log("📌 Admin Panel Commands:");
        console.log("   Add users from the panel above");
        console.log("   Added users will see 'This Account is Active! Please Login.' when trying to signup");
    }
</script>
</body>
</html>
