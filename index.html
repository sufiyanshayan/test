<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Link Ecosystem</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Premium Animated Background */
        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.03) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.03) 0%, transparent 30%),
                        repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 10px);
            animation: backgroundMove 20s linear infinite;
        }

        @keyframes backgroundMove {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Floating Orbs */
        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,215,0,0.1), transparent 70%);
            filter: blur(60px);
            z-index: 0;
            animation: float 15s infinite ease-in-out;
        }

        .orb-1 {
            top: -100px;
            left: -100px;
            background: radial-gradient(circle at 30% 30%, rgba(255,215,0,0.15), transparent 70%);
        }

        .orb-2 {
            bottom: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle at 70% 70%, rgba(255,255,255,0.1), transparent 70%);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 420px;
            padding: 30px 20px;
        }

        /* Glass Card */
        .glass-card {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 40px;
            padding: 30px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4),
                        0 0 0 1px rgba(255,215,0,0.1) inset,
                        0 0 30px rgba(255,215,0,0.2);
        }

        /* Profile Section */
        .profile {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid rgba(255,215,0,0.5);
            padding: 5px;
            background: rgba(255,215,0,0.1);
            margin: 0 auto 15px;
            position: relative;
            animation: profileGlow 3s infinite;
        }

        @keyframes profileGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.3); }
            50% { box-shadow: 0 0 40px rgba(255,215,0,0.6); }
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #000;
        }

        /* Premium Badge */
        .vip-badge {
            position: absolute;
            top: 85px;
            right: 50%;
            transform: translateX(40px);
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 30px;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(255,215,0,0.4);
            border: 1px solid rgba(255,255,255,0.3);
            animation: badgePulse 2s infinite;
        }

        @keyframes badgePulse {
            0%, 100% { transform: translateX(40px) scale(1); }
            50% { transform: translateX(40px) scale(1.05); }
        }

        /* Name & Title */
        .name {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(255,215,0,0.3);
            letter-spacing: -0.5px;
        }

        .title {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        /* Economy Stats - Premium Vibe */
        .economy-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
            background: rgba(255,215,0,0.05);
            border-radius: 30px;
            padding: 15px;
            border: 1px solid rgba(255,215,0,0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 20px;
            font-weight: 700;
            color: #FFD700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Premium Buttons */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 30px;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn img {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
            transition: transform 0.3s ease;
        }

        .btn span {
            font-size: 14px;
        }

        .btn-right {
            font-size: 12px;
            color: #FFD700;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(255,215,0,0.1);
            border-color: rgba(255,215,0,0.4);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,215,0,0.2);
        }

        .btn:hover .btn-right {
            opacity: 1;
            transform: translateX(0);
        }

        .btn:hover img {
            transform: scale(1.1);
        }

        /* Premium Button Variant */
        .btn-premium {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,165,0,0.05));
            border-color: rgba(255,215,0,0.3);
        }

        .btn-premium::before {
            content: '⭐';
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 16px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        /* Footer */
        .footer {
            margin-top: 25px;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            letter-spacing: 1px;
            position: relative;
        }

        .footer::before,
        .footer::after {
            content: '✦';
            margin: 0 10px;
            color: #FFD700;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
            
            .glass-card {
                padding: 20px 15px;
            }
            
            .name {
                font-size: 24px;
            }
            
            .btn {
                padding: 14px 18px;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="glass-card">
            <!-- Profile Section -->
            <div class="profile">
                <div class="profile-image">
                    <img src="https://via.placeholder.com/200/1a1a1a/ffd700?text=VIP" alt="Profile">
                </div>
                <div class="vip-badge">ECONOMY VIP</div>
                <h1 class="name">Your_Name</h1>
                <p class="title">Digital Economy Curator</p>
            </div>

            <!-- Economy Stats -->
            <div class="economy-stats">
                <div class="stat-item">
                    <span class="stat-value">$12.5K</span>
                    <span class="stat-label">Value</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">2.8K</span>
                    <span class="stat-label">Holders</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">48%</span>
                    <span class="stat-label">Growth</span>
                </div>
            </div>

            <!-- Premium Links -->
            <div class="links">
                <!-- Facebook Premium -->
                <a href="#" class="btn btn-premium">
                    <div class="btn-left">
                        <img src="https://cdn.simpleicons.org/facebook/white" alt="FB">
                        <span>Facebook Economy</span>
                    </div>
                    <div class="btn-right">→ Join</div>
                </a>

                <!-- Instagram -->
                <a href="#" class="btn">
                    <div class="btn-left">
                        <img src="https://cdn.simpleicons.org/instagram/white" alt="IG">
                        <span>Visual Portfolio</span>
                    </div>
                    <div class="btn-right">→ View</div>
                </a>

                <!-- WhatsApp Business -->
                <a href="#" class="btn btn-premium">
                    <div class="btn-left">
                        <img src="https://cdn.simpleicons.org/whatsapp/white" alt="WA">
                        <span>Business Connect</span>
                    </div>
                    <div class="btn-right">→ Chat</div>
                </a>

                <!-- Telegram Channel -->
                <a href="#" class="btn">
                    <div class="btn-left">
                        <img src="https://cdn.simpleicons.org/telegram/white" alt="TG">
                        <span>News Channel</span>
                    </div>
                    <div class="btn-right">→ Subscribe</div>
                </a>

                <!-- Discord Community -->
                <a href="#" class="btn btn-premium">
                    <div class="btn-left">
                        <img src="https://cdn.simpleicons.org/discord/white" alt="DC">
                        <span>Premium Discord</span>
                    </div>
                    <div class="btn-right">→ Join</div>
                </a>

                <!-- Portfolio -->
                <a href="#" class="btn">
                    <div class="btn-left">
                        <img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png" alt="Portfolio" style="filter: brightness(0) invert(1);">
                        <span>Digital Portfolio</span>
                    </div>
                    <div class="btn-right">→ Explore</div>
                </a>

                <!-- Call to Action -->
                <a href="#" class="btn">
                    <div class="btn-left">
                        <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" alt="Call" style="filter: brightness(0) invert(1);">
                        <span>VIP Hotline</span>
                    </div>
                    <div class="btn-right">→ Call</div>
                </a>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            2026 • PREMIUM ECONOMY • EXCLUSIVE
        </div>
    </div>
</body>
</html>
