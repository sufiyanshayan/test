<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART DECO | Your_Name</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1A120B;
            font-family: 'Marcellus', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(45deg, rgba(193, 154, 107, 0.03) 0px, rgba(193, 154, 107, 0.03) 20px, transparent 20px, transparent 40px),
                radial-gradient(circle at 50% 50%, #2C1E12 0%, #1A120B 100%);
        }
        .container { max-width: 500px; width: 100%; padding: 20px; position: relative; z-index: 2; }
        
        /* Art Deco Card */
        .artdeco-card {
            background: #2C1E12;
            border: 3px solid #C19A6B;
            padding: 50px 30px;
            position: relative;
            box-shadow: 20px 20px 40px rgba(0,0,0,0.6), 0 0 0 2px #8B6B4D inset;
        }
        .artdeco-card::before {
            content: '◈◈◈';
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #C19A6B;
            font-size: 24px;
            letter-spacing: 15px;
        }
        .artdeco-card::after {
            content: '◈◈◈';
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #C19A6B;
            font-size: 24px;
            letter-spacing: 15px;
        }

        /* Profile */
        .profile-art {
            text-align: center;
            margin-bottom: 40px;
        }
        .portrait {
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
            border: 8px double #C19A6B;
            border-radius: 0;
            transform: rotate(45deg);
            overflow: hidden;
            box-shadow: 0 0 40px rgba(193, 154, 107, 0.3);
        }
        .portrait img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: rotate(-45deg) scale(1.2);
            border: none;
        }
        .name-art {
            font-family: 'Cinzel', serif;
            font-size: 42px;
            color: #C19A6B;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 4px 4px 0 #3D2B1C;
        }
        .title-art {
            color: #B8A28C;
            font-size: 14px;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        /* Stats */
        .stat-block {
            display: flex;
            justify-content: space-between;
            margin: 30px 0;
            border-top: 2px solid #C19A6B;
            border-bottom: 2px solid #C19A6B;
            padding: 20px 0;
        }
        .stat-item {
            text-align: center;
            flex: 1;
            border-right: 1px solid #C19A6B;
        }
        .stat-item:last-child { border-right: none; }
        .stat-num {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            color: #C19A6B;
            display: block;
        }
        .stat-label {
            color: #B8A28C;
            font-size: 10px;
            letter-spacing: 2px;
        }

        /* Buttons */
        .art-btn {
            display: block;
            margin: 15px 0;
            padding: 18px 25px;
            background: transparent;
            border: 2px solid #C19A6B;
            color: #C19A6B;
            text-decoration: none;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            transition: all 0.3s;
            overflow: hidden;
        }
        .art-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #C19A6B;
            transition: left 0.4s;
            z-index: 0;
        }
        .art-btn:hover::before { left: 0; }
        .art-btn span {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .art-btn:hover span { color: #1A120B; }
        .art-btn img { 
            width: 22px; 
            height: 22px; 
            filter: brightness(0) invert(0.8) sepia(1) hue-rotate(350deg);
        }

        .footer-art {
            text-align: center;
            margin-top: 30px;
            color: #B8A28C;
            font-size: 12px;
            letter-spacing: 4px;
            border-top: 1px solid #C19A6B;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="artdeco-card">
            <div class="profile-art">
                <div class="portrait">
                    <img src="Your_Profile_Picture_Link" alt="">
                </div>
                <h1 class="name-art">YOUR_NAME</h1>
                <div class="title-art">LUXURY CURATOR</div>
            </div>

            <div class="stat-block">
                <div class="stat-item"><span class="stat-num">1925</span><span class="stat-label">EST.</span></div>
                <div class="stat-item"><span class="stat-num">24K</span><span class="stat-label">GOLD</span></div>
                <div class="stat-item"><span class="stat-num">88%</span><span class="stat-label">PURE</span></div>
            </div>

            <a href="#" class="art-btn"><span><span>✧ FACEBOOK ✧</span> <img src="https://cdn.simpleicons.org/facebook/C19A6B"></span></a>
            <a href="#" class="art-btn"><span><span>✧ FACEBOOK PAGE ✧</span> <img src="https://cdn.simpleicons.org/facebook/C19A6B"></span></a>
            <a href="#" class="art-btn"><span><span>✧ INSTAGRAM ✧</span> <img src="https://cdn.simpleicons.org/instagram/C19A6B"></span></a>
            <a href="#" class="art-btn"><span><span>✧ WHATSAPP ✧</span> <img src="https://cdn.simpleicons.org/whatsapp/C19A6B"></span></a>
            <a href="#" class="art-btn"><span><span>✧ TIKTOK ✧</span> <img src="https://cdn.simpleicons.org/tiktok/C19A6B"></span></a>
            <a href="#" class="art-btn"><span><span>✧ TELEGRAM ✧</span> <img src="https://cdn.simpleicons.org/telegram/C19A6B"></span></a>
            <a href="#" class="art-btn"><span><span>✧ TWITTER X ✧</span> <img src="https://cdn.simpleicons.org/x/C19A6B"></span></a>
            <a href="#" class="art-btn"><span><span>✧ DISCORD ✧</span> <img src="https://cdn.simpleicons.org/discord/C19A6B"></span></a>
            <a href="#" class="art-btn"><span><span>✧ CALL ME ✧</span> <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" style="filter: brightness(0) invert(0.8) sepia(1) hue-rotate(350deg);"></span></a>
            <a href="#" class="art-btn"><span><span>✧ ABOUT ME ✧</span> <img src="https://cdn.simpleicons.org/aboutdotme/C19A6B"></span></a>
            <a href="#" class="art-btn"><span><span>✧ MY WEBSITE ✧</span> <img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png" style="filter: brightness(0) invert(0.8) sepia(1) hue-rotate(350deg);"></span></a>

            <div class="footer-art">✧ 1920s LUXURY EDITION ✧</div>
        </div>
    </div>
</body>
</html>
