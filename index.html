<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background:#ffffff;
    color:#333;
}

/* Header */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    border-bottom:1px solid #eee;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
    font-weight:600;
    color:#2e7d32;
}

.logo img{
    width:35px;
}

/* Menu icon */
.menu{
    font-size:24px;
    cursor:pointer;
}

/* Welcome Section */
.main{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:80vh;
    text-align:center;
    padding:20px;
}

.main h1{
    font-size:32px;
    margin-bottom:10px;
}

.main p{
    color:#777;
    margin-bottom:20px;
}

/* Button */
.btn{
    padding:12px 25px;
    border:none;
    background:#2e7d32;
    color:white;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#1b5e20;
}
</style>

</head>

<body>

<header>
    <div class="logo">
        🌿 <span>FernFix</span>
    </div>

    <div class="menu">☰</div>
</header>

<section class="main">
    <h1>Welcome</h1>
    <p>Your simple and clean website starts here.</p>
    <button class="btn">Get Started</button>
</section>

</body>
</html>
