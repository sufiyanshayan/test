<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name · Executive Edition</title>

<!-- Fonts - Modern + Classic Fusion -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" type="image/png" href="Your_Favicon_Link">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #080b0f;
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
}

/* Premium light effects */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  right: -10%;
  width: 70%;
  height: 70%;
  background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: subtleFloat 15s infinite alternate ease-in-out;
}

body::after {
  content: '';
  position: fixed;
  bottom: -20%;
  left: -10%;
  width: 70%;
  height: 70%;
  background: radial-gradient(circle, rgba(65, 105, 225, 0.06) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: subtleFloat 18s infinite alternate-reverse ease-in-out;
}

/* Floating particles */
.particle {
  position: fixed;
  width: 2px;
  height: 2px;
  background: rgba(212, 175, 55, 0.3);
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
  animation: floatParticle 15s infinite linear;
}

@keyframes floatParticle {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-100vh) translateX(100vw); opacity: 0; }
}

@keyframes subtleFloat {
  0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
  100% { transform: translate(2%, 2%) scale(1.05); opacity: 0.8; }
}

.wrapper {
  max-width: 440px;
  width: 100%;
  position: relative;
  z-index: 2;
}

/* Main Card */
.container {
  background: #0e1117;
  border-radius: 40px;
  padding: 42px 26px 36px;
  box-shadow: 
    0 35px 70px -20px rgba(0, 0, 0, 0.9),
    0 0 0 1px rgba(212, 175, 55, 0.15),
    inset 0 1px 1px rgba(255, 255, 255, 0.02),
    inset 0 0 30px rgba(212, 175, 55, 0.03);
  position: relative;
  border: 1px solid rgba(212, 175, 55, 0.1);
  backdrop-filter: blur(1px);
  animation: cardFloat 6s ease-in-out infinite;
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

/* Premium top bar */
.container::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 140px;
  height: 4px;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(212, 175, 55, 0.3), 
    #d4af37, 
    #4169e1, 
    #d4af37, 
    rgba(212, 175, 55, 0.3), 
    transparent
  );
  border-radius: 0 0 4px 4px;
  filter: blur(0.5px);
}

/* Corner accents */
.container::after {
  content: '';
  position: absolute;
  top: 24px;
  right: 24px;
  width: 40px;
  height: 40px;
  border-top: 1.5px solid rgba(212, 175, 55, 0.25);
  border-right: 1.5px solid rgba(212, 175, 55, 0.25);
  opacity: 0.8;
}

.corner-decoration {
  position: absolute;
  bottom: 24px;
  left: 24px;
  width: 40px;
  height: 40px;
  border-bottom: 1.5px solid rgba(65, 105, 225, 0.25);
  border-left: 1.5px solid rgba(65, 105, 225, 0.25);
  opacity: 0.8;
  pointer-events: none;
}

/* Profile Section */
.profile {
  text-align: center;
  margin-bottom: 22px;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Profile glow layer */
.profile-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 140px;
  height: 140px;
  background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, rgba(65, 105, 225, 0.1) 50%, transparent 70%);
  border-radius: 50%;
  z-index: 1;
  animation: pulseGlow 4s infinite alternate;
}

@keyframes pulseGlow {
  0% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.95); }
  100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
}

/* Profile Image */
.profile img {
  width: 105px;
  height: 105px;
  border-radius: 50%;
  object-fit: cover;
  position: relative;
  z-index: 3;
  border: 3px solid #d4af37;
  box-shadow: 0 10px 20px -5px #000;
}

/* Rotating Border for Profile - CIRCULAR (BORDER ONLY) */
.profile::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 125px;
  height: 125px;
  border-radius: 50%;
  
  /* Conic gradient for rotating colors */
  background: conic-gradient(
    from 0deg,
    #d4af37,
    #4169e1,
    #d4af37,
    #4169e1,
    #d4af37,
    #4169e1,
    #d4af37,
    #4169e1,
    #d4af37
  );
  
  /* Rotation animation */
  animation: rotateBorder 3s linear infinite;
  z-index: 2;
  
  /* CRITICAL: Mask to show ONLY on the border, NOT on the content */
  -webkit-mask: 
    linear-gradient(#fff 0 0) content-box, 
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  padding: 5px; /* Border thickness */
}

/* Second rotating ring for double effect */
.profile::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 135px;
  height: 135px;
  border-radius: 50%;
  
  /* Conic gradient in opposite direction */
  background: conic-gradient(
    from 180deg,
    #4169e1,
    #d4af37,
    #4169e1,
    #d4af37,
    #4169e1,
    #d4af37,
    #4169e1,
    #d4af37,
    #4169e1
  );
  
  /* Animation in opposite direction */
  animation: rotateBorderReverse 4s linear infinite;
  z-index: 1;
  
  /* Mask for border effect */
  -webkit-mask: 
    linear-gradient(#fff 0 0) content-box, 
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  padding: 2px; /* Thinner border for outer ring */
  opacity: 0.7;
}

@keyframes rotateBorder {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

@keyframes rotateBorderReverse {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(-360deg); }
}

.profile:hover::before {
  animation: rotateBorder 1.5s linear infinite;
}

.profile:hover::after {
  animation: rotateBorderReverse 2s linear infinite;
}

/* Name */
.name {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 600;
  color: #d4af37;
  text-align: center;
  letter-spacing: -0.3px;
  margin-top: 15px;
  margin-bottom: 6px;
  text-shadow: 
    0 2px 15px rgba(212, 175, 55, 0.2),
    0 0 30px rgba(65, 105, 225, 0.1);
  line-height: 1.2;
  position: relative;
  z-index: 5;
}

/* Title - PREMIUMECONOMY and EXECUTIVE */
.title-container {
  text-align: center;
  margin-bottom: 30px;
  position: relative;
  z-index: 5;
}

.premium-title {
  font-size: 16px;
  color: #d4af37;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: 'Plus Jakarta Sans', sans-serif;
  margin-bottom: 4px;
}

.executive-title {
  font-size: 14px;
  color: #8e9cd3;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-family: 'Plus Jakarta Sans', sans-serif;
  position: relative;
  display: inline-block;
  padding: 0 20px;
}

.executive-title::before,
.executive-title::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #d4af37, transparent);
}

.executive-title::before {
  left: -15px;
}

.executive-title::after {
  right: -15px;
}

/* ===== BUTTONS SECTION - ROTATING BORDER (BORDER ONLY, NOT ON TEXT) ===== */
.buttons {
  display: flex;
  flex-direction: column;
  gap: 18px;
  position: relative;
  z-index: 5;
}

.btn {
  display: flex;
  align-items: center;
  padding: 16px 22px;
  text-decoration: none;
  background: rgba(14, 17, 23, 0.8);
  border-radius: 60px;
  transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
  color: #ffffff;
  font-size: 14px;
  font-weight: 400;
  backdrop-filter: blur(8px);
  position: relative;
  z-index: 2;
  
  /* No border here - we'll use pseudo-element for rotating border */
}

/* ===== ROTATING BORDER FOR BUTTONS - ONLY ON BORDER, NOT ON TEXT ===== */
.btn::before {
  content: '';
  position: absolute;
  top: -3px;
  left: -3px;
  right: -3px;
  bottom: -3px;
  border-radius: 62px;
  
  /* Conic gradient for rotating colors */
  background: conic-gradient(
    from 0deg,
    #d4af37,
    #4169e1,
    #d4af37,
    #4169e1,
    #d4af37,
    #4169e1,
    #d4af37,
    #4169e1,
    #d4af37
  );
  
  /* Rotation animation */
  animation: rotateButtonBorder 4s linear infinite;
  z-index: -1;
  
  /* CRITICAL: This mask ensures gradient ONLY shows on the border, NOT on the text/content */
  -webkit-mask: 
    linear-gradient(#fff 0 0) content-box, 
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  
  /* Border thickness - only this much will show as border */
  padding: 2.5px;
  
  /* This ensures the border is smooth */
  pointer-events: none;
}

/* Second rotating ring for double effect (optional) */
.btn::after {
  content: '';
  position: absolute;
  top: -5px;
  left: -5px;
  right: -5px;
  bottom: -5px;
  border-radius: 64px;
  
  /* Conic gradient in opposite direction */
  background: conic-gradient(
    from 180deg,
    #4169e1,
    #d4af37,
    #4169e1,
    #d4af37,
    #4169e1,
    #d4af37,
    #4169e1,
    #d4af37,
    #4169e1
  );
  
  /* Animation in opposite direction */
  animation: rotateButtonBorderReverse 5s linear infinite;
  z-index: -2;
  
  /* Mask for border effect */
  -webkit-mask: 
    linear-gradient(#fff 0 0) content-box, 
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  padding: 1.5px;
  opacity: 0.6;
  pointer-events: none;
}

/* Rotation animations */
@keyframes rotateButtonBorder {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}

@keyframes rotateButtonBorderReverse {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(-360deg);
  }
}

/* Hover effect - speed up rotation */
.btn:hover::before {
  animation: rotateButtonBorder 2s linear infinite;
}

.btn:hover::after {
  animation: rotateButtonBorderReverse 2.5s linear infinite;
}

.btn:hover {
  transform: translateY(-3px) scale(1.01);
  background: rgba(20, 24, 32, 0.9);
  box-shadow: 0 18px 30px -12px #000;
}

.btn-icon {
  width: 28px;
  text-align: center;
  margin-right: 16px;
  position: relative;
  z-index: 3;
}

.btn-icon img {
  width: 20px;
  height: 20px;
  filter: brightness(0) invert(1);
  transition: all 0.4s;
  opacity: 0.9;
}

.btn:hover .btn-icon img {
  filter: brightness(0) invert(0.9) sepia(0.5) hue-rotate(350deg);
  transform: scale(1.1);
}

.btn-text {
  flex: 1;
  color: #f5f5f5;
  font-weight: 350;
  letter-spacing: 0.3px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px;
  position: relative;
  z-index: 3;
}

.btn-arrow {
  opacity: 0.4;
  font-size: 18px;
  color: #d4af37;
  transition: all 0.3s;
  margin-left: 8px;
  font-family: 'Playfair Display', serif;
  position: relative;
  z-index: 3;
}

.btn:hover .btn-arrow {
  opacity: 1;
  color: #4169e1;
  transform: translateX(3px);
}

/* Footer */
.footer {
  margin-top: 36px;
  text-align: center;
  font-size: 11px;
  color: #6e7485;
  line-height: 2;
  padding-top: 22px;
  position: relative;
  font-family: 'Plus Jakarta Sans', sans-serif;
  letter-spacing: 0.8px;
  z-index: 5;
}

.footer::before {
  content: '';
  position: absolute;
  top: 0;
  left: 30%;
  width: 40%;
  height: 1px;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(212, 175, 55, 0.3), 
    rgba(65, 105, 225, 0.3), 
    rgba(212, 175, 55, 0.3), 
    transparent
  );
}

.footer span {
  font-family: 'Playfair Display', serif;
  font-size: 12px;
  color: #d4af37;
  font-weight: 500;
  letter-spacing: 1px;
}

/* Premium badge */
.premium-badge {
  text-align: center;
  margin: 15px 0 -10px;
  font-size: 10px;
  color: rgba(212, 175, 55, 0.4);
  letter-spacing: 5px;
  text-transform: uppercase;
  font-weight: 200;
  font-family: 'Plus Jakarta Sans', sans-serif;
  position: relative;
  z-index: 5;
}

.premium-badge::before,
.premium-badge::after {
  content: '✦';
  margin: 0 10px;
  color: rgba(65, 105, 225, 0.4);
}

/* Loading animation */
.loading-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  background: linear-gradient(90deg, #d4af37, #4169e1, #d4af37);
  animation: loading 2s ease-out;
  z-index: 9999;
}

@keyframes loading {
  0% { width: 0; opacity: 1; }
  100% { width: 100%; opacity: 0; }
}

/* Responsive */
@media (max-width: 380px) {
  .container { padding: 35px 20px 30px; }
  .name { font-size: 32px; }
  .btn { padding: 14px 18px; }
  .btn-text { font-size: 14px; }
  .premium-badge::before,
  .premium-badge::after { display: none; }
}
</style>
</head>
<body>

<!-- Loading animation -->
<div class="loading-bar"></div>

<!-- Floating particles -->
<script>
  for(let i = 0; i < 15; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.top = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 15 + 's';
    particle.style.animationDuration = (10 + Math.random() * 20) + 's';
    document.body.appendChild(particle);
  }
</script>

<div class="wrapper">
  <div class="container">

    <!-- Corner Decoration -->
    <div class="corner-decoration"></div>

    <!-- Profile with Rotating Border (BORDER ONLY) -->
    <div class="profile">
      <div class="profile-glow"></div>
      <img src="Your_Profile_Picture_Link" alt="Profile">
    </div>

    <!-- Name -->
    <div class="name">Your_Name</div>
    
    <!-- Title - PREMIUMECONOMY and EXECUTIVE separate lines -->
    <div class="title-container">
      <div class="premium-title">PREMIUMECONOMY</div>
      <div class="executive-title">EXECUTIVE</div>
    </div>

    <!-- Buttons with ROTATING BORDER (BORDER ONLY, NOT ON TEXT) -->
    <div class="buttons">

      <!-- Facebook - rotating border only, text untouched -->
      <a class="btn" href="https://www.facebook.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/facebook/ffffff"></span>
        <span class="btn-text">Facebook</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- Facebook Page - rotating border only, text untouched -->
      <a class="btn" href="https://www.facebook.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/facebook/ffffff"></span>
        <span class="btn-text">Facebook Page</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- Instagram - rotating border only, text untouched -->
      <a class="btn" href="https://www.instagram.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/instagram/ffffff"></span>
        <span class="btn-text">Instagram</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- WhatsApp - rotating border only, text untouched -->
      <a class="btn" href="https://wa.me/8801234567890" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/whatsapp/ffffff"></span>
        <span class="btn-text">WhatsApp</span>
        <span class="btn-arrow">→</span>
      </a>

    </div>

    <!-- Premium Badge -->
    <div class="premium-badge">EXECUTIVE COLLECTION</div>

    <!-- Footer -->
    <div class="footer">
      Copyright © 2026 MADE BY <br> <span>"Your_Name"</span>. <br> All Rights Reserved
    </div>

  </div>
</div>

</body>
</html>
