<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Space Grotesk',sans-serif;
background:#0a0a12;color:#fff
}
.app{max-width:480px;margin:auto;min-height:100vh}

/* HEADER */
header{
display:flex;justify-content:space-between;
padding:15px;background:#111
}
button{padding:10px 15px;cursor:pointer}

/* SIDEBAR */
.sidebar{
position:fixed;right:-260px;top:0;
width:250px;height:100%;
background:#1a1a26;transition:.3s
}
.sidebar.active{right:0}

/* OVERLAY */
.overlay{
position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.6);
opacity:0;pointer-events:none;
transition:.3s
}
.overlay.active{
opacity:1;pointer-events:all
}

/* LOADER */
.loader{
position:fixed;top:0;left:0;
width:100%;height:100%;
display:flex;justify-content:center;
align-items:center;
background:#000;
opacity:0;pointer-events:none;
transition:.3s
}
.loader.active{
opacity:1;pointer-events:all
}
.spinner{
width:40px;height:40px;
border:4px solid #555;
border-top:4px solid #fff;
border-radius:50%;
animation:spin 1s linear infinite
}
@keyframes spin{
to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div class="app">

<header>
<h3>Your_Name</h3>
<button onclick="openMenu()">☰</button>
</header>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
<br>
<button onclick="go('home')">Home</button><br><br>
<button onclick="go('test')">Test</button><br><br>
<button onclick="go('about')">About</button>
</div>

<div style="padding:20px">
<h2>Home Page (index.html)</h2>
<p>সব ঠিকভাবে কাজ করছে ✅</p>
</div>

<div class="loader" id="loader">
<div class="spinner"></div>
</div>

</div>

<script>

// MENU
function openMenu(){
sidebar.classList.add('active');
overlay.classList.add('active');
}
function closeMenu(){
sidebar.classList.remove('active');
overlay.classList.remove('active');
}

// NAVIGATION FIXED
function go(page){
loader.classList.add('active');

setTimeout(()=>{
if(page === "home"){
location.href = "/"; // index.html
}else{
location.href = page + ".html";
}
},500);
}

// ✅ FIX BACK BUTTON BUG
window.addEventListener("pageshow", function () {
loader.classList.remove('active');
});

// EXTRA SAFE
window.addEventListener("popstate", function () {
loader.classList.remove('active');
});

</script>

</body>
</html>
