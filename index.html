<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Blue Site</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
    /* Reset & Font */
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }
    body { background: #e0f0ff; color: #03396c; overflow-x:hidden; }

    /* Header */
    header {
        display:flex; justify-content:space-between; align-items:center;
        padding:15px 20px; background:#0077b6; color:white; position:relative;
    }
    header h1 { font-size:1.5rem; }
    .menu-btn {
        font-size:1.8rem; cursor:pointer; user-select:none;
    }

    /* Side Menu */
    .side-menu {
        position:fixed; top:0; left:-250px; width:250px; height:100%;
        background:#023e8a; color:white; padding:20px; transition:0.3s ease;
        display:flex; flex-direction:column;
    }
    .side-menu.active { left:0; }
    .close-btn { align-self:flex-end; font-size:1.5rem; cursor:pointer; margin-bottom:20px; }
    
    /* Profile */
    .profile { text-align:center; margin-bottom:30px; }
    .profile img { width:80px; height:80px; border-radius:50%; margin-bottom:10px; border:2px solid #00b4d8; }
    .profile h3 { margin-bottom:5px; }
    .profile p { font-size:12px; color:#90e0ef; }

    /* Menu Links */
    .side-menu a {
        display:block; padding:12px 10px; margin:5px 0;
        text-decoration:none; color:white; border-radius:5px;
        transition:0.2s; cursor:pointer;
    }
    .side-menu a:hover { background:#0077b6; }

    /* Main Content */
    main { padding:40px 20px; }
    main h2 { font-size:2rem; margin-bottom:15px; }
    main p { font-size:1rem; color:#023e8a; }

    /* Swipe Gesture Hint */
    .hint { margin-top:50px; font-size:1rem; color:#0077b6; animation: pulse 1.5s infinite; text-align:center; }
    @keyframes pulse {
        0%,100%{ opacity:1; }
        50% { opacity:0.5; }
    }

    /* Animation for menu items */
    .side-menu a { opacity:0; transform:translateX(-20px); animation: slideIn 0.3s forwards; }
    .side-menu.active a:nth-child(2){ animation-delay:0.1s; }
    .side-menu.active a:nth-child(3){ animation-delay:0.2s; }
    .side-menu.active a:nth-child(4){ animation-delay:0.3s; }

    @keyframes slideIn {
        to { opacity:1; transform:translateX(0); }
    }

</style>
</head>
<body>

<header>
    <h1>My Site</h1>
    <div class="menu-btn" onclick="openMenu()">☰</div>
</header>

<div class="side-menu" id="sideMenu">
    <div class="close-btn" onclick="closeMenu()">✕</div>

    <div class="profile">
        <img src="https://i.pravatar.cc/100" alt="Profile">
        <h3>Your Name</h3>
        <p>Welcome back</p>
    </div>

    <a onclick="go('home')">🏠 Home</a>
    <a onclick="go('test')">📄 Test</a>
    <a onclick="go('about')">ℹ️ About</a>
</div>

<main>
    <h2>Welcome 👋</h2>
    <p>Swipe to open the menu + animated items 🔥</p>
    <div class="hint">Swipe from left or click ☰ to open menu</div>
</main>

<script>
    const sideMenu = document.getElementById('sideMenu');

    function openMenu(){
        sideMenu.classList.add('active');
    }

    function closeMenu(){
        sideMenu.classList.remove('active');
    }

    function go(page){
        alert('Going to ' + page);
    }

    // Optional: simple swipe detection for mobile
    let touchStartX = 0;
    document.body.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
    document.body.addEventListener('touchend', e => {
        let touchEndX = e.changedTouches[0].screenX;
        if(touchEndX - touchStartX > 50){ openMenu(); }
        if(touchStartX - touchEndX > 50){ closeMenu(); }
    });
</script>

</body>
</html>
