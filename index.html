<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name · Sunshine</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #fffbf5;  /* Soft warm white */
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
}

/* Gentle sunshine glow */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 30% 40%, #fff1d6 0%, transparent 40%),
              radial-gradient(circle at 80% 80%, #ffe9c4 0%, transparent 40%);
  opacity: 0.5;
  pointer-events: none;
}

.wrapper {
  max-width: 420px;
  width: 100%;
  position: relative;
}

/* Main card - Clean & Premium */
.container {
  background: #ffffff;
  border-radius: 40px;
  padding: 32px 20px;
  box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05),
              0 0 0 1px #fae9d4;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Profile with soft sun touch */
.profile {
  position: relative;
  margin-bottom: 12px;
}

.profile img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #ffffff;
  box-shadow: 0 10px 25px -5px rgba(218, 165, 50, 0.2),
              0 0 0 4px #fff8e7;
}

.profile::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 130px;
  height: 130px;
  background: radial-gradient(circle, #ffe7b0 0%, transparent 70%);
  opacity: 0.4;
  z-index: -1;
  border-radius: 50%;
}

/* Name - Classic Elegance */
.name {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 500;
  color: #2c2c2c;
  letter-spacing: -0.3px;
}

/* Title - Subtle */
.title {
  font-size: 14px;
  color: #a07e5c;
  font-weight: 400;
  margin-bottom: 16px;
  letter-spacing: 0.5px;
}

/* Buttons - Clean Premium */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 14px 20px;
  border-radius: 50px;
  text-decoration: none;
  background: #ffffff;
  color: #2c2c2c;
  font-size: 15px;
  font-weight: 400;
  border: 1px solid #f0e4d4;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}

.btn:hover {
  background: #fffaf2;
  border-color: #e5c9a8;
  transform: translateY(-2px);
  box-shadow: 0 8px 18px -8px rgba(200, 150, 70, 0.2);
}

.btn img {
  width: 18px;
  height: 18px;
  opacity: 0.7;
  transition: 0.2s;
}

.btn:hover img {
  opacity: 1;
  transform: scale(1.05);
}

/* Premium divider */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 8px 0;
  color: #c4a27a;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, #e5d5c0, transparent);
}

/* Footer */
.footer {
  margin-top: 28px;
  font-size: 11px;
  color: #a9927a;
  text-align: center;
  font-family: 'Playfair Display', serif;
  position: relative;
  padding-top: 16px;
}

.footer::before {
  content: '☀️';
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  background: #fffbf5;
  padding: 0 12px;
  font-size: 14px;
}

/* Responsive */
@media (max-width: 380px) {
  .container { padding: 24px 16px; }
  .name { font-size: 24px; }
  .btn { padding: 12px 16px; }
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="container">

    <div class="profile">
      <img src="Your_Profile_Picture_Link" alt="Profile">
    </div>

    <div class="name">Your_Name</div>
    <div class="title">Your_Title</div>

    <!-- Social Links -->
    <a class="btn" href="#">
      <img src="https://cdn.simpleicons.org/facebook/9c7c5c"> Facebook
    </a>
    <a class="btn" href="#">
      <img src="https://cdn.simpleicons.org/instagram/9c7c5c"> Instagram
    </a>
    <a class="btn" href="#">
      <img src="https://cdn.simpleicons.org/whatsapp/9c7c5c"> WhatsApp
    </a>
    <a class="btn" href="#">
      <img src="https://cdn.simpleicons.org/telegram/9c7c5c"> Telegram
    </a>
    <a class="btn" href="#">
      <img src="https://cdn.simpleicons.org/x/9c7c5c"> Twitter (X)
    </a>

    <!-- Divider -->
    <div class="divider">
      <span class="divider-line"></span>
      <span>Premium</span>
      <span class="divider-line"></span>
    </div>

    <a class="btn" href="tel:01234567890">
      <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" style="opacity:0.6;"> Call Me
    </a>
    <a class="btn" href="#">
      <img src="https://cdn.simpleicons.org/aboutdotme/9c7c5c"> About
    </a>
    <a class="btn" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png" style="opacity:0.6;"> Website
    </a>

  </div>

  <div class="footer">
    © 2026 Your_Name · sunshine premium
  </div>
</div>

</body>
</html>
