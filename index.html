<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#ffffff;
}

/* Header */
header{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    border-bottom:1px solid #eee;
}

.menu{
    font-size:25px;
    cursor:pointer;
}

/* Sidebar */
.sidebar{
    position:fixed;
    right:-250px;
    top:0;
    width:250px;
    height:100%;
    background:#fff;
    transition:0.3s;
    box-shadow:-2px 0 10px rgba(0,0,0,0.1);
    padding-top:60px;
}

.sidebar.active{
    right:0;
}

.sidebar a{
    display:block;
    padding:15px;
    text-decoration:none;
    color:#333;
    border-bottom:1px solid #eee;
}

/* Main */
.main{
    text-align:center;
    margin-top:120px;
    animation:fade 0.6s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1;}
}

/* Button */
.btn{
    padding:12px 25px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

/* Loader */
.loader{
    position:fixed;
    width:100%;
    height:100%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.loader.active{
    opacity:1;
    pointer-events:all;
}

.spinner{
    width:35px;
    height:35px;
    border:4px solid #ddd;
    border-top:4px solid #2e7d32;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<header>
    <div>Welcome</div>
    <div class="menu" onclick="toggleMenu()">☰</div>
</header>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <a onclick="go('home')">Home</a>
    <a onclick="go('test')">Test</a>
    <a onclick="go('about')">About</a>
</div>

<!-- Main -->
<div class="main">
    <h1>Welcome</h1>
    <p>Simple, fast & smooth website 🚀</p>
    <button class="btn" onclick="go('test')">Get Started</button>
</div>

<!-- Loader -->
<div class="loader" id="loader">
    <div class="spinner"></div>
</div>

<script>
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
}

// MAIN NAVIGATION
function go(page){
    document.getElementById("loader").classList.add("active");

    setTimeout(()=>{
        window.location.href = page;
    }, 300);
}
</script>

</body>
</html>
