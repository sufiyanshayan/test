<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ===== টাইটেল ===== -->
    <title>Your Name</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', 'Times New Roman', serif;
            background: #faf7f2;
            color: #2c2c2c;
            line-height: 1.6;
            overflow-x: hidden;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500&display=swap');

        /* Navigation */
        .navbar {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            font-family: 'Montserrat', sans-serif;
        }

        .logo {
            display: inline-block;
            white-space: nowrap;
            font-weight: 300;
            letter-spacing: 2px;
            color: #1a1a1a;
            text-decoration: none;
            text-transform: uppercase;
            position: relative;
            z-index: 1001;
            font-size: 22px;
            padding: 0;
            line-height: 1.2;
            max-width: fit-content;
            overflow: visible;
            text-overflow: clip;
            opacity: 0;
            pointer-events: none;
            width: 0;
        }

        .logo::after {
            display: none;
        }

        /* Hamburger Menu */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            z-index: 1001;
            padding: 15px;
            background: rgba(155, 139, 122, 0.05);
            border-radius: 50%;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .hamburger:hover {
            background: rgba(155, 139, 122, 0.1);
            transform: scale(1.05);
        }

        .hamburger span {
            width: 30px;
            height: 2px;
            background: #2c2c2c;
            margin: 3px 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-radius: 4px;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 6px);
            width: 25px;
            background: #9b8b7a;
        }

        .hamburger.active span:nth-child(2) {
            transform: translateX(-20px);
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(8px, -6px);
            width: 25px;
            background: #9b8b7a;
        }

        /* Navigation Links */
        .nav-links {
            display: flex;
            gap: 40px;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            flex-shrink: 0;
            margin-left: auto;
        }

        .nav-links a {
            color: #3a3a3a;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
            position: relative;
            padding: 10px 15px;
            transition: all 0.3s ease;
            border-radius: 30px;
            overflow: hidden;
            white-space: nowrap;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(155, 139, 122, 0.1), transparent);
            transition: left 0.5s ease;
            z-index: -1;
        }

        .nav-links a:hover::before {
            left: 100%;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 20px;
            height: 2px;
            background: #9b8b7a;
            transition: transform 0.3s ease;
            border-radius: 2px;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            transform: translateX(-50%) scaleX(1);
        }

        .nav-links a.active {
            color: #9b8b7a;
            background: rgba(155, 139, 122, 0.05);
        }

        /* Mobile Menu */
        @media (max-width: 768px) {
            .navbar {
                padding: 15px 25px;
            }

            .hamburger {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 100%;
                height: 100vh;
                background: rgba(255, 255, 255, 0.98);
                backdrop-filter: blur(10px);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 25px;
                transition: right 0.6s cubic-bezier(0.77, 0, 0.175, 1);
                z-index: 1000;
                margin-left: 0;
            }

            .nav-links.active {
                right: 0;
            }

            .nav-links.active a {
                animation: slideIn 0.5s forwards;
                animation-delay: calc(0.1s * var(--i));
                opacity: 0;
            }

            @keyframes slideIn {
                0% {
                    opacity: 0;
                    transform: translateY(30px) scale(0.9);
                }
                100% {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }

            .nav-links a {
                font-size: 24px;
                padding: 15px 30px;
                width: 80%;
                text-align: center;
                white-space: normal;
            }

            .nav-links a:active {
                transform: scale(0.95);
            }
        }

        /* Main Container */
        .main-container {
            margin-top: 100px;
            padding: 0 60px 60px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Page Transitions */
        .page {
            animation: pageFade 0.8s ease;
        }

        @keyframes pageFade {
            from { 
                opacity: 0; 
                transform: translateY(30px);
            }
            to { 
                opacity: 1; 
                transform: translateY(0);
            }
        }

        /* Home Page */
        .home-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
            min-height: 80vh;
        }

        .hero-left {
            padding-right: 40px;
            border-right: 1px solid rgba(0, 0, 0, 0.1);
        }

        .hero-title {
            font-size: 80px;
            font-weight: 300;
            line-height: 1.1;
            margin-bottom: 30px;
            font-family: 'Cormorant Garamond', serif;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .hero-title span {
            display: block;
            font-style: italic;
            color: #9b8b7a;
            font-size: 60px;
            margin-top: 10px;
        }

        .hero-subtitle {
            font-size: 18px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            color: #666;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .hero-quote {
            font-size: 20px;
            font-style: italic;
            color: #9b8b7a;
            margin: 40px 0;
            padding: 20px 0;
            border-top: 1px solid rgba(155, 139, 122, 0.3);
            border-bottom: 1px solid rgba(155, 139, 122, 0.3);
        }

        .hero-right {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .art-piece {
            background: #fff;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border-radius: 4px;
            transition: all 0.3s ease;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .art-piece:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        .art-piece h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            letter-spacing: 3px;
            color: #9b8b7a;
            margin-bottom: 15px;
        }

        .floral-sketch {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #f8f4ed 0%, #fff 100%);
            position: relative;
            overflow: hidden;
            margin-top: 20px;
            border-radius: 4px;
        }

        .floral-sketch::before {
            content: '✧';
            font-size: 200px;
            position: absolute;
            top: -20px;
            right: -20px;
            color: rgba(155, 139, 122, 0.1);
            transform: rotate(15deg);
            animation: spin 20s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(15deg); }
            to { transform: rotate(375deg); }
        }

        /* Page Containers */
        .page-container {
            background: #fff;
            padding: 60px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.02);
            border-radius: 4px;
            min-height: 500px;
        }
        
        /* Button Info Display */
        .button-info {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .button-info-item {
            padding: 20px;
            border-bottom: 1px solid rgba(155, 139, 122, 0.2);
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
        }
        
        .button-info-item:hover {
            background: rgba(155, 139, 122, 0.02);
            padding-left: 25px;
        }
        
        .button-info-item:last-child {
            border-bottom: none;
        }
        
        .button-name {
            font-size: 18px;
            font-weight: 500;
            color: #2c2c2c;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .button-name::before {
            content: '→';
            color: #9b8b7a;
            margin-right: 10px;
            font-size: 20px;
            opacity: 0.5;
        }
        
        .button-link {
            font-size: 16px;
            color: #9b8b7a;
            text-decoration: none;
            display: inline-block;
            padding: 5px 15px;
            background: rgba(155, 139, 122, 0.05);
            border-radius: 30px;
            transition: all 0.3s ease;
            word-break: break-all;
        }
        
        .button-link:hover {
            background: rgba(155, 139, 122, 0.15);
            transform: translateX(5px);
        }
        
        .button-link::before {
            content: '🔗';
            margin-right: 8px;
            font-size: 14px;
            opacity: 0.7;
        }

        .page-placeholder {
            text-align: center;
            color: #999;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            letter-spacing: 2px;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
        }

        .page-placeholder::before {
            content: '✦';
            display: block;
            font-size: 60px;
            color: rgba(155, 139, 122, 0.2);
            margin-bottom: 20px;
        }

        /* Footer */
        .footer {
            margin-top: 100px;
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            color: #999;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .main-container {
                padding: 0 30px 40px;
            }

            .home-grid {
                grid-template-columns: 1fr;
            }

            .hero-left {
                border-right: none;
                padding-right: 0;
            }

            .hero-title {
                font-size: 60px;
            }
            
            .hero-title span {
                font-size: 48px;
            }
        }

        @media (max-width: 600px) {
            .hero-title {
                font-size: 48px;
            }

            .hero-title span {
                font-size: 36px;
            }
            
            .art-piece {
                padding: 20px;
            }
            
            .button-info-item {
                padding: 15px;
            }
            
            .button-name {
                font-size: 16px;
            }
            
            .button-link {
                font-size: 14px;
                padding: 4px 12px;
            }
        }
        
        @media (max-width: 400px) {
            .hero-title {
                font-size: 40px;
            }

            .hero-title span {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- ============================================== -->
    <!-- ===== এখান থেকে সব এডিট করুন (এক জায়গায়) ===== -->
    <!-- ============================================== -->
    <script>
        // ================= আপনার সব তথ্য এখানে দিন =================
        const SITE_CONFIG = {
            // ---------- ১. ফ্যাভিকন লিংক ----------
            favicon: "https://i.ibb.co.com/XCj1rPbD/your-favicon.png",  // আপনার ফ্যাভিকন লিংক
            
            // ---------- ২. টাইটেল ও ফুটার ----------
            siteTitle: "Your Name",              // ব্রাউজার ট্যাবে দেখাবে
            footerText: "✦ Your Name ✦",          // ফুটারে দেখাবে
            
            // ---------- ৩. নেভিগেশন মেনু ----------
            navLinks: ["Home", "Contact", "About", "Collection"],
            
            // ---------- ৪. বাটনের নাম ও লিংক (Home বাদে) ----------
            buttonInfo: [
                {
                    name: "Contact",
                    link: "yourdomain.com/Contact"    // কন্টাক্ট বাটনের লিংক
                },
                {
                    name: "Test",
                    link: "https://mt.work.gd/test"      // অ্যাবাউট বাটনের লিংক
                },
                {
                    name: "Collection",
                    link: "yourdomain.com/Collection"  // কালেকশন বাটনের লিংক
                }
            ],
            
            // ---------- ৫. হোম পেজের কন্টেন্ট ----------
            home: {
                title: "Your Name",           // হোম পেজের বড় টাইটেল
                titleSpan: "as Art",           // টাইটেলের দ্বিতীয় লাইন
                subtitle: "Handcrafted botanical sculptures",
                quote: "Bringing nature's architecture indoors",
                
                art1: {
                    title: "✦ Your Name",      // প্রথম আর্ট পিসের টাইটেল
                    text: "Each piece is a delicate balance of form, texture, and living art. We create miniature landscapes that breathe life into your space."
                },
                
                art2: {
                    title: "✦ LATEST CREATION",
                    text: "The Emerald Cascade - A vertical garden of mosses and ferns"
                },
                
                art3: {
                    title: "✦ UPCOMING EXHIBITION",
                    text1: "March 15-30 | Botanical Arts Gallery",
                    text2: "Private viewing by appointment"
                }
            }
        };
        
        // ---------- ফ্যাভিকন অটো সেট হবে ----------
        (function setFavicon() {
            const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.type = 'image/x-icon';
            link.rel = 'shortcut icon';
            link.href = SITE_CONFIG.favicon;
            document.getElementsByTagName('head')[0].appendChild(link);
            
            // পিএনজি ফরম্যাটের জন্যও
            const linkPNG = document.querySelector("link[rel='icon']") || document.createElement('link');
            linkPNG.type = 'image/png';
            linkPNG.rel = 'icon';
            linkPNG.href = SITE_CONFIG.favicon;
            document.getElementsByTagName('head')[0].appendChild(linkPNG);
        })();
        
        // ---------- টাইটেল সেট ----------
        document.title = SITE_CONFIG.siteTitle;
    </script>
    <!-- ============================================== -->
    <!-- ===== এডিট করার জায়গা শেষ ===== -->
    <!-- ============================================== -->

    <nav class="navbar">
        <span class="logo" id="dynamicLogo"></span>

        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links" id="navLinks"></div>
    </nav>

    <div class="main-container">
        <!-- Home Page -->
        <div id="home-page" class="page">
            <div class="home-grid">
                <div class="hero-left">
                    <h1 class="hero-title">
                        <span id="homeTitleSpan"></span>
                    </h1>
                    <p class="hero-subtitle" id="homeSubtitle"></p>
                    
                    <div class="hero-quote" id="homeQuote"></div>
                    
                    <div class="art-piece">
                        <h3 id="art1Title"></h3>
                        <p id="art1Text"></p>
                    </div>
                </div>
                
                <div class="hero-right">
                    <div class="art-piece">
                        <h3 id="art2Title"></h3>
                        <p id="art2Text"></p>
                        <div class="floral-sketch"></div>
                    </div>
                    
                    <div class="art-piece">
                        <h3 id="art3Title"></h3>
                        <p id="art3Text1"></p>
                        <p style="font-size: 14px; margin-bottom: 0;" id="art3Text2"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Contact Page -->
        <div id="contact-page" class="page" style="display: none;">
            <div class="page-container">
                <div class="button-info" id="contactButtonInfo"></div>
            </div>
        </div>

        <!-- About Page -->
        <div id="about-page" class="page" style="display: none;">
            <div class="page-container">
                <div class="button-info" id="aboutButtonInfo"></div>
            </div>
        </div>

        <!-- Collection Page -->
        <div id="collection-page" class="page" style="display: none;">
            <div class="page-container">
                <div class="button-info" id="collectionButtonInfo"></div>
            </div>
        </div>
        
        <div class="footer" id="footerText"></div>
    </div>

    <script>
        // ========== কনফিগারেশন থেকে সব কন্টেন্ট লোড ==========
        function loadContent() {
            // লোগো ফাঁকা
            document.getElementById('dynamicLogo').innerText = "";
            
            // ফুটার
            document.getElementById('footerText').innerText = SITE_CONFIG.footerText;
            
            // হোম পেজ কন্টেন্ট
            document.querySelector('.hero-title').innerHTML = `${SITE_CONFIG.home.title} <span>${SITE_CONFIG.home.titleSpan}</span>`;
            document.getElementById('homeSubtitle').innerText = SITE_CONFIG.home.subtitle;
            document.getElementById('homeQuote').innerText = SITE_CONFIG.home.quote;
            document.getElementById('art1Title').innerText = SITE_CONFIG.home.art1.title;
            document.getElementById('art1Text').innerText = SITE_CONFIG.home.art1.text;
            document.getElementById('art2Title').innerText = SITE_CONFIG.home.art2.title;
            document.getElementById('art2Text').innerText = SITE_CONFIG.home.art2.text;
            document.getElementById('art3Title').innerText = SITE_CONFIG.home.art3.title;
            document.getElementById('art3Text1').innerText = SITE_CONFIG.home.art3.text1;
            document.getElementById('art3Text2').innerText = SITE_CONFIG.home.art3.text2;
            
            // নেভিগেশন লিংক
            const navLinks = document.getElementById('navLinks');
            navLinks.innerHTML = '';
            
            SITE_CONFIG.navLinks.forEach((linkName, index) => {
                const pageId = linkName.toLowerCase();
                const a = document.createElement('a');
                a.href = '#';
                a.setAttribute('onclick', `showPage('${pageId}'); closeMenu();`);
                a.id = `${pageId}-link`;
                a.style.setProperty('--i', index + 1);
                a.innerText = linkName;
                
                if (linkName === 'Home') a.classList.add('active');
                
                navLinks.appendChild(a);
            });
            
            // বাটন ইনফো
            generateButtonInfo();
        }
        
        function generateButtonInfo() {
            const contactDiv = document.getElementById('contactButtonInfo');
            const aboutDiv = document.getElementById('aboutButtonInfo');
            const collectionDiv = document.getElementById('collectionButtonInfo');
            
            contactDiv.innerHTML = '';
            aboutDiv.innerHTML = '';
            collectionDiv.innerHTML = '';
            
            SITE_CONFIG.buttonInfo.forEach(button => {
                const pageId = button.name.toLowerCase();
                
                let targetDiv;
                if (pageId === 'contact') targetDiv = contactDiv;
                else if (pageId === 'about') targetDiv = aboutDiv;
                else if (pageId === 'collection') targetDiv = collectionDiv;
                
                if (targetDiv) {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'button-info-item';
                    
                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'button-name';
                    nameDiv.innerText = `Button Name : ${button.name}`;
                    
                    const linkDiv = document.createElement('div');
                    linkDiv.className = 'button-link';
                    linkDiv.innerText = `Link : ${button.link}`;
                    
                    itemDiv.appendChild(nameDiv);
                    itemDiv.appendChild(linkDiv);
                    targetDiv.appendChild(itemDiv);
                }
            });
        }

        function toggleMenu() {
            const hamburger = document.querySelector('.hamburger');
            const navLinks = document.querySelector('.nav-links');
            
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
            
            if (navLinks.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }

        function closeMenu() {
            const hamburger = document.querySelector('.hamburger');
            const navLinks = document.querySelector('.nav-links');
            
            hamburger.classList.remove('active');
            navLinks.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function showPage(pageName) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => {
                page.style.display = 'none';
            });

            const selectedPage = document.getElementById(pageName + '-page');
            if (selectedPage) {
                selectedPage.style.display = 'block';
            }

            const links = document.querySelectorAll('.nav-links a');
            links.forEach(link => {
                link.classList.remove('active');
            });
            
            const activeLink = document.getElementById(pageName + '-link');
            if (activeLink) {
                activeLink.classList.add('active');
            }

            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        window.addEventListener('load', function() {
            loadContent();
            showPage('home');
        });

        document.addEventListener('click', function(event) {
            const navLinks = document.querySelector('.nav-links');
            const hamburger = document.querySelector('.hamburger');
            
            if (navLinks.classList.contains('active') && 
                !navLinks.contains(event.target) && 
                !hamburger.contains(event.target)) {
                closeMenu();
            }
        });

        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) {
                closeMenu();
            }
        });
    </script>
</body>
</html>
