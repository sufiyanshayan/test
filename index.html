<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Swipe UI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* Reset & Body */
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background: linear-gradient(145deg, #f0f4f8, #d0e8f2);
    overflow-x:hidden;
    color:#333;
}

/* Header */
header{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    backdrop-filter:blur(12px);
    background:rgba(255,255,255,0.55);
    box-shadow:0 4px 15px rgba(0,0,0,0.05);
    z-index:1002;
}

/* Hamburger Menu */
.menu{
    width:28px;
    height:22px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    cursor:pointer;
    z-index:1003;
}
.menu span{
    display:block;
    height:3px;
    width:100%;
    background:#2e7d32;
    border-radius:2px;
    transition:0.3s;
}
/* Animate hamburger to X */
.menu.active span:nth-child(1){
    transform:rotate(45deg) translate(5px,5px);
}
.menu.active span:nth-child(2){
    opacity:0;
}
.menu.active span:nth-child(3){
    transform:rotate(-45deg) translate(5px,-5px);
}

/* Overlay */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.35);
    top:0;
    left:0;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    z-index:900;
}
.overlay.active{
    opacity:1;
    pointer-events:all;
}

/* Sidebar */
.sidebar{
    position:fixed;
    right:-320px;
    top:0;
    width:320px;
    height:100%;
    backdrop-filter:blur(24px);
    background:rgba(255,255,255,0.85);
    transition:0.4s;
    box-shadow:-6px 0 30px rgba(0,0,0,0.1);
    padding-top:25px;
    z-index:1000;
    border-radius:15px 0 0 15px;
}
.sidebar.active{
    right:0;
}

/* Close Button */
.close-btn{
    text-align:right;
    padding:10px 25px;
    font-size:24px;
    cursor:pointer;
    transition:0.3s;
}
.close-btn:hover{
    color:#2e7d32;
}

/* Profile Section */
.profile{
    text-align:center;
    padding:25px 20px;
    border-bottom:1px solid rgba(0,0,0,0.05);
}
.profile img{
    width:80px;
    height:80px;
    border-radius:50%;
    margin-bottom:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}
.profile h3{
    margin:8px 0 5px;
    font-weight:600;
    color:#2e7d32;
}
.profile p{
    font-size:13px;
    color:gray;
}

/* Menu Links */
.sidebar a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:15px 25px;
    color:#333;
    text-decoration:none;
    border-radius:14px;
    margin:10px 15px;
    transition:0.3s;
    background:rgba(255,255,255,0.3);
    backdrop-filter:blur(10px);
    opacity:0;
    transform:translateX(40px);
    animation:slideIn 0.5s forwards;
}
.sidebar a:hover{
    background:rgba(46,125,50,0.15);
    transform:translateX(0);
    color:#2e7d32;
}
/* Staggered animation */
.sidebar a:nth-child(3){animation-delay:0.1s;}
.sidebar a:nth-child(4){animation-delay:0.2s;}
.sidebar a:nth-child(5){animation-delay:0.3s;}

/* SlideIn Keyframes */
@keyframes slideIn{
    to{
        opacity:1;
        transform:translateX(0);
    }
}

/* Main Section */
.main{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    padding-top:70px;
    transition:0.3s;
}

/* Card */
.card{
    width:90%;
    max-width:380px;
    padding:35px 25px;
    border-radius:25px;
    backdrop-filter:blur(25px);
    background:rgba(255,255,255,0.55);
    box-shadow:0 12px 30px rgba(0,0,0,0.08);
    text-align:center;
    animation:fade 0.6s ease;
    transition:0.3s;
}
.card h2{
    margin-bottom:12px;
    font-weight:700;
    color:#2e7d32;
}
.card p{
    font-size:15px;
    line-height:1.5;
    color:#555;
}
.card:hover{
    transform:translateY(-5px);
    box-shadow:0 18px 40px rgba(0,0,0,0.12);
}

/* Fade animation */
@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* Loader */
.loader{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.95);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    z-index:1001;
}
.loader.active{
    opacity:1;
    pointer-events:all;
}
.spinner{
    width:40px;
    height:40px;
    border:4px solid #ddd;
    border-top:4px solid #2e7d32;
    border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin{
    100%{transform:rotate(360deg);}
}
</style>
</head>
<body>

<header>
    <div style="font-weight:700; font-size:18px; color:#2e7d32;">My Site</div>
    <div class="menu" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>
</header>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <div class="close-btn" onclick="toggleMenu()">✕</div>
    <div class="profile">
        <img src="https://i.pravatar.cc/100" alt="Profile">
        <h3>Your Name</h3>
        <p>Welcome back</p>
    </div>

    <a onclick="go('home')">🏠 Home</a>
    <a onclick="go('test')">📄 Test</a>
    <a onclick="go('about')">ℹ️ About</a>
</div>

<!-- Main -->
<div class="main">
    <div class="card">
        <h2>Welcome 👋</h2>
        <p>Swipe right to open the menu and explore smooth animations! ✨</p>
    </div>
</div>

<!-- Loader -->
<div class="loader" id="loader">
    <div class="spinner"></div>
</div>

<script>
let startX = 0;

// Hamburger + sidebar toggle
function toggleMenu(){
    document.querySelector(".menu").classList.toggle("active");
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

// Swipe gestures
document.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
});
document.addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX;
    if(startX < endX - 80){ toggleMenu(); } // swipe right
    if(startX > endX + 80){ toggleMenu(); } // swipe left
});

// Navigation
function go(page){
    document.getElementById("loader").classList.add("active");
    setTimeout(()=>{
        window.location.href = page;
    }, 300);
}
</script>

</body>
</html>
