<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#fff;
}

/* Header */
header{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    border-bottom:1px solid #eee;
}

.menu{
    font-size:25px;
    cursor:pointer;
}

/* Sidebar */
.sidebar{
    position:fixed;
    right:-250px;
    top:0;
    width:250px;
    height:100%;
    background:#fff;
    transition:0.3s;
    box-shadow:-2px 0 10px rgba(0,0,0,0.1);
    padding-top:60px;
}

.sidebar.active{
    right:0;
}

.sidebar a{
    display:block;
    padding:15px;
    text-decoration:none;
    color:#333;
    border-bottom:1px solid #eee;
}

/* Main */
.main{
    text-align:center;
    margin-top:100px;
}

.btn{
    padding:12px 25px;
    background:green;
    color:white;
    border:none;
    border-radius:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <div>Welcome</div>
    <div class="menu" onclick="toggleMenu()">☰</div>
</header>

<div class="sidebar" id="sidebar">

    <!-- শুধু এখানে page নাম লিখবে -->
    <a href="#" onclick="go('test')">Test</a>
    <a href="#" onclick="go('about')">About</a>
    <a href="#" onclick="go('contact')">Contact</a>

</div>

<div class="main">
    <h1>Welcome</h1>
    <button class="btn" onclick="go('test')">Get Started</button>
</div>

<script>
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
}

// 🔥 MAIN MAGIC FUNCTION
function go(page){
    window.location.href = page;
}
</script>

</body>
</html>
