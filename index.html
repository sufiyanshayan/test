<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name</title>

<!-- favicon -->
<link rel="icon" href="YOUR_FAVICON_LINK" type="image/x-icon">

<!-- fonts & icons -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
</script>

<style>
/* ==================== */
/* YOUR EXISTING CSS STARTS */
/* ==================== */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Space Grotesk', sans-serif; background: linear-gradient(145deg, #0a0a0f, #1a1a2e); color:#fff; overflow-x:hidden; min-height:100vh; }
.app { max-width:480px; margin:0 auto; background:#0f0f17; min-height:100vh; position:relative; border-left:1px solid rgba(255,255,255,0.05); border-right:1px solid rgba(255,255,255,0.05); box-shadow:0 0 50px rgba(0,0,0,0.5); overflow:hidden; }
.cyber-bg { position: fixed; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at 20% 50%, rgba(255, 50, 100, 0.15) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(80, 200, 255, 0.15) 0%, transparent 50%), radial-gradient(circle at 40% 20%, rgba(200, 100, 255, 0.15) 0%, transparent 50%), linear-gradient(145deg, #0a0a0f, #1a1a2e); z-index:-1; animation:breathe 10s ease-in-out infinite; }
@keyframes breathe { 0%,100%{opacity:0.8;}50%{opacity:1;} }
/* ... বাকি CSS তোমার মূল code অনুযায়ী থাকবে ... */

/* Login Overlay CSS */
#login-overlay {
    position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95);
    display:flex; justify-content:center; align-items:center; z-index:10000;
}
#login-overlay .login-card {
    background:#1e1e2c; padding:2rem 3rem; border-radius:20px; text-align:center; max-width:350px; width:90%;
    box-shadow:0 0 30px rgba(255,100,255,0.5);
}
#login-overlay input {
    width:100%; padding:0.8rem; margin-bottom:1rem; border-radius:12px; border:none; font-size:1rem;
}
#login-overlay button {
    width:100%; padding:0.8rem; border-radius:12px; border:none; background:linear-gradient(90deg,#ffa0ff,#a0ffff); color:#000; font-weight:bold; cursor:pointer; font-size:1rem;
}
#login-overlay #error-msg { color:red; margin-top:1rem; font-size:0.85rem; }

/* ==================== */
/* YOUR EXISTING CSS ENDS */
/* ==================== */
</style>
</head>
<body>

<!-- Login Overlay -->
<div id="login-overlay">
    <div class="login-card">
        <h2>Login</h2>
        <input type="email" id="username" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button id="login-btn">Login</button>
        <p id="error-msg"></p>
    </div>
</div>

<!-- animated background -->
<div class="cyber-bg"></div>

<!-- floating particles -->
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>

<div class="app">
    <header>
        <div class="logo"><i class="fa-regular fa-crystal"></i> Your_Name</div>
        <div class="hologram-btn" onclick="openMenu()">
            <div class="line"></div><div class="line"></div>
        </div>
    </header>

    <div class="overlay" id="overlay" onclick="closeMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div class="close-btn" onclick="closeMenu()"><i class="fa-regular fa-xmark"></i></div>
        <div class="profile">
            <div class="avatar"><i class="fa-regular fa-robot"></i></div>
            <div class="profile-text"><h3>YOUR_NAME</h3><p>Your_Title</p></div>
        </div>
        <a onclick="go('home')"><i class="fa-regular fa-crystal"></i> HOLO HOME</a>
        <a onclick="go('test')"><i class="fa-regular fa-flask"></i> TEST</a>
        <a onclick="go('about')"><i class="fa-regular fa-atom"></i> QUANTUM</a>
        <a onclick="go('orbit')"><i class="fa-regular fa-satellite"></i> ORBIT</a>
        <div class="divider"></div>
        <a onclick="go('settings')"><i class="fa-regular fa-sliders"></i> SETTINGS</a>
    </div>

    <div class="main">
        <div class="card">
            <h2>Your_Name<br>Your_Title</h2>
            <p>Your_Description</p>
            <div class="economy-chip"><i class="fa-regular fa-bolt"></i> WELCOME</div>
            <div class="gesture-hint">
                <i class="fa-regular fa-hand-back-point-right"></i> DRAG FROM LEFT TO RIGHT
                <i class="fa-regular fa-hand-back-point-left"></i>
            </div>
            <div class="cyber-status">✦ YOUR_NAME ✦</div>
        </div>
    </div>

    <div class="loader" id="loader"><div class="neon-spinner"></div></div>
</div>

<script>
// ====================
// YOUR EXISTING JS STARTS
// ====================
let touchStartX = 0;
function openMenu(){ document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').classList.add('active'); }
function closeMenu(){ document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }
document.addEventListener('touchstart', e=>{ touchStartX=e.changedTouches[0].screenX;},{passive:true});
document.addEventListener('touchend', e=>{
    const diff=e.changedTouches[0].screenX - touchStartX;
    if(diff>50) openMenu(); else if(diff<-50) closeMenu();
},{passive:true});
function go(page){ document.getElementById('loader').classList.add('active'); setTimeout(()=>{ window.location.href=page; },600); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeMenu(); });
for(let i=0;i<10;i++){ const particle=document.createElement('div'); particle.className='particle'; particle.style.left=Math.random()*100+'%'; particle.style.animationDuration=(15+Math.random()*20)+'s'; particle.style.background=`hsl(${Math.random()*360},100%,70%)`; document.body.appendChild(particle); }
// ====================
// YOUR EXISTING JS ENDS
// ====================

// ====================
// LOGIN JS STARTS
// ====================
const loginBtn = document.getElementById("login-btn");
const overlayLogin = document.getElementById("login-overlay");
const errorMsg = document.getElementById("error-msg");

loginBtn.addEventListener("click", ()=>{
    const email = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email,password)
        .then(userCredential=>{
            overlayLogin.style.display='none';
        })
        .catch(error=>{
            errorMsg.textContent=error.message;
        });
});

// Enter press to login
document.getElementById("password").addEventListener("keypress", e=>{
    if(e.key==="Enter") loginBtn.click();
});
// ====================
// LOGIN JS ENDS
// ====================
</script>

</body>
</html>
