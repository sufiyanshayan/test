<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium UI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:linear-gradient(135deg, #e8f5e9, #ffffff);
}

/* Header */
header{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.6);
}

/* Menu Icon */
.menu{
    font-size:25px;
    cursor:pointer;
}

/* Overlay */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.3);
    top:0;
    left:0;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.overlay.active{
    opacity:1;
    pointer-events:all;
}

/* Sidebar */
.sidebar{
    position:fixed;
    right:-300px;
    top:0;
    width:300px;
    height:100%;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.85);
    transition:0.4s;
    box-shadow:-5px 0 25px rgba(0,0,0,0.1);
    padding-top:20px;
    z-index:1000;
}

.sidebar.active{
    right:0;
}

/* Close Button */
.close-btn{
    text-align:right;
    padding:10px 20px;
    font-size:22px;
    cursor:pointer;
}

/* Profile Section */
.profile{
    text-align:center;
    padding:20px;
    border-bottom:1px solid #eee;
}

.profile img{
    width:70px;
    height:70px;
    border-radius:50%;
    margin-bottom:10px;
}

.profile h3{
    margin:5px 0;
}

/* Menu Links */
.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;
    padding:15px 20px;
    color:#333;
    text-decoration:none;
    border-radius:12px;
    margin:8px 12px;
    transition:0.3s;
}

.sidebar a:hover{
    background:#e8f5e9;
    transform:translateX(-5px);
}

/* Main */
.main{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

.card{
    width:90%;
    max-width:350px;
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.6);
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
    text-align:center;
    animation:fade 0.6s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(15px);}
    to{opacity:1;}
}

/* Loader */
.loader{
    position:fixed;
    width:100%;
    height:100%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.loader.active{
    opacity:1;
    pointer-events:all;
}

.spinner{
    width:35px;
    height:35px;
    border:4px solid #ddd;
    border-top:4px solid #2e7d32;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<header>
    <div>My Site</div>
    <div class="menu" onclick="openMenu()">☰</div>
</header>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">

    <div class="close-btn" onclick="closeMenu()">✕</div>

    <!-- Profile -->
    <div class="profile">
        <img src="https://i.pravatar.cc/100" alt="">
        <h3>Your Name</h3>
        <p style="font-size:12px;color:gray;">Welcome back</p>
    </div>

    <a onclick="go('home')">🏠 Home</a>
    <a onclick="go('test')">📄 Test</a>
    <a onclick="go('about')">ℹ️ About</a>

</div>

<!-- Main -->
<div class="main">
    <div class="card">
        <h2>Welcome 👋</h2>
        <p>Fully upgraded premium UI 🔥</p>
    </div>
</div>

<!-- Loader -->
<div class="loader" id="loader">
    <div class="spinner"></div>
</div>

<script>
function openMenu(){
    document.getElementById("sidebar").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeMenu(){
    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}

function go(page){
    document.getElementById("loader").classList.add("active");

    setTimeout(()=>{
        window.location.href = page;
    }, 300);
}
</script>

</body>
</html>
