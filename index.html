<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name</title>

<!-- Google Fonts - Classic Modern Combination -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;500;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" type="image/png" href="Your_Favicon_Link">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Noto Serif Bengali", serif;
  background: #ffffff; /* Pure white background */
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  line-height: 1.6;
  color: #1a1a1a;
}

.wrapper {
  width: 100%;
  max-width: 420px;
  padding: 24px 16px;
  margin: 0 auto;
}

.container {
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: #ffffff;
  border-radius: 32px;
  padding: 24px 16px;
  box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.03), 0 0 0 1px rgba(0, 0, 0, 0.02);
}

/* Profile Picture - Premium Classic Modern Style */
.profile img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 16px;
  border: 2px solid #ffffff;
  box-shadow: 
    0 0 0 4px #ffffff,
    0 0 0 6px #f0f0f0,
    0 15px 25px -8px rgba(0, 0, 0, 0.1);
  transition: transform 0.3s ease;
}

.profile img:hover {
  transform: scale(1.02);
}

/* Name - Classic Modern Typography */
.name {
  font-family: "Playfair Display", serif;
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
  color: #1a1a1a;
  position: relative;
  display: inline-block;
  padding-bottom: 8px;
}

.name::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 2px;
  background: #1a1a1a;
  opacity: 0.15;
}

/* Title - Subtle Premium Touch */
.title {
  font-size: 14px;
  color: #6b6b6b;
  margin-bottom: 20px;
  font-weight: 400;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  font-family: "Noto Serif Bengali", serif;
}

/* Buttons - Premium Economy Vibe */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 16px 20px;
  border-radius: 50px;
  text-decoration: none;
  background: #ffffff;
  color: #1a1a1a;
  font-size: 15px;
  font-weight: 500;
  border: 1px solid rgba(0, 0, 0, 0.04);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
  transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.5) 50%, transparent 100%);
  transform: translateX(-100%);
  transition: transform 0.6s ease;
}

.btn:hover::before {
  transform: translateX(100%);
}

.btn:hover {
  transform: translateY(-3px);
  border-color: rgba(0, 0, 0, 0.1);
  box-shadow: 0 15px 25px -8px rgba(0, 0, 0, 0.1);
  background: #fafafa;
}

.btn img {
  width: 20px;
  height: 20px;
  object-fit: contain;
  filter: brightness(0.9);
  transition: transform 0.2s ease;
}

.btn:hover img {
  transform: scale(1.1);
}

/* Special style for last two buttons (About Me & Website) */
.btn:last-of-type,
.btn:nth-last-of-type(2) {
  border: 1px solid rgba(0, 0, 0, 0.08);
  background: #fcfcfc;
}

/* Footer - Elegant Minimal */
.footer {
  margin-top: 28px;
  font-size: 11px;
  color: #8f8f8f;
  text-align: center;
  font-family: "Playfair Display", serif;
  letter-spacing: 0.5px;
  line-height: 1.8;
  padding: 16px 0 8px;
  position: relative;
}

.footer::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 30px;
  height: 1px;
  background: #d4d4d4;
}

.footer br + span {
  font-family: "Noto Serif Bengali", serif;
}

/* Responsive Fine-tuning */
@media (max-width: 380px) {
  .container {
    padding: 20px 12px;
  }
  
  .btn {
    padding: 14px 16px;
    font-size: 14px;
  }
  
  .name {
    font-size: 22px;
  }
}
</style>
</head>

<body>

      <img src="Your_Profile_Picture_Link" alt="Profile Picture">
    </div>

  </div>

  <div class="footer">
    Copyright © 2026 MADE BY <br> "Your_Name". <br> All Rights Reserved.
  </div>

</div>

</body>
</html>
