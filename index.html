<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name · Signature Edition</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" type="image/png" href="Your_Favicon_Link">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0c10;
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
}

.wrapper {
  max-width: 400px;
  width: 100%;
}

/* Main Card */
.container {
  background: #111418;
  border-radius: 36px;
  padding: 36px 22px 28px;
  box-shadow: 0 25px 45px -15px #000;
  border: 1px solid #2a2f38;
  position: relative;
}

/* Profile */
.profile {
  text-align: center;
  margin-bottom: 18px;
}

.profile img {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #d4af37;
  box-shadow: 0 0 0 3px #111418, 0 10px 20px -8px #000;
}

/* Name */
.name {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  font-weight: 500;
  color: #d4af37;
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: -0.3px;
}

/* Title */
.title {
  font-size: 12px;
  color: #7f8fa3;
  text-align: center;
  font-weight: 300;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 24px;
}

/* Buttons */
.buttons {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn {
  display: flex;
  align-items: center;
  padding: 14px 18px;
  text-decoration: none;
  background: #1a1e26;
  border: 1px solid #2f3540;
  border-radius: 40px;
  transition: all 0.2s ease;
  color: #fff;
  font-size: 14px;
  font-weight: 400;
}

.btn:hover {
  background: #222832;
  border-color: #d4af37;
  transform: translateY(-1px);
}

.btn-icon {
  width: 24px;
  margin-right: 12px;
  display: flex;
  justify-content: center;
}

.btn-icon img {
  width: 18px;
  height: 18px;
  filter: brightness(0) invert(1);
  opacity: 0.9;
}

.btn-text {
  flex: 1;
  color: #eceef2;
}

.btn-arrow {
  color: #4169e1;
  opacity: 0.6;
  font-size: 16px;
}

.btn:hover .btn-arrow {
  opacity: 1;
}

/* Footer */
.footer {
  margin-top: 28px;
  text-align: center;
  font-size: 10px;
  color: #5f6a7a;
  line-height: 1.8;
  padding-top: 16px;
  border-top: 1px solid #222831;
}

.footer span {
  color: #d4af37;
  font-family: 'Playfair Display', serif;
  font-size: 11px;
}

/* Responsive */
@media (max-width: 360px) {
  .container { padding: 30px 18px; }
  .name { font-size: 28px; }
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="container">

    <!-- Profile -->
    <div class="profile">
      <img src="Your_Profile_Picture_Link" alt="Profile">
    </div>

    <!-- Name & Title -->
    <div class="name">Your_Name</div>
    <div class="title">Your_Title</div>

    <!-- All Buttons - একটানা সাজানো -->
    <div class="buttons">

      <!-- Facebook -->
      <a class="btn" href="https://www.facebook.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/facebook/ffffff"></span>
        <span class="btn-text">Facebook</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- Facebook Page -->
      <a class="btn" href="https://www.facebook.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/facebook/ffffff"></span>
        <span class="btn-text">Facebook Page</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- Instagram -->
      <a class="btn" href="https://www.instagram.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/instagram/ffffff"></span>
        <span class="btn-text">Instagram</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- WhatsApp -->
      <a class="btn" href="https://wa.me/8801234567890" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/whatsapp/ffffff"></span>
        <span class="btn-text">WhatsApp</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- TikTok -->
      <a class="btn" href="https://www.tiktok.com/@your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/tiktok/ffffff"></span>
        <span class="btn-text">TikTok</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- Telegram -->
      <a class="btn" href="https://t.me/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/telegram/ffffff"></span>
        <span class="btn-text">Telegram</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- Twitter (X) -->
      <a class="btn" href="https://x.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/x/ffffff"></span>
        <span class="btn-text">Twitter (X)</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- Call Me -->
      <a class="btn" href="tel:01234567890">
        <span class="btn-icon"><img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" style="filter: brightness(0) invert(1); width:18px;"></span>
        <span class="btn-text">Call Me</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- About Me -->
      <a class="btn" href="#">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/aboutdotme/ffffff"></span>
        <span class="btn-text">About Me</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- My Website -->
      <a class="btn" href="#">
        <span class="btn-icon"><img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png" style="filter: brightness(0) invert(1); width:18px;"></span>
        <span class="btn-text">My Website</span>
        <span class="btn-arrow">→</span>
      </a>

    </div>

    <!-- Footer -->
    <div class="footer">
      Copyright © 2026 MADE BY <br> <span>"Your_Name"</span>. <br> All Rights Reserved
    </div>

  </div>
</div>

</body>
</html>
