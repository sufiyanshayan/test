<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name · Signature Edition</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" type="image/png" href="Your_Favicon_Link">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0c10;
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
  position: relative;
}

/* Soft background glow */
body::before {
  content: '';
  position: fixed;
  top: -30%;
  right: -20%;
  width: 80%;
  height: 80%;
  background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  bottom: -30%;
  left: -20%;
  width: 80%;
  height: 80%;
  background: radial-gradient(circle, rgba(65, 105, 225, 0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.wrapper {
  max-width: 420px;
  width: 100%;
  position: relative;
  z-index: 2;
}

/* Main Card - Premium Black */
.container {
  background: #111418;
  border-radius: 40px;
  padding: 38px 22px 30px;
  box-shadow: 
    0 30px 50px -20px #000,
    0 0 0 1px rgba(212, 175, 55, 0.15);
  position: relative;
  border: 1px solid #2a2f38;
  overflow: hidden;
}

/* Subtle gold line at top */
.container::before {
  content: '';
  position: absolute;
  top: 0;
  left: 25%;
  width: 50%;
  height: 3px;
  background: linear-gradient(90deg, transparent, #d4af37, #4169e1, #d4af37, transparent);
  border-radius: 0 0 4px 4px;
  opacity: 0.6;
}

/* Profile section with gradient border */
.profile {
  text-align: center;
  margin-bottom: 20px;
  position: relative;
  display: flex;
  justify-content: center;
}

/* Gradient border container for profile */
.profile-border {
  position: relative;
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: linear-gradient(135deg, #d4af37, #4169e1, #d4af37);
  display: flex;
  justify-content: center;
  align-items: center;
  animation: rotateGradient 4s linear infinite;
}

@keyframes rotateGradient {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.profile-border img {
  width: 104px;
  height: 104px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #111418;
  box-shadow: 0 15px 30px -10px #000;
  transition: transform 0.3s ease;
  position: relative;
  z-index: 2;
}

.profile-border:hover {
  animation: none;
  background: linear-gradient(135deg, #4169e1, #d4af37, #4169e1);
}

.profile-border:hover img {
  transform: scale(1.02);
}

/* Name */
.name {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 600;
  color: #d4af37;
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: -0.3px;
  text-shadow: 0 2px 10px rgba(212, 175, 55, 0.2);
  line-height: 1.2;
}

/* Title */
.title {
  font-size: 12px;
  color: #8a9ac2;
  text-align: center;
  font-weight: 300;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 26px;
  padding: 0 10px;
  display: inline-block;
  width: 100%;
}

/* Buttons container */
.buttons {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Button with gradient border */
.btn {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  text-decoration: none;
  background: #1a1e26;
  border-radius: 50px;
  transition: all 0.3s ease;
  color: #fff;
  font-size: 14px;
  font-weight: 400;
  position: relative;
  overflow: hidden;
  
  /* Gradient border */
  border: double 1.5px transparent;
  background-image: linear-gradient(#1a1e26, #1a1e26), 
                    linear-gradient(90deg, #d4af37, #4169e1, #d4af37);
  background-origin: border-box;
  background-clip: padding-box, border-box;
}

/* Subtle gradient overlay on hover */
.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), rgba(65, 105, 225, 0.1), transparent);
  transition: left 0.5s ease;
  z-index: 1;
}

.btn:hover::before {
  left: 100%;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px -10px #000;
  
  /* Reverse gradient on hover */
  background-image: linear-gradient(#222832, #222832), 
                    linear-gradient(90deg, #4169e1, #d4af37, #4169e1);
}

.btn-icon, .btn-text, .btn-arrow {
  position: relative;
  z-index: 2;
}

/* Button icon */
.btn-icon {
  width: 28px;
  margin-right: 14px;
  display: flex;
  justify-content: center;
}

.btn-icon img {
  width: 18px;
  height: 18px;
  filter: brightness(0) invert(1);
  opacity: 0.9;
  transition: transform 0.3s ease;
}

.btn:hover .btn-icon img {
  transform: scale(1.1);
  opacity: 1;
}

/* Button text */
.btn-text {
  flex: 1;
  color: #eceef2;
  font-weight: 350;
  letter-spacing: 0.2px;
}

/* Button arrow */
.btn-arrow {
  color: #4169e1;
  opacity: 0.6;
  font-size: 18px;
  transition: all 0.3s ease;
  margin-left: 5px;
}

.btn:hover .btn-arrow {
  opacity: 1;
  transform: translateX(3px);
  color: #d4af37;
}

/* Mini premium divider */
.mini-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), rgba(65, 105, 225, 0.3), transparent);
  margin: 15px 0 5px;
  width: 100%;
}

/* Footer */
.footer {
  margin-top: 30px;
  text-align: center;
  font-size: 11px;
  color: #6b7485;
  line-height: 1.9;
  padding-top: 18px;
  position: relative;
}

.footer::before {
  content: '';
  position: absolute;
  top: 0;
  left: 30%;
  width: 40%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), rgba(65, 105, 225, 0.3), transparent);
}

.footer span {
  color: #d4af37;
  font-family: 'Playfair Display', serif;
  font-size: 12px;
  font-weight: 500;
}

/* Premium badge */
.premium-badge {
  text-align: center;
  margin: 8px 0 -5px;
  font-size: 8px;
  color: rgba(212, 175, 55, 0.3);
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* Responsive */
@media (max-width: 360px) {
  .container { padding: 32px 18px 25px; }
  .name { font-size: 28px; }
  .btn { padding: 12px 16px; }
  .btn-text { font-size: 13px; }
  .profile-border { width: 100px; height: 100px; }
  .profile-border img { width: 94px; height: 94px; }
}
</style>
</head>
<body>

  <div class="container">

    <!-- Profile with Gradient Border -->

      <div class="profile-border">

    <div class="name">Your_Name</div>

    <!-- All Buttons with Gradient Borders -->
    <div class="buttons">

      <!-- Divider -->
      <div class="mini-divider"></div>

      <!-- Call Me -->
      <a class="btn" href="tel:01234567890">

      <!-- About Me -->
      <a class="btn" href="#">

      <a class="btn" href="#">

        <span class="btn-text">My Website</span>
        <span class="btn-arrow">→</span>
      </a>

    </div>

    <!-- Premium Badge -->
    <div class="premium-badge">✦ PREMIUM GRADIENT EDITION ✦</div>

    <!-- Footer -->
    <div class="footer">
      Copyright © 2026 MADE BY <br> <span>"Your_Name"</span>. <br> All Rights Reserved
    </div>

  </div>
</div>

</body>
</html>
