<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMPHIS | Your_Name</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #FFE5B4;
            font-family: 'Righteous', cursive;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Memphis Patterns */
        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, #FF6B6B 10px, transparent 10px),
                radial-gradient(circle at 90% 40%, #4ECDC4 15px, transparent 15px),
                radial-gradient(circle at 30% 80%, #FFE66D 20px, transparent 20px),
                repeating-linear-gradient(45deg, #FF9F1C 0px, #FF9F1C 5px, transparent 5px, transparent 15px);
            opacity: 0.3;
            animation: movePatterns 20s linear infinite;
        }

        @keyframes movePatterns {
            0% { background-position: 0 0; }
            100% { background-position: 100px 100px; }
        }

        .container { max-width: 500px; width: 100%; padding: 20px; position: relative; z-index: 2; }

        /* Memphis Card */
        .memphis-card {
            background: white;
            border: 8px solid black;
            box-shadow: 15px 15px 0 #FF6B6B, 25px 25px 0 #4ECDC4;
            padding: 40px 25px;
            position: relative;
            transform: rotate(-1deg);
        }

        /* Squiggle */
        .squiggle {
            position: absolute;
            top: -20px;
            left: 20px;
            font-size: 40px;
            color: #FF6B6B;
            transform: rotate(5deg);
        }

        /* Profile */
        .profile-memphis {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        .morphic-frame {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #FFE66D);
            padding: 8px;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation: morph 8s ease-in-out infinite;
        }
        @keyframes morph {
            0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            33% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; }
            66% { border-radius: 50% 50% 50% 50% / 50% 50% 50% 50%; }
        }
        .morphic-frame img {
            width: 100%;
            height: 100%;
            border-radius: inherit;
            object-fit: cover;
            border: 4px solid white;
        }
        .name-memphis {
            font-family: 'Archivo Black', sans-serif;
            font-size: 48px;
            color: black;
            text-transform: uppercase;
            -webkit-text-stroke: 3px #FF6B6B;
            letter-spacing: -2px;
            margin-bottom: 5px;
        }
        .title-memphis {
            font-size: 16px;
            color: #4ECDC4;
            background: black;
            display: inline-block;
            padding: 5px 20px;
            transform: rotate(-2deg);
        }

        /* Stats */
        .barbie-stats {
            display: flex;
            gap: 10px;
            margin: 30px 0;
        }
        .stat-cloud {
            flex: 1;
            background: #FFE66D;
            border: 3px solid black;
            border-radius: 50% 20% 50% 20%;
            padding: 15px 5px;
            text-align: center;
            transform: rotate(var(--rot));
            box-shadow: 5px 5px 0 #FF6B6B;
        }
        .stat-cloud:nth-child(1) { --rot: -2deg; background: #FF6B6B; color: white; }
        .stat-cloud:nth-child(2) { --rot: 3deg; background: #4ECDC4; }
        .stat-cloud:nth-child(3) { --rot: -1deg; background: #FFE66D; }
        .stat-num {
            font-size: 28px;
            font-weight: bold;
            display: block;
        }

        /* Buttons */
        .memphis-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0;
            padding: 15px 25px;
            background: white;
            border: 4px solid black;
            text-decoration: none;
            color: black;
            font-size: 18px;
            text-transform: uppercase;
            transition: all 0.2s;
            position: relative;
            box-shadow: 8px 8px 0 #FF6B6B;
        }
        .memphis-btn:nth-child(even) { box-shadow: 8px 8px 0 #4ECDC4; }
        .memphis-btn:hover {
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0 black;
        }
        .memphis-btn img { 
            width: 24px; 
            height: 24px;
            filter: brightness(0);
        }

        .footer-memphis {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            font-weight: bold;
            border-top: 4px dashed black;
            padding-top: 20px;
        }
        .emoji-row {
            font-size: 24px;
            margin-bottom: 10px;
            filter: drop-shadow(2px 2px 0 #FF6B6B);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="memphis-card">
            <div class="squiggle">〰️〰️〰️</div>
            
            <div class="profile-memphis">
                <div class="morphic-frame">
                    <img src="Your_Profile_Picture_Link" alt="">
                </div>
                <h1 class="name-memphis">YOUR_NAME</h1>
                <div class="title-memphis">MEMPHIS GROUP</div>
            </div>

            <div class="barbie-stats">
                <div class="stat-cloud"><span class="stat-num">80s</span> VIBE</div>
                <div class="stat-cloud"><span class="stat-num">POP</span> ART</div>
                <div class="stat-cloud"><span class="stat-num">FUN</span>KY</div>
            </div>

            <a href="#" class="memphis-btn"><span>🤘 FACEBOOK</span> <img src="https://cdn.simpleicons.org/facebook/000000"></a>
            <a href="#" class="memphis-btn"><span>🎸 FB PAGE</span> <img src="https://cdn.simpleicons.org/facebook/000000"></a>
            <a href="#" class="memphis-btn"><span>📸 INSTAGRAM</span> <img src="https://cdn.simpleicons.org/instagram/000000"></a>
            <a href="#" class="memphis-btn"><span>💬 WHATSAPP</span> <img src="https://cdn.simpleicons.org/whatsapp/000000"></a>
            <a href="#" class="memphis-btn"><span>🎵 TIKTOK</span> <img src="https://cdn.simpleicons.org/tiktok/000000"></a>
            <a href="#" class="memphis-btn"><span>✈️ TELEGRAM</span> <img src="https://cdn.simpleicons.org/telegram/000000"></a>
            <a href="#" class="memphis-btn"><span>🐦 X</span> <img src="https://cdn.simpleicons.org/x/000000"></a>
            <a href="#" class="memphis-btn"><span>🎮 DISCORD</span> <img src="https://cdn.simpleicons.org/discord/000000"></a>
            <a href="#" class="memphis-btn"><span>📞 CALL ME</span> <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" style="filter: brightness(0);"></a>
            <a href="#" class="memphis-btn"><span>👤 ABOUT</span> <img src="https://cdn.simpleicons.org/aboutdotme/000000"></a>
            <a href="#" class="memphis-btn"><span>🌐 WEBSITE</span> <img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png" style="filter: brightness(0);"></a>

            <div class="footer-memphis">
                <div class="emoji-row">🌀💖✨💎🌀</div>
                © 2026 MEMPHIS MILANO • YOUR_NAME
            </div>
        </div>
    </div>
</body>
</html>
