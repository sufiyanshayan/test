<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL | premium economy · future classic</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* futuristic container */
        .universe {
            max-width: 480px;
            margin: 0 auto;
            background: #ffffff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.15);
            border-radius: 0;
            overflow: hidden;
        }

        /* floating particle effect (futuristic touch) */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: rgba(0,0,0,0.03);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* header — cyber minimal */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 1.8rem;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(0,0,0,0.02);
            position: sticky;
            top: 0;
            z-index: 100;
            letter-spacing: -0.02em;
        }

        .logo {
            font-weight: 700;
            font-size: 1.3rem;
            background: linear-gradient(145deg, #000000, #3a3a3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logo i {
            font-size: 1.1rem;
            color: #8e8e93;
            -webkit-text-fill-color: #8e8e93;
            background: none;
        }

        .logo span {
            font-weight: 400;
            color: #8e8e93;
            -webkit-text-fill-color: #8e8e93;
            background: none;
            font-size: 0.9rem;
            margin-left: 2px;
        }

        .hamburger {
            width: 44px;
            height: 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border-radius: 30px;
            background: rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .hamburger:hover {
            background: rgba(0,0,0,0.04);
            border-color: rgba(0,0,0,0.05);
        }

        .hamburger .line {
            width: 20px;
            height: 2px;
            background: #1d1d1f;
            border-radius: 4px;
            transition: 0.2s;
        }

        /* overlay with futuristic blur */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(12px) brightness(0.9);
            -webkit-backdrop-filter: blur(12px) brightness(0.9);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 200;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        /* sidebar — neural interface */
        .sidebar {
            position: fixed;
            right: -360px;
            top: 0;
            width: 340px;
            height: 100%;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            box-shadow: -25px 0 50px -20px rgba(0,0,0,0.2);
            transition: right 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 300;
            padding: 2.2rem 1.5rem;
            border-left: 1px solid rgba(255,255,255,0.5);
        }

        .sidebar.active {
            right: 0;
        }

        .close-btn {
            text-align: right;
            margin-bottom: 1.5rem;
            cursor: pointer;
        }

        .close-btn i {
            font-size: 1.6rem;
            color: #5a5a5e;
            transition: transform 0.3s;
        }

        .close-btn:hover i {
            transform: rotate(90deg) scale(0.9);
        }

        /* profile — future human */
        .profile {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            margin-bottom: 2rem;
        }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(145deg, #f2f2f2, #ffffff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #2c2c2e;
            border: 2px solid white;
            box-shadow: 0 8px 16px rgba(0,0,0,0.02);
        }

        .profile-text h3 {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 0.2rem;
            color: #000;
        }

        .profile-text p {
            font-size: 0.8rem;
            color: #8e8e93;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* menu items — futuristic slide + glow */
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding: 1.1rem 1.2rem;
            color: #1c1c1e;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 20px;
            margin: 0.3rem 0;
            transition: all 0.3s ease;
            background: transparent;
            border: 1px solid transparent;
            opacity: 0;
            transform: translateX(25px);
            animation: slideFwd 0.5s forwards;
        }

        .sidebar a:nth-child(4) { animation-delay: 0.07s; }
        .sidebar a:nth-child(5) { animation-delay: 0.14s; }
        .sidebar a:nth-child(6) { animation-delay: 0.21s; }
        .sidebar a:nth-child(7) { animation-delay: 0.28s; }

        .sidebar a i {
            font-size: 1.4rem;
            width: 30px;
            color: #6c6c70;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: rgba(0,0,0,0.02);
            border-color: rgba(0,0,0,0.04);
            transform: translateX(8px) scale(1.02);
        }

        .sidebar a:hover i {
            color: #000;
        }

        @keyframes slideFwd {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* main content — future classic card */
        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 1.8rem;
            position: relative;
            z-index: 2;
        }

        .card {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 48px;
            padding: 3rem 2rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 
                0 30px 50px -25px rgba(0,0,0,0.1),
                0 0 0 1px rgba(0,0,0,0.01) inset;
            text-align: center;
            animation: rise 0.8s ease-out;
            position: relative;
            overflow: hidden;
        }

        /* futuristic ring */
        .card::after {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at 30% 30%, rgba(0,0,0,0.01), transparent 60%);
            pointer-events: none;
        }

        @keyframes rise {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card h2 {
            font-weight: 700;
            font-size: 2.2rem;
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
            color: #000;
            line-height: 1.2;
        }

        .card h2 i {
            font-size: 1.8rem;
            color: #8e8e93;
            margin-right: 6px;
        }

        .card p {
            color: #6c6c70;
            font-weight: 400;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2.2rem;
            max-width: 260px;
            margin-left: auto;
            margin-right: auto;
        }

        .economy-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(0,0,0,0.02);
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            border: 1px solid rgba(0,0,0,0.03);
            font-size: 0.85rem;
            color: #2c2c2e;
            font-weight: 600;
            letter-spacing: 0.3px;
            backdrop-filter: blur(5px);
        }

        .economy-chip i {
            color: #8e8e93;
            font-size: 1.1rem;
        }

        /* futuristic loader */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px) brightness(1.1);
            -webkit-backdrop-filter: blur(20px) brightness(1.1);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            z-index: 400;
        }

        .loader.active {
            opacity: 1;
            pointer-events: all;
        }

        .neuro-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(0,0,0,0.03);
            border-top: 3px solid #000;
            border-right: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            animation: spin 0.8s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95);
            box-shadow: 0 0 20px rgba(0,0,0,0.02);
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* swipe hint — future touch */
        .gesture-hint {
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: #a1a1a6;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .gesture-hint i {
            font-size: 1rem;
            opacity: 0.6;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }

        .divider {
            width: 60px;
            height: 2px;
            background: rgba(0,0,0,0.03);
            margin: 2rem auto 1.5rem;
            border-radius: 2px;
        }

        /* micro-interactions */
        .glow-text {
            color: #8e8e93;
            font-size: 0.7rem;
            font-weight: 500;
            margin-top: 0.5rem;
        }

        /* particle canvas (static but futuristic) */
        .particle-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="universe">
        <!-- subtle particle effect (divs for simplicity) -->
        <div class="particle" style="top: 20%; left: 10%;"></div>
        <div class="particle" style="top: 70%; left: 80%; width: 3px; height: 3px;"></div>
        <div class="particle" style="top: 40%; left: 50%;"></div>
        <div class="particle" style="top: 85%; left: 25%;"></div>
        <div class="particle" style="top: 15%; left: 90%;"></div>

        <header>
            <div class="logo">
                <i class="fa-regular fa-compass"></i> neural <span>· economy</span>
            </div>
            <div class="hamburger" onclick="openMenu()">
                <div class="line"></div>
                <div class="line"></div>
            </div>
        </header>

        <!-- Overlay -->
        <div class="overlay" id="overlay" onclick="closeMenu()"></div>

        <!-- Sidebar — future interface -->
        <div class="sidebar" id="sidebar">
            <div class="close-btn" onclick="closeMenu()">
                <i class="fa-regular fa-xmark"></i>
            </div>

            <div class="profile">
                <div class="avatar">
                    <i class="fa-regular fa-user-astronaut"></i>
                </div>
                <div class="profile-text">
                    <h3>Nova Chen</h3>
                    <p>premium · economy class</p>
                </div>
            </div>

            <a onclick="go('home')">
                <i class="fa-regular fa-house-chimney"></i> Neural Home
            </a>
            <a onclick="go('test')">
                <i class="fa-regular fa-flask"></i> Test
            </a>
            <a onclick="go('about')">
                <i class="fa-regular fa-atom"></i> About
            </a>
            <a onclick="go('orbit')">
                <i class="fa-regular fa-satellite"></i> Orbit
            </a>

            <div class="divider"></div>

            <a onclick="go('settings')" style="opacity:0.7;">
                <i class="fa-regular fa-sliders"></i> interface
            </a>
        </div>

        <!-- Main Content -->
        <div class="main">
            <div class="card">
                <h2><i class="fa-regular fa-sparkle"></i>future classic</h2>
                <p>economy soul · premium mind. white aesthetic, neural touch.</p>
                
                <div class="economy-chip">
                    <i class="fa-regular fa-cube"></i> economy 5.0
                </div>

                <div class="gesture-hint">
                    <i class="fa-regular fa-hand-back-point-right"></i> swipe · explore
                    <i class="fa-regular fa-hand-back-point-left"></i>
                </div>
                <div class="glow-text">— neural interface active —</div>
            </div>
        </div>

        <!-- Loader -->
        <div class="loader" id="loader">
            <div class="neuro-spinner"></div>
        </div>
    </div>

    <script>
        let touchStartX = 0;
        let touchEndX = 0;

        function openMenu() {
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeMenu() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        // futuristic swipe gesture
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchEndX - touchStartX;

            if (diff > 55) { // swipe right
                openMenu();
            } else if (diff < -55) { // swipe left
                closeMenu();
            }
        }, { passive: true });

        // navigation with loader
        function go(page) {
            document.getElementById('loader').classList.add('active');
            setTimeout(() => {
                window.location.href = page;  // 실제 라우팅
                // 또는 demo purpose: loader remove
                // document.getElementById('loader').classList.remove('active');
            }, 500);
        }

        // optional: keyboard
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeMenu();
        });

        // small futuristic detail: random particle movement (optional)
        window.addEventListener('mousemove', (e) => {
            // just for vibe
        });
    </script>
</body>
</html>
