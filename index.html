<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name · Royal Black Edition</title>

<!-- Fonts - Ultra Premium -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" type="image/png" href="Your_Favicon_Link">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #030405;  /* Deepest black */
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
}

/* Animated gradient background */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: 
    radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(65, 105, 225, 0.03) 0%, transparent 50%),
    radial-gradient(circle at 40% 20%, rgba(212, 175, 55, 0.02) 0%, transparent 50%),
    radial-gradient(circle at 70% 30%, rgba(65, 105, 225, 0.02) 0%, transparent 50%);
  animation: gradientShift 20s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 0;
}

@keyframes gradientShift {
  0% { opacity: 0.5; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.1); }
}

/* Floating particles */
.particle {
  position: fixed;
  width: 2px;
  height: 2px;
  background: rgba(212, 175, 55, 0.3);
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
  animation: floatParticle 15s infinite linear;
}

@keyframes floatParticle {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-100vh) translateX(100vw); opacity: 0; }
}

.wrapper {
  max-width: 480px;
  width: 100%;
  position: relative;
  z-index: 10;
}

/* Main Card - Ultra Premium */
.container {
  background: rgba(5, 7, 12, 0.95);
  backdrop-filter: blur(10px);
  border-radius: 48px;
  padding: 48px 32px 42px;
  box-shadow: 
    0 50px 100px -30px #000,
    0 0 0 1px rgba(212, 175, 55, 0.2),
    inset 0 1px 2px rgba(255, 255, 255, 0.02),
    inset 0 0 50px rgba(212, 175, 55, 0.05);
  position: relative;
  border: 1px solid rgba(212, 175, 55, 0.15);
  animation: cardFloat 6s ease-in-out infinite;
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

/* Royal top bar */
.container::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 20%;
  width: 60%;
  height: 3px;
  background: linear-gradient(90deg, 
    transparent, 
    #d4af37, 
    #4169e1, 
    #d4af37, 
    transparent
  );
  border-radius: 4px 4px 0 0;
  filter: blur(1px);
}

/* Diamond corner accents */
.corner-tl {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 50px;
  height: 50px;
  border-top: 2px solid rgba(212, 175, 55, 0.3);
  border-left: 2px solid rgba(212, 175, 55, 0.3);
  border-radius: 12px 0 0 0;
}

.corner-br {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 50px;
  height: 50px;
  border-bottom: 2px solid rgba(65, 105, 225, 0.3);
  border-right: 2px solid rgba(65, 105, 225, 0.3);
  border-radius: 0 0 12px 0;
}

/* Profile Section - Royal */
.profile {
  text-align: center;
  margin-bottom: 28px;
  position: relative;
}

/* Multi-layered glow */
.profile-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 150px;
  height: 150px;
  background: radial-gradient(circle, rgba(212, 175, 55, 0.25) 0%, rgba(65, 105, 225, 0.1) 50%, transparent 70%);
  border-radius: 50%;
  filter: blur(10px);
  animation: royalGlow 4s ease-in-out infinite alternate;
}

@keyframes royalGlow {
  0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
  100% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.1); }
}

.profile img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid transparent;
  background: linear-gradient(45deg, #d4af37, #4169e1, #d4af37) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out;
  mask-composite: exclude;
  box-shadow: 
    0 0 0 4px rgba(5, 7, 12, 0.9),
    0 0 0 8px rgba(212, 175, 55, 0.15),
    0 30px 50px -15px #000;
  transition: all 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
}

.profile img:hover {
  transform: scale(1.03) rotate(2deg);
  border-width: 5px;
  box-shadow: 
    0 0 0 4px rgba(5, 7, 12, 0.9),
    0 0 0 12px rgba(65, 105, 225, 0.2),
    0 35px 60px -15px #000;
}

/* Name - Royal Typography */
.name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px;
  font-weight: 600;
  background: linear-gradient(135deg, #d4af37 0%, #f5e6b3 50%, #d4af37 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  letter-spacing: 1px;
  margin-bottom: 8px;
  text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
  line-height: 1.2;
  position: relative;
  display: inline-block;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
}

.name::before,
.name::after {
  content: '✦';
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: #4169e1;
  font-size: 24px;
  opacity: 0.5;
  animation: sparkle 2s ease-in-out infinite;
}

.name::before {
  left: -35px;
}

.name::after {
  right: -35px;
}

@keyframes sparkle {
  0%, 100% { opacity: 0.3; transform: translateY(-50%) scale(1); }
  50% { opacity: 0.8; transform: translateY(-50%) scale(1.2); }
}

/* Title with royal touch */
.title {
  font-size: 13px;
  color: transparent;
  text-align: center;
  font-weight: 300;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 40px;
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(90deg, #8e9cd3, #d4af37, #8e9cd3);
  -webkit-background-clip: text;
  background-clip: text;
  position: relative;
  display: inline-block;
  padding: 0 25px;
  left: 50%;
  transform: translateX(-50%);
}

.title::before,
.title::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #d4af37, transparent);
}

.title::before {
  left: -15px;
}

.title::after {
  right: -15px;
}

/* Buttons - Royal Design with Border Glow */
.buttons {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.btn {
  display: flex;
  align-items: center;
  padding: 18px 24px;
  text-decoration: none;
  background: rgba(10, 15, 25, 0.6);
  border: 1.5px solid transparent;
  
  /* Premium gradient border with glow - FIXED */
  background-image: linear-gradient(rgba(10, 15, 25, 0.6), rgba(10, 15, 25, 0.6)), 
                    linear-gradient(90deg, #d4af37, #4169e1, #d4af37);
  background-origin: border-box;
  background-clip: padding-box, border-box;
  
  border-radius: 100px;
  transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
  color: #ffffff;
  font-size: 14px;
  font-weight: 300;
  backdrop-filter: blur(5px);
  position: relative;
  overflow: hidden;
  
  /* Border glow effect */
  box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
}

/* Inner shine effect */
.btn::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -60%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
}

.btn:hover::after {
  opacity: 0.3;
}

.btn:hover {
  transform: translateY(-3px) scale(1.01);
  
  /* Enhanced border glow on hover */
  border: 1.5px solid transparent;
  background-image: linear-gradient(rgba(20, 25, 35, 0.8), rgba(20, 25, 35, 0.8)), 
                    linear-gradient(90deg, #d4af37, #4169e1, #d4af37);
  background-origin: border-box;
  background-clip: padding-box, border-box;
  
  /* Stronger glow on hover */
  box-shadow: 
    0 18px 30px -12px #000,
    0 0 0 1px rgba(212, 175, 55, 0.4),
    0 0 25px rgba(212, 175, 55, 0.6),
    0 0 35px rgba(65, 105, 225, 0.4);
  
  background: rgba(20, 24, 32, 0.7);
}

.btn-icon {
  width: 32px;
  text-align: center;
  margin-right: 20px;
  position: relative;
}

.btn-icon img {
  width: 22px;
  height: 22px;
  filter: brightness(0) invert(1);
  transition: all 0.4s;
  opacity: 0.9;
}

.btn:hover .btn-icon img {
  filter: brightness(0) invert(1) drop-shadow(0 0 5px #d4af37);
  transform: scale(1.1) rotate(5deg);
}

.btn-text {
  flex: 1;
  color: #e5e5e5;
  font-weight: 300;
  letter-spacing: 0.5px;
  font-family: 'Montserrat', sans-serif;
  font-size: 15px;
  text-transform: uppercase;
}

.btn-arrow {
  opacity: 0.3;
  font-size: 20px;
  color: #d4af37;
  transition: all 0.3s;
  margin-left: 12px;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
}

.btn:hover .btn-arrow {
  opacity: 1;
  color: #4169e1;
  transform: translateX(8px) rotate(360deg);
}

/* Footer - Royal Minimal */
.footer {
  margin-top: 42px;
  text-align: center;
  font-size: 11px;
  color: #6e7485;
  line-height: 2;
  padding-top: 25px;
  position: relative;
  font-family: 'Montserrat', sans-serif;
  letter-spacing: 1px;
}

.footer::before {
  content: '';
  position: absolute;
  top: 0;
  left: 20%;
  width: 60%;
  height: 1px;
  background: linear-gradient(90deg, 
    transparent, 
    #d4af37, 
    #4169e1, 
    #d4af37, 
    transparent
  );
}

.footer span {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  background: linear-gradient(135deg, #d4af37, #4169e1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 600;
  letter-spacing: 2px;
}

/* Premium badge */
.premium-badge {
  text-align: center;
  margin: 15px 0 -10px;
  font-size: 10px;
  color: rgba(212, 175, 55, 0.4);
  letter-spacing: 5px;
  text-transform: uppercase;
  font-weight: 200;
  font-family: 'Montserrat', sans-serif;
  position: relative;
}

/* Responsive */
@media (max-width: 380px) {
  .container { padding: 40px 24px 35px; }
  .name { font-size: 36px; }
  .name::before,
  .name::after { display: none; }
  .btn { padding: 16px 20px; }
  .btn-text { font-size: 13px; }
}

/* Loading animation */
.loading-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  background: linear-gradient(90deg, #d4af37, #4169e1, #d4af37);
  animation: loading 2s ease-out;
  z-index: 9999;
}

@keyframes loading {
  0% { width: 0; opacity: 1; }
  100% { width: 100%; opacity: 0; }
}
</style>
</head>
<body>

<!-- Loading animation -->
<div class="loading-bar"></div>

<!-- Floating particles -->
<script>
  for(let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 15 + 's';
    particle.style.animationDuration = (10 + Math.random() * 20) + 's';
    document.body.appendChild(particle);
  }
</script>

<div class="wrapper">
  <div class="container">

    <!-- Corner Decorations -->
    <div class="corner-tl"></div>

    <div class="profile">

    <div class="buttons">

    </div>

    <!-- Premium Badge -->

    <!-- Footer -->

  </div>
</div>

</body>
</html>
