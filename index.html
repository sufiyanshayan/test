<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name · Signature White</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" type="image/png" href="Your_Favicon_Link">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #ffffff;
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
  position: relative;
}

/* Subtle texture for premium feel */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(#f5f5f5 1px, transparent 1px),
    radial-gradient(#f5f5f5 1px, transparent 1px);
  background-size: 40px 40px;
  background-position: 0 0, 20px 20px;
  opacity: 0.4;
  pointer-events: none;
}

.wrapper {
  max-width: 440px;
  width: 100%;
  position: relative;
  z-index: 2;
}

/* Main Card - Pure White Premium */
.container {
  background: #ffffff;
  border-radius: 48px;
  padding: 36px 24px;
  box-shadow: 
    0 30px 60px -20px rgba(0, 0, 0, 0.03),
    0 0 0 1px rgba(0, 0, 0, 0.02),
    inset 0 0 0 1px rgba(255, 255, 255, 1);
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
}

/* Premium corner accents */
.container::before,
.container::after {
  content: '';
  position: absolute;
  width: 40px;
  height: 40px;
  pointer-events: none;
  opacity: 0.3;
}

.container::before {
  top: 20px;
  left: 20px;
  border-top: 1px solid #d4d4d4;
  border-left: 1px solid #d4d4d4;
}

.container::after {
  bottom: 20px;
  right: 20px;
  border-bottom: 1px solid #d4d4d4;
  border-right: 1px solid #d4d4d4;
}

/* Profile Section */
.profile {
  position: relative;
  margin-bottom: 16px;
}

.profile img {
  width: 105px;
  height: 105px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #ffffff;
  box-shadow: 
    0 15px 30px -8px rgba(0, 0, 0, 0.05),
    0 0 0 5px #f8f8f8;
  transition: transform 0.4s ease;
}

.profile img:hover {
  transform: scale(1.02);
}

/* Name - Classic Modern Fusion */
.name {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 500;
  color: #1a1a1a;
  letter-spacing: -0.5px;
  line-height: 1.2;
  margin-bottom: 4px;
}

/* Title */
.title {
  font-size: 14px;
  color: #8a8a8a;
  font-weight: 300;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 16px;
  font-family: 'Outfit', sans-serif;
}

/* Buttons Grid Layout - সব বাটন থাকবে */
.buttons-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 4px 0;
}

/* Premium Button Design */
.btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-radius: 60px;
  text-decoration: none;
  background: #ffffff;
  color: #1a1a1a;
  font-size: 15px;
  font-weight: 400;
  border: 1px solid #eeeeee;
  transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
  position: relative;
  overflow: hidden;
}

.btn-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.btn-right {
  font-size: 18px;
  opacity: 0.3;
  transition: opacity 0.3s;
}

.btn img {
  width: 20px;
  height: 20px;
  opacity: 0.7;
  transition: all 0.3s;
}

/* Button Hover Effect */
.btn:hover {
  background: #fcfcfc;
  border-color: #cccccc;
  transform: translateY(-2px);
  box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.1);
}

.btn:hover .btn-right {
  opacity: 0.8;
}

.btn:hover img {
  opacity: 1;
  transform: scale(1.05);
}

/* Premium Divider */
.divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 16px 0 8px;
  color: #b0b0b0;
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, #e0e0e0, #e0e0e0, #e0e0e0, transparent);
}

/* Footer - Minimal Premium */
.footer {
  margin-top: 32px;
  padding: 16px 8px 4px;
  font-size: 12px;
  color: #a0a0a0;
  text-align: center;
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  letter-spacing: 0.5px;
  position: relative;
  line-height: 1.8;
}

.footer::before {
  content: '';
  position: absolute;
  top: -2px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 1px;
  background: #d4d4d4;
}

.footer span {
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  color: #7a7a7a;
}

/* Responsive */
@media (max-width: 380px) {
  .container { padding: 28px 18px; }
  .name { font-size: 24px; }
  .btn { padding: 14px 20px; }
}
</style>
</head>
<body>

    </div> <!-- buttons-grid end -->

  </div> <!-- container end -->

  <!-- Footer -->
  <div class="footer">

</body>
</html>
