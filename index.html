<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 👉 EDIT HERE: Website Title -->
    <title>CHROMATIC FUTURE | premium economy 3000</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* (CSS SAME AS YOUR ORIGINAL — NO CHANGE) */
        * {margin:0;padding:0;box-sizing:border-box;}
        body {
            font-family:'Space Grotesk',sans-serif;
            background: linear-gradient(145deg, #0a0a0f, #1a1a2e);
            color:#fff;
        }
        .app{max-width:480px;margin:0 auto;background:#0f0f17;min-height:100vh;}
        header{display:flex;justify-content:space-between;padding:1.5rem;background:#14141e;}
        .logo{font-weight:700;}
        .hologram-btn{cursor:pointer;}
        .sidebar{position:fixed;right:-360px;top:0;width:340px;height:100%;background:#1a1a26;transition:0.5s;}
        .sidebar.active{right:0;}
        .overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.7);opacity:0;pointer-events:none;}
        .overlay.active{opacity:1;pointer-events:all;}
        .main{text-align:center;padding:2rem;}
        .card{background:#1e1e2c;padding:2rem;border-radius:30px;}
    </style>
</head>

<body>

<div class="app">

<header>
    <div class="logo">
        <i class="fa-regular fa-crystal"></i> 
        <!-- 👉 EDIT HERE: Logo Name -->
        CHROMATIC 3K
    </div>

    <div class="hologram-btn" onclick="openMenu()">☰</div>
</header>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">

    <!-- 👉 EDIT HERE: Profile Name -->
    <h3>NOVA-7</h3>

    <!-- 👉 EDIT HERE: Profile Subtitle -->
    <p>premium economy · 3024</p>

    <!-- 👉 EDIT HERE: Menu Text + Link -->
    <a onclick="go('home')">HOLO HOME</a>
    <a onclick="go('test')">NEO LAB</a>
    <a onclick="go('about')">QUANTUM</a>
    <a onclick="go('orbit')">ORBIT</a>
    <a onclick="go('settings')">MATRIX</a>

</div>

<div class="main">
    <div class="card">

        <!-- 👉 EDIT HERE: Main Heading -->
        <h2>NEON<br>ECONOMY</h2>

        <!-- 👉 EDIT HERE: Description -->
        <p>premium soul · future mind. colorful dimension awaits.</p>

        <!-- 👉 EDIT HERE: Chip Text -->
        <div>ECONOMY 3000</div>

        <!-- 👉 EDIT HERE: Swipe Text -->
        <div>SWIPE TO ENTER</div>

        <!-- 👉 EDIT HERE: Status Text -->
        <div>✦ HOLOGRAM ACTIVE ✦</div>

    </div>
</div>

</div>

<script>

function openMenu(){
    document.getElementById('sidebar').classList.add('active');
    document.getElementById('overlay').classList.add('active');
}

function closeMenu(){
    document.getElementById('sidebar').classList.remove('active');
    document.getElementById('overlay').classList.remove('active');
}

// 👉 EDIT HERE: Navigation Fix
function go(page){
    window.location.href = page + ".html";
}

</script>

</body>
</html>
