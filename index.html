<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name · Executive Edition</title>

<!-- Fonts - Modern + Classic Fusion -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" type="image/png" href="Your_Favicon_Link">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #080b0f;
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
}

/* Premium light effects */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  right: -10%;
  width: 70%;
  height: 70%;
  background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: subtleFloat 15s infinite alternate ease-in-out;
}

body::after {
  content: '';
  position: fixed;
  bottom: -20%;
  left: -10%;
  width: 70%;
  height: 70%;
  background: radial-gradient(circle, rgba(65, 105, 225, 0.06) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: subtleFloat 18s infinite alternate-reverse ease-in-out;
}

@keyframes subtleFloat {
  0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
  100% { transform: translate(2%, 2%) scale(1.05); opacity: 0.8; }
}

.wrapper {
  max-width: 440px;
  width: 100%;
  position: relative;
  z-index: 2;
}

/* Main Card */
.container {
  background: #0e1117;
  border-radius: 40px;
  padding: 42px 26px 36px;
  box-shadow: 
    0 35px 70px -20px rgba(0, 0, 0, 0.9),
    0 0 0 1px rgba(212, 175, 55, 0.15),
    inset 0 1px 1px rgba(255, 255, 255, 0.02),
    inset 0 0 30px rgba(212, 175, 55, 0.03);
  position: relative;
  border: 1px solid rgba(212, 175, 55, 0.1);
  backdrop-filter: blur(1px);
}

/* Premium top bar */
.container::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 140px;
  height: 4px;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(212, 175, 55, 0.3), 
    #d4af37, 
    #4169e1, 
    #d4af37, 
    rgba(212, 175, 55, 0.3), 
    transparent
  );
  border-radius: 0 0 4px 4px;
  filter: blur(0.5px);
}

/* Corner accents */
.container::after {
  content: '';
  position: absolute;
  top: 24px;
  right: 24px;
  width: 40px;
  height: 40px;
  border-top: 1.5px solid rgba(212, 175, 55, 0.25);
  border-right: 1.5px solid rgba(212, 175, 55, 0.25);
  opacity: 0.8;
}

.corner-decoration {
  position: absolute;
  bottom: 24px;
  left: 24px;
  width: 40px;
  height: 40px;
  border-bottom: 1.5px solid rgba(65, 105, 225, 0.25);
  border-left: 1.5px solid rgba(65, 105, 225, 0.25);
  opacity: 0.8;
  pointer-events: none;
}

/* Profile Section */
.profile {
  text-align: center;
  margin-bottom: 22px;
  position: relative;
}

.profile img {
  width: 105px;
  height: 105px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #d4af37;
  box-shadow: 
    0 0 0 3px #0e1117,
    0 0 0 6px rgba(65, 105, 225, 0.25),
    0 20px 40px -10px #000;
  transition: all 0.5s ease;
}

.profile img:hover {
  transform: scale(1.02);
  border-color: #4169e1;
  box-shadow: 
    0 0 0 3px #0e1117,
    0 0 0 8px rgba(212, 175, 55, 0.25),
    0 25px 45px -8px #000;
}

/* Name */
.name {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 600;
  color: #d4af37;
  text-align: center;
  letter-spacing: -0.3px;
  margin-top: 15px;
  margin-bottom: 6px;
  text-shadow: 
    0 2px 15px rgba(212, 175, 55, 0.2),
    0 0 30px rgba(65, 105, 225, 0.1);
  line-height: 1.2;
}

/* Title - PREMIUMECONOMY and EXECUTIVE */
.title-container {
  text-align: center;
  margin-bottom: 30px;
  position: relative;
}

.premium-title {
  font-size: 16px;
  color: #d4af37;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: 'Plus Jakarta Sans', sans-serif;
  margin-bottom: 4px;
}

.executive-title {
  font-size: 14px;
  color: #8e9cd3;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-family: 'Plus Jakarta Sans', sans-serif;
  position: relative;
  display: inline-block;
  padding: 0 20px;
}

.executive-title::before,
.executive-title::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #d4af37, transparent);
}

.executive-title::before {
  left: -15px;
}

.executive-title::after {
  right: -15px;
}

/* ===== BUTTONS SECTION - BORDER COLOR CHANGING (NO ROTATION) ===== */
.buttons {
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: relative;
  z-index: 5;
}

.btn {
  display: flex;
  align-items: center;
  padding: 16px 22px;
  text-decoration: none;
  background: rgba(14, 17, 23, 0.8);
  border-radius: 60px;
  transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
  color: #ffffff;
  font-size: 14px;
  font-weight: 400;
  backdrop-filter: blur(8px);
  position: relative;
  z-index: 2;
  
  /* Border with gradient that changes colors */
  border: 2.5px solid transparent;
  background-image: linear-gradient(rgba(14, 17, 23, 0.8), rgba(14, 17, 23, 0.8)), 
                    linear-gradient(90deg, #d4af37, #4169e1, #d4af37, #4169e1, #d4af37);
  background-origin: border-box;
  background-clip: padding-box, border-box;
  
  /* Animation for color change */
  animation: borderColorChange 4s linear infinite;
}

/* Color change animation - border colors cycle, no rotation */
@keyframes borderColorChange {
  0% {
    background-image: linear-gradient(rgba(14, 17, 23, 0.8), rgba(14, 17, 23, 0.8)), 
                      linear-gradient(90deg, #d4af37, #4169e1, #d4af37, #4169e1, #d4af37);
  }
  25% {
    background-image: linear-gradient(rgba(14, 17, 23, 0.8), rgba(14, 17, 23, 0.8)), 
                      linear-gradient(90deg, #4169e1, #d4af37, #4169e1, #d4af37, #4169e1);
  }
  50% {
    background-image: linear-gradient(rgba(14, 17, 23, 0.8), rgba(14, 17, 23, 0.8)), 
                      linear-gradient(90deg, #d4af37, #4169e1, #d4af37, #4169e1, #d4af37);
  }
  75% {
    background-image: linear-gradient(rgba(14, 17, 23, 0.8), rgba(14, 17, 23, 0.8)), 
                      linear-gradient(90deg, #4169e1, #d4af37, #4169e1, #d4af37, #4169e1);
  }
  100% {
    background-image: linear-gradient(rgba(14, 17, 23, 0.8), rgba(14, 17, 23, 0.8)), 
                      linear-gradient(90deg, #d4af37, #4169e1, #d4af37, #4169e1, #d4af37);
  }
}

.btn:hover {
  transform: translateY(-3px) scale(1.01);
  background: rgba(20, 24, 32, 0.9);
  box-shadow: 0 18px 30px -12px #000;
  animation: borderColorChange 2s linear infinite; /* Faster on hover */
}

.btn-icon {
  width: 28px;
  text-align: center;
  margin-right: 16px;
  position: relative;
  z-index: 3;
}

.btn-icon img {
  width: 20px;
  height: 20px;
  filter: brightness(0) invert(1);
  transition: all 0.4s;
  opacity: 0.9;
}

.btn:hover .btn-icon img {
  filter: brightness(0) invert(0.9) sepia(0.5) hue-rotate(350deg);
  transform: scale(1.1);
}

.btn-text {
  flex: 1;
  color: #f5f5f5;
  font-weight: 350;
  letter-spacing: 0.3px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px;
  position: relative;
  z-index: 3;
}

.btn-arrow {
  opacity: 0.4;
  font-size: 18px;
  color: #d4af37;
  transition: all 0.3s;
  margin-left: 8px;
  font-family: 'Playfair Display', serif;
  position: relative;
  z-index: 3;
}

.btn:hover .btn-arrow {
  opacity: 1;
  color: #4169e1;
  transform: translateX(3px);
}

/* Footer */
.footer {
  margin-top: 36px;
  text-align: center;
  font-size: 11px;
  color: #6e7485;
  line-height: 2;
  padding-top: 22px;
  position: relative;
  font-family: 'Plus Jakarta Sans', sans-serif;
  letter-spacing: 0.8px;
  z-index: 5;
}

.footer::before {
  content: '';
  position: absolute;
  top: 0;
  left: 30%;
  width: 40%;
  height: 1px;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(212, 175, 55, 0.3), 
    rgba(65, 105, 225, 0.3), 
    rgba(212, 175, 55, 0.3), 
    transparent
  );
}

.footer span {
  font-family: 'Playfair Display', serif;
  font-size: 12px;
  color: #d4af37;
  font-weight: 500;
  letter-spacing: 1px;
}

/* Premium badge */
.premium-badge {
  text-align: center;
  margin: 15px 0 -10px;
  font-size: 10px;
  color: rgba(212, 175, 55, 0.4);
  letter-spacing: 5px;
  text-transform: uppercase;
  font-weight: 200;
  font-family: 'Plus Jakarta Sans', sans-serif;
  position: relative;
  z-index: 5;
}

.premium-badge::before,
.premium-badge::after {
  content: '✦';
  margin: 0 10px;
  color: rgba(65, 105, 225, 0.4);
}

/* Loading animation */
.loading-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  background: linear-gradient(90deg, #d4af37, #4169e1, #d4af37);
  animation: loading 2s ease-out;
  z-index: 9999;
}

@keyframes loading {
  0% { width: 0; opacity: 1; }
  100% { width: 100%; opacity: 0; }
}

/* Responsive */
@media (max-width: 380px) {
  .container { padding: 35px 20px 30px; }
  .name { font-size: 32px; }
  .btn { padding: 14px 18px; }
  .btn-text { font-size: 14px; }
  .premium-badge::before,
  .premium-badge::after { display: none; }
}
</style>
</head>
<body>

<!-- Loading animation -->
<div class="loading-bar"></div>

<div class="wrapper">
  <div class="container">

    <!-- Corner Decoration -->
    <div class="corner-decoration"></div>

    <!-- Profile -->
    <div class="profile">
      <img src="Your_Profile_Picture_Link" alt="Profile">
    </div>

    <!-- Name -->
    <div class="name">Your_Name</div>
    
    <!-- Title - PREMIUMECONOMY and EXECUTIVE separate lines -->
    <div class="title-container">
      <div class="premium-title">PREMIUMECONOMY</div>
      <div class="executive-title">EXECUTIVE</div>
    </div>

    <!-- Buttons with COLOR CHANGING BORDER (NO ROTATION) -->
    <div class="buttons">

      <!-- Facebook -->
      <a class="btn" href="https://www.facebook.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/facebook/ffffff"></span>
        <span class="btn-text">Facebook</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- Facebook Page -->
      <a class="btn" href="https://www.facebook.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/facebook/ffffff"></span>
        <span class="btn-text">Facebook Page</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- Instagram -->
      <a class="btn" href="https://www.instagram.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/instagram/ffffff"></span>
        <span class="btn-text">Instagram</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- WhatsApp -->
      <a class="btn" href="https://wa.me/8801234567890" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/whatsapp/ffffff"></span>
        <span class="btn-text">WhatsApp</span>
        <span class="btn-arrow">→</span>
      </a>

    </div>

    <!-- Premium Badge -->
    <div class="premium-badge">EXECUTIVE COLLECTION</div>

    <!-- Footer -->
    <div class="footer">
      Copyright © 2026 MADE BY <br> <span>"Your_Name"</span>. <br> All Rights Reserved
    </div>

  </div>
</div>

</body>
</html>
