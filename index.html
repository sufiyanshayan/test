    <!-- Fonts -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0F0F0F;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Ultra Premium Animated Background */
        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 215, 0, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 60% 20%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.02) 0px, rgba(212, 175, 55, 0.02) 2px, transparent 2px, transparent 8px);
            animation: backgroundPulse 15s ease-in-out infinite;
        }

        @keyframes backgroundPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        /* Floating Gold Particles */
        .particle-field {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .gold-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #D4AF37;
            border-radius: 50%;
            box-shadow: 0 0 20px #D4AF37;
            animation: particleFloat 15s infinite linear;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* Generate 30 particles */
        .gold-particle:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; }
        .gold-particle:nth-child(2) { left: 20%; animation-duration: 18s; animation-delay: 2s; }
        .gold-particle:nth-child(3) { left: 30%; animation-duration: 15s; animation-delay: 4s; }
        .gold-particle:nth-child(4) { left: 40%; animation-duration: 20s; animation-delay: 1s; }
        .gold-particle:nth-child(5) { left: 50%; animation-duration: 14s; animation-delay: 3s; }
        .gold-particle:nth-child(6) { left: 60%; animation-duration: 22s; animation-delay: 5s; }
        .gold-particle:nth-child(7) { left: 70%; animation-duration: 16s; animation-delay: 2.5s; }
        .gold-particle:nth-child(8) { left: 80%; animation-duration: 19s; animation-delay: 3.5s; }
        .gold-particle:nth-child(9) { left: 90%; animation-duration: 13s; animation-delay: 1.5s; }
        .gold-particle:nth-child(10) { left: 95%; animation-duration: 21s; animation-delay: 4.5s; }
        .gold-particle:nth-child(11) { left: 15%; animation-duration: 17s; animation-delay: 0.5s; }
        .gold-particle:nth-child(12) { left: 25%; animation-duration: 23s; animation-delay: 2.2s; }
        .gold-particle:nth-child(13) { left: 35%; animation-duration: 14s; animation-delay: 3.8s; }
        .gold-particle:nth-child(14) { left: 45%; animation-duration: 19s; animation-delay: 1.2s; }
        .gold-particle:nth-child(15) { left: 55%; animation-duration: 16s; animation-delay: 4.2s; }
        .gold-particle:nth-child(16) { left: 65%; animation-duration: 22s; animation-delay: 0.8s; }
        .gold-particle:nth-child(17) { left: 75%; animation-duration: 18s; animation-delay: 2.8s; }
        .gold-particle:nth-child(18) { left: 85%; animation-duration: 15s; animation-delay: 3.2s; }
        .gold-particle:nth-child(19) { left: 92%; animation-duration: 20s; animation-delay: 1.8s; }
        .gold-particle:nth-child(20) { left: 98%; animation-duration: 13s; animation-delay: 4.8s; }
        .gold-particle:nth-child(21) { left: 5%; animation-duration: 24s; animation-delay: 0.3s; }
        .gold-particle:nth-child(22) { left: 12%; animation-duration: 17s; animation-delay: 3.3s; }
        .gold-particle:nth-child(23) { left: 22%; animation-duration: 21s; animation-delay: 1.7s; }
        .gold-particle:nth-child(24) { left: 32%; animation-duration: 15s; animation-delay: 4.7s; }
        .gold-particle:nth-child(25) { left: 42%; animation-duration: 19s; animation-delay: 2.1s; }
        .gold-particle:nth-child(26) { left: 52%; animation-duration: 23s; animation-delay: 0.9s; }
        .gold-particle:nth-child(27) { left: 62%; animation-duration: 16s; animation-delay: 3.9s; }
        .gold-particle:nth-child(28) { left: 72%; animation-duration: 20s; animation-delay: 1.4s; }
        .gold-particle:nth-child(29) { left: 82%; animation-duration: 14s; animation-delay: 4.4s; }
        .gold-particle:nth-child(30) { left: 88%; animation-duration: 18s; animation-delay: 2.6s; }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            margin: 20px auto;
        }

        /* Masterpiece Card */
        .masterpiece-card {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 64px;
            padding: 45px 28px;
            box-shadow: 
                0 40px 80px rgba(0,0,0,0.7),
                0 0 0 2px rgba(212, 175, 55, 0.2) inset,
                0 0 60px rgba(212, 175, 55, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* Luxury Corner Ornaments */
        .masterpiece-card::before,
        .masterpiece-card::after {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(30px);
        }

        .masterpiece-card::before {
            top: -75px;
            left: -75px;
        }

        .masterpiece-card::after {
            bottom: -75px;
            right: -75px;
        }

        /* Royal Profile Section */
        .royal-profile {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        /* Ornate Profile Container */
        .royal-frame {
            width: 160px;
            height: 160px;
            margin: 0 auto 25px;
            position: relative;
            cursor: pointer;
        }

        /* Multiple Layered Frames */
        .frame-layer-1 {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 2px solid #D4AF37;
            border-radius: 50%;
            border-top-color: transparent;
            border-bottom-color: transparent;
            animation: rotateSlow 12s linear infinite;
        }

        .frame-layer-2 {
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 50%;
            border-left-color: transparent;
            border-right-color: transparent;
            animation: rotateMedium 15s linear infinite reverse;
        }

        .frame-layer-3 {
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            border: 1px dashed rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            animation: rotateFast 8s linear infinite;
        }

        @keyframes rotateSlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes rotateMedium {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        @keyframes rotateFast {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(180deg); }
        }

        .royal-frame img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #1a1a1a;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            position: relative;
            z-index: 5;
            transition: all 0.5s ease;
        }

        .royal-frame:hover img {
            transform: scale(1.05);
            box-shadow: 0 20px 50px rgba(212, 175, 55, 0.4);
        }

        /* Royal Crown Badge */
        .crown-badge {
            position: absolute;
            top: -10px;
            right: 50%;
            transform: translateX(70px);
            background: linear-gradient(135deg, #D4AF37, #8B6914);
            color: #000;
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            font-weight: 700;
            padding: 10px 30px;
            border-radius: 50px;
            letter-spacing: 3px;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.5);
            border: 1px solid rgba(255,255,255,0.3);
            white-space: nowrap;
            z-index: 20;
            animation: crownFloat 3s ease-in-out infinite;
        }

        .crown-badge i {
            margin-right: 8px;
            font-size: 14px;
        }

        @keyframes crownFloat {
            0%, 100% { transform: translateX(70px) translateY(0); }
            50% { transform: translateX(70px) translateY(-5px); }
        }

        /* Royal Name */
        .royal-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            font-weight: 700;
            color: #D4AF37;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 
                3px 3px 6px rgba(0,0,0,0.5),
                0 0 20px rgba(212, 175, 55, 0.3);
            position: relative;
            display: inline-block;
        }

        .royal-name::before,
        .royal-name::after {
            content: '👑';
            font-size: 24px;
            margin: 0 15px;
            opacity: 0.5;
            animation: crownWink 3s infinite;
        }

        @keyframes crownWink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .royal-title {
            font-size: 13px;
            color: #aaa;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-weight: 300;
            word-spacing: 8px;
        }

        /* Opulent Economy Stats */
        .opulent-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 40px;
            padding: 25px 15px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(139, 105, 20, 0.05));
            border-radius: 120px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            position: relative;
            overflow: hidden;
        }

        .opulent-stats::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.2), transparent);
            animation: goldWave 4s infinite;
        }

        @keyframes goldWave {
            0% { left: -100%; }
            30% { left: 100%; }
            100% { left: 100%; }
        }

        .stat-block {
            text-align: center;
            position: relative;
        }

        .stat-icon {
            color: #D4AF37;
            font-size: 20px;
            margin-bottom: 8px;
        }

        .stat-number {
            display: block;
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 700;
            color: #D4AF37;
            margin-bottom: 5px;
            line-height: 1;
        }

        .stat-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 300;
        }

        /* Luxurious Button Grid */
        .luxury-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 35px;
        }

        /* The Ultimate Premium Button */
        .luxury-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 28px;
            background: rgba(25, 25, 25, 0.7);
            border: 1.5px solid rgba(212, 175, 55, 0.2);
            border-radius: 60px;
            color: #fff;
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        /* Button Shine Overlay */
        .luxury-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(212, 175, 55, 0.2), 
                rgba(255, 255, 255, 0.1), 
                rgba(212, 175, 55, 0.2), 
                transparent);
            transition: left 0.8s ease;
        }

        .luxury-btn:hover::before {
            left: 100%;
        }

        /* Button Glow Effect */
        .luxury-btn::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 10%;
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #D4AF37, transparent);
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }

        .luxury-btn:hover::after {
            transform: scaleX(1);
        }

        .btn-icon-wrapper {
            display: flex;
            align-items: center;
            gap: 18px;
            position: relative;
            z-index: 2;
        }

        .btn-icon-wrapper i {
            font-size: 24px;
            color: #D4AF37;
            transition: all 0.4s ease;
            width: 28px;
            text-align: center;
        }

        .btn-icon-wrapper img {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
            transition: all 0.4s ease;
        }

        .btn-text {
            font-size: 15px;
            font-weight: 500;
            color: #f0f0f0;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-decoration {
            color: #D4AF37;
            font-size: 14px;
            opacity: 0;
            transform: translateX(-15px);
            transition: all 0.4s ease;
            position: relative;
            z-index: 2;
            font-family: 'Cormorant Garamond', serif;
        }

        .luxury-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.6);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.5),
                0 0 30px rgba(212, 175, 55, 0.3);
            padding-left: 35px;
        }

        .luxury-btn:hover .btn-icon-wrapper i {
            transform: scale(1.2) rotate(5deg);
            color: #FFD700;
        }

        .luxury-btn:hover .btn-icon-wrapper img {
            transform: scale(1.2) rotate(5deg);
            filter: brightness(1) invert(0.8) sepia(1) hue-rotate(5deg);
        }

        .luxury-btn:hover .btn-text {
            color: #D4AF37;
            letter-spacing: 1px;
        }

        .luxury-btn:hover .btn-decoration {
            opacity: 1;
            transform: translateX(0);
        }

        /* Royal Button Variant - Every 3rd button */
        .royal-btn {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(139, 105, 20, 0.1));
            border-color: rgba(212, 175, 55, 0.4);
            position: relative;
        }

        .royal-btn .btn-icon-wrapper i {
            color: #FFD700;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        .royal-btn .btn-text {
            font-weight: 600;
        }

        .royal-btn .btn-decoration {
            font-size: 16px;
        }

        .royal-btn .btn-decoration i {
            margin-left: 5px;
            font-size: 12px;
        }

        /* Emperor Footer */
        .emperor-footer {
            margin-top: 35px;
            text-align: center;
            padding: 25px 0 5px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            position: relative;
        }

        .footer-ornament {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #0F0F0F;
            padding: 0 20px;
            color: #D4AF37;
            font-size: 24px;
            letter-spacing: 10px;
        }

        .footer-ornament i {
            margin: 0 10px;
            font-size: 16px;
            opacity: 0.7;
        }

        .footer-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            color: #777;
            letter-spacing: 2px;
            line-height: 1.8;
        }

        .footer-text strong {
            color: #D4AF37;
            font-weight: 700;
            margin: 0 5px;
        }

        .footer-gold {
            color: #D4AF37;
            font-size: 10px;
            letter-spacing: 4px;
            margin-top: 10px;
            opacity: 0.6;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .masterpiece-card {
                padding: 35px 20px;
                border-radius: 48px;
            }
            
            .royal-name {
                font-size: 36px;
            }
            
            .royal-name::before,
            .royal-name::after {
                margin: 0 8px;
                font-size: 20px;
            }
            
            .crown-badge {
                font-size: 14px;
                padding: 8px 20px;
                transform: translateX(60px);
            }
            
            .crown-badge i {
                font-size: 12px;
            }
            
            .btn-icon-wrapper {
                gap: 14px;
            }
            
            .btn-icon-wrapper i {
                font-size: 20px;
            }
            
            .btn-text {
                font-size: 14px;
            }
            
            .luxury-btn {
                padding: 16px 22px;
            }
        }

        /* Smooth Scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Selection Style */
        ::selection {
            background: #D4AF37;
            color: #000;
        }
    </style>
</head>
