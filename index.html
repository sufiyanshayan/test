<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name · Royal Edition</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" type="image/png" href="Your_Favicon_Link">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0c0f;
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
}

/* Golden light effect */
body::before {
  content: '';
  position: fixed;
  top: -30%;
  right: -20%;
  width: 80%;
  height: 80%;
  background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}

/* Blue light effect */
body::after {
  content: '';
  position: fixed;
  bottom: -30%;
  left: -20%;
  width: 80%;
  height: 80%;
  background: radial-gradient(circle, rgba(65, 105, 225, 0.12) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}

.wrapper {
  max-width: 420px;
  width: 100%;
  position: relative;
  z-index: 2;
}

/* Main Card */
.container {
  background: #111316;
  border-radius: 36px;
  padding: 40px 24px 32px;
  box-shadow: 
    0 25px 50px -12px rgba(0, 0, 0, 0.8),
    0 0 0 1px rgba(212, 175, 55, 0.2),
    inset 0 0 20px rgba(212, 175, 55, 0.05);
  position: relative;
  border: 1px solid rgba(212, 175, 55, 0.15);
  backdrop-filter: blur(2px);
}

/* Golden top border */
.container::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100px;
  height: 3px;
  background: linear-gradient(90deg, transparent, #d4af37, #4169e1, #d4af37, transparent);
  border-radius: 3px 3px 0 0;
}

/* Corner decorations */
.container::after {
  content: '';
  position: absolute;
  top: 20px;
  right: 20px;
  width: 30px;
  height: 30px;
  border-top: 2px solid #d4af37;
  border-right: 2px solid #d4af37;
  opacity: 0.3;
}

/* Bottom left corner */
.corner-decoration {
  position: absolute;
  bottom: 20px;
  left: 20px;
  width: 30px;
  height: 30px;
  border-bottom: 2px solid #4169e1;
  border-left: 2px solid #4169e1;
  opacity: 0.3;
  pointer-events: none;
}

/* Profile */
.profile {
  text-align: center;
  margin-bottom: 20px;
  position: relative;
}

/* Golden glow around profile */
.profile::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, transparent 70%);
  border-radius: 50%;
  z-index: -1;
}

.profile img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #d4af37;
  box-shadow: 
    0 0 0 3px #111316,
    0 0 0 6px rgba(65, 105, 225, 0.3),
    0 15px 30px -10px #000;
}

/* Name */
.name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px;
  font-weight: 600;
  color: #d4af37;
  text-align: center;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
}

/* Title */
.title {
  font-size: 13px;
  color: #a3b9ff;
  text-align: center;
  font-weight: 300;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 28px;
  font-family: 'Inter', sans-serif;
}

/* Buttons - Continuous flow, no gaps */
.buttons {
  display: flex;
  flex-direction: column;
  gap: 10px;  /* Consistent gap between ALL buttons */
}

.btn {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  text-decoration: none;
  background: rgba(17, 19, 22, 0.8);
  border: 1px solid;
  border-image: linear-gradient(90deg, #d4af37, #4169e1, #d4af37) 1;
  border-radius: 50px;
  transition: all 0.3s ease;
  color: #ffffff;
  font-size: 14px;
  font-weight: 400;
  backdrop-filter: blur(5px);
  position: relative;
  overflow: hidden;
}

/* Button background gradient on hover */
.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, rgba(212, 175, 55, 0.1), rgba(65, 105, 225, 0.1));
  opacity: 0;
  transition: opacity 0.3s;
  z-index: -1;
}

.btn:hover::before {
  opacity: 1;
}

.btn:hover {
  transform: translateY(-2px);
  border-color: #d4af37;
  box-shadow: 
    0 10px 20px -10px #000,
    0 0 0 1px rgba(212, 175, 55, 0.3);
}

.btn-icon {
  width: 24px;
  text-align: center;
  margin-right: 14px;
}

.btn-icon img {
  width: 18px;
  height: 18px;
  filter: brightness(0) invert(1);
  transition: all 0.3s;
}

.btn:hover .btn-icon img {
  filter: brightness(0) invert(0.8) sepia(1) hue-rotate(180deg);
}

.btn-text {
  flex: 1;
  color: #f0f0f0;
  font-weight: 300;
  letter-spacing: 0.3px;
}

.btn-arrow {
  opacity: 0.5;
  font-size: 16px;
  color: #d4af37;
  transition: opacity 0.2s;
}

.btn:hover .btn-arrow {
  opacity: 1;
  color: #4169e1;
}

/* Footer */
.footer {
  margin-top: 32px;
  text-align: center;
  font-size: 11px;
  color: #7a7f8c;
  line-height: 1.8;
  padding-top: 20px;
  border-top: 1px solid;
  border-image: linear-gradient(90deg, transparent, #d4af37, #4169e1, #d4af37, transparent) 1;
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 0.5px;
}

.footer span {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  color: #a3b9ff;
}

/* Responsive */
@media (max-width: 360px) {
  .container { padding: 30px 18px; }
  .name { font-size: 30px; }
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="container">

    <!-- Corner Decoration -->
    <div class="corner-decoration"></div>

    <!-- Profile -->
    <div class="profile">
      <img src="Your_Profile_Picture_Link" alt="Profile">
    </div>

    <!-- Name & Title -->
    <div class="name">Your_Name</div>
    <div class="title">Your_Title</div>

    <!-- All Buttons - একটানা সাজানো, কোনো gap নেই -->
    <div class="buttons">

      <!-- Facebook -->
      <a class="btn" href="https://www.facebook.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/facebook/ffffff"></span>
        <span class="btn-text">Facebook</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- Facebook Page -->
      <a class="btn" href="https://www.facebook.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/facebook/ffffff"></span>
        <span class="btn-text">Facebook Page</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- Instagram -->
      <a class="btn" href="https://www.instagram.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/instagram/ffffff"></span>
        <span class="btn-text">Instagram</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- WhatsApp -->
      <a class="btn" href="https://wa.me/8801234567890" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/whatsapp/ffffff"></span>
        <span class="btn-text">WhatsApp</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- TikTok -->
      <a class="btn" href="https://www.tiktok.com/@your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/tiktok/ffffff"></span>
        <span class="btn-text">TikTok</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- Telegram -->
      <a class="btn" href="https://t.me/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/telegram/ffffff"></span>
        <span class="btn-text">Telegram</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- Twitter (X) - এখন সরাসরি Telegram এর পরেই -->
      <a class="btn" href="https://x.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/x/ffffff"></span>
        <span class="btn-text">Twitter (X)</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- Call Me - এখন সরাসরি Twitter (X) এর পরেই, কোনো gap নেই -->
      <a class="btn" href="tel:01234567890">
        <span class="btn-icon"><img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" style="filter: brightness(0) invert(1); width:18px;"></span>
        <span class="btn-text">Call Me</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- About Me -->
      <a class="btn" href="#">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/aboutdotme/ffffff"></span>
        <span class="btn-text">About Me</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- My Website -->
      <a class="btn" href="#">
        <span class="btn-icon"><img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png" style="filter: brightness(0) invert(1); width:18px;"></span>
        <span class="btn-text">My Website</span>
        <span class="btn-arrow">↗</span>
      </a>

    </div>

    <!-- Footer -->
    <div class="footer">
      Copyright © 2026 MADE BY <br> <span>"Your_Name"</span>. <br> All Rights Reserved
    </div>

  </div>
</div>

</body>
</html>
