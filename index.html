<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background:#ffffff;
    color:#333;
}

/* Header */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    border-bottom:1px solid #eee;
}

.title{
    font-size:20px;
    font-weight:600;
}

/* Menu Icon */
.menu{
    font-size:26px;
    cursor:pointer;
}

/* Sidebar */
.sidebar{
    position:fixed;
    top:0;
    right:-250px;
    width:250px;
    height:100%;
    background:#fff;
    box-shadow:-2px 0 10px rgba(0,0,0,0.1);
    transition:0.3s;
    padding-top:60px;
}

.sidebar a{
    display:block;
    padding:15px 20px;
    text-decoration:none;
    color:#333;
    border-bottom:1px solid #eee;
}

.sidebar a:hover{
    background:#f5f5f5;
}

/* Active Sidebar */
.sidebar.active{
    right:0;
}

/* Overlay */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.3);
    display:none;
}

.overlay.active{
    display:block;
}

/* Main */
.main{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:80vh;
    text-align:center;
    padding:20px;
}

.main h1{
    font-size:34px;
    margin-bottom:10px;
}

.main p{
    color:#777;
    margin-bottom:20px;
}

/* Button */
.btn{
    padding:12px 25px;
    border:none;
    background:#2e7d32;
    color:white;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#1b5e20;
}
</style>

</head>

<body>

<header>
    <div class="title">Welcome</div>
    <div class="menu" onclick="toggleMenu()">☰</div>
</header>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<section class="main">
    <h1>Welcome</h1>
    <p>Clean & modern website design.</p>
    <button class="btn">Get Started</button>
</section>

<script>
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}
</script>

</body>
</html>
