<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 👉 EDIT HERE: Website Title -->
    <title>CHROMATIC FUTURE | premium economy 3000</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- ⚠️ CSS SAME (no change) -->
    <style>
    /* তোমার আগের সব CSS এখানে unchanged থাকবে */
    </style>
</head>

<body>

<!-- animated background -->
<div class="cyber-bg"></div>

<div class="app">

<header>
    <div class="logo">
        <i class="fa-regular fa-crystal"></i>

        <!-- 👉 EDIT HERE: Logo Name -->
        CHROMATIC 3K
    </div>

    <div class="hologram-btn" onclick="openMenu()">
        <div class="line"></div>
        <div class="line"></div>
    </div>
</header>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">

    <div class="close-btn" onclick="closeMenu()">✕</div>

    <div class="profile">

        <div class="avatar">
            <i class="fa-regular fa-robot"></i>
        </div>

        <div class="profile-text">
            <!-- 👉 EDIT HERE: Profile Name -->
            <h3>NOVA-7</h3>

            <!-- 👉 EDIT HERE: Profile Subtitle -->
            <p>premium economy · 3024</p>
        </div>
    </div>

    <!-- 👉 EDIT HERE: Menu -->
    <a onclick="go('home')">HOLO HOME</a>
    <a onclick="go('test')">NEO LAB</a>
    <a onclick="go('about')">QUANTUM</a>
    <a onclick="go('orbit')">ORBIT</a>

    <a onclick="go('settings')">MATRIX</a>

</div>

<div class="main">
    <div class="card">

        <!-- 👉 EDIT HERE: Main Heading -->
        <h2>NEON<br>ECONOMY</h2>

        <!-- 👉 EDIT HERE: Description -->
        <p>premium soul · future mind. colorful dimension awaits.</p>

        <!-- 👉 EDIT HERE: Chip -->
        <div class="economy-chip">
            ECONOMY 3000
        </div>

        <!-- 👉 EDIT HERE: Swipe Text -->
        <div class="gesture-hint">
            SWIPE TO ENTER
        </div>

        <!-- 👉 EDIT HERE: Status -->
        <div class="cyber-status">
            ✦ HOLOGRAM ACTIVE ✦
        </div>

    </div>
</div>

</div>

<script>

// menu
function openMenu() {
    document.getElementById('sidebar').classList.add('active');
    document.getElementById('overlay').classList.add('active');
}

function closeMenu() {
    document.getElementById('sidebar').classList.remove('active');
    document.getElementById('overlay').classList.remove('active');
}

// 👉 EDIT HERE: navigation
function go(page) {
    window.location.href = page + ".html";
}

</script>

</body>
</html>
