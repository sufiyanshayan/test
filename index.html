<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Your_Name - Modern</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f5f5f5;
  font-family: 'Space Grotesk', sans-serif;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
}
.wrapper { max-width: 400px; width: 100%; padding: 16px; }
.container {
  background: #ffffff;
  border-radius: 32px;
  padding: 32px 20px;
  box-shadow: 0 30px 60px -20px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.02);
  display: flex; flex-direction: column; gap: 12px;
}
.profile img {
  width: 100px; height: 100px; border-radius: 20px;
  object-fit: cover;
  box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1);
  transition: 0.2s;
}
.profile img:hover { border-radius: 30px; }
.name { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
.title { font-size: 13px; color: #888; font-weight: 400; margin-bottom: 16px; }
.btn {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px; border-radius: 18px; text-decoration: none;
  background: #ffffff; color: #1a1a1a; font-size: 15px; font-weight: 500;
  border: 1.5px solid #f0f0f0;
  transition: all 0.2s;
}
.btn:hover {
  border-color: #000;
  background: #000;
  color: #fff;
}
.btn:hover img { filter: brightness(0) invert(1); }
.btn img { width: 20px; height: 20px; transition: 0.2s; }
.footer {
  margin-top: 28px; font-size: 11px; color: #bbb;
  text-align: center; font-weight: 400;
  text-transform: uppercase; letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="container">
    <div class="profile"><img src="Your_Profile_Picture_Link"></div>
    <div class="name">Your_Name</div>
    <div class="title">Your_Title</div>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/facebook/000000">Facebook</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/instagram/000000">Instagram</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/x/000000">Twitter X</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/whatsapp/000000">WhatsApp</a>
    <a class="btn" href="#"><img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" style="width:18px;">Call</a>
  </div>
  <div class="footer">© 2026 Your_Name · modern edge</div>
</div>
</body>
</html>
