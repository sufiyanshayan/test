<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name · Executive Edition</title>

<!-- Fonts - Modern + Classic Fusion -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" type="image/png" href="Your_Favicon_Link">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #080b0f;  /* Deeper black for premium feel */
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
}

/* Premium light effects - more subtle & elegant */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  right: -10%;
  width: 70%;
  height: 70%;
  background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: subtleFloat 15s infinite alternate ease-in-out;
}

body::after {
  content: '';
  position: fixed;
  bottom: -20%;
  left: -10%;
  width: 70%;
  height: 70%;
  background: radial-gradient(circle, rgba(65, 105, 225, 0.06) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: subtleFloat 18s infinite alternate-reverse ease-in-out;
}

/* Floating particles - NEW PREMIUM ELEMENT */
.particle {
  position: fixed;
  width: 2px;
  height: 2px;
  background: rgba(212, 175, 55, 0.3);
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
  animation: floatParticle 15s infinite linear;
}

@keyframes floatParticle {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-100vh) translateX(100vw); opacity: 0; }
}

@keyframes subtleFloat {
  0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
  100% { transform: translate(2%, 2%) scale(1.05); opacity: 0.8; }
}

.wrapper {
  max-width: 440px;
  width: 100%;
  position: relative;
  z-index: 2;
}

/* Main Card - Premium Black with depth */
.container {
  background: #0e1117;  /* Rich black-blue */
  border-radius: 40px;
  padding: 42px 26px 36px;
  box-shadow: 
    0 35px 70px -20px rgba(0, 0, 0, 0.9),
    0 0 0 1px rgba(212, 175, 55, 0.15),
    inset 0 1px 1px rgba(255, 255, 255, 0.02),
    inset 0 0 30px rgba(212, 175, 55, 0.03);
  position: relative;
  border: 1px solid rgba(212, 175, 55, 0.1);
  backdrop-filter: blur(1px);
  animation: cardFloat 6s ease-in-out infinite; /* NEW PREMIUM ELEMENT */
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

/* Premium top bar - more elegant */
.container::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 140px;
  height: 4px;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(212, 175, 55, 0.3), 
    #d4af37, 
    #4169e1, 
    #d4af37, 
    rgba(212, 175, 55, 0.3), 
    transparent
  );
  border-radius: 0 0 4px 4px;
  filter: blur(0.5px);
}

/* Corner accents - more refined */
.container::after {
  content: '';
  position: absolute;
  top: 24px;
  right: 24px;
  width: 40px;
  height: 40px;
  border-top: 1.5px solid rgba(212, 175, 55, 0.25);
  border-right: 1.5px solid rgba(212, 175, 55, 0.25);
  opacity: 0.8;
}

/* NEW CORNER DECORATION - Bottom Left */
.corner-decoration {
  position: absolute;
  bottom: 24px;
  left: 24px;
  width: 40px;
  height: 40px;
  border-bottom: 1.5px solid rgba(65, 105, 225, 0.25);
  border-left: 1.5px solid rgba(65, 105, 225, 0.25);
  opacity: 0.8;
  pointer-events: none;
}

/* Profile Section - more premium */
.profile {
  text-align: center;
  margin-bottom: 22px;
  position: relative;
}

/* Layered glow effect - NEW PREMIUM ELEMENT */
.profile-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 130px;
  height: 130px;
  background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
  border-radius: 50%;
  z-index: -1;
  animation: pulseGlow 4s infinite alternate;
}

@keyframes pulseGlow {
  0% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.95); }
  100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.05); }
}

.profile img {
  width: 105px;
  height: 105px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #d4af37;
  box-shadow: 
    0 0 0 3px #0e1117,
    0 0 0 6px rgba(65, 105, 225, 0.25),
    0 20px 40px -10px #000;
  transition: all 0.5s ease;
}

.profile img:hover {
  transform: scale(1.02);
  border-color: #4169e1;
  box-shadow: 
    0 0 0 3px #0e1117,
    0 0 0 8px rgba(212, 175, 55, 0.25),
    0 25px 45px -8px #000;
}

/* Name - Classic Premium */
.name {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 600;
  color: #d4af37;
  text-align: center;
  letter-spacing: -0.3px;
  margin-bottom: 6px;
  text-shadow: 
    0 2px 15px rgba(212, 175, 55, 0.2),
    0 0 30px rgba(65, 105, 225, 0.1);
  line-height: 1.2;
}

/* Title - Modern touch */
.title {
  font-size: 12px;
  color: #8e9cd3;  /* Soft blue */
  text-align: center;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 30px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  word-spacing: 4px;
  position: relative;
  display: inline-block;
  padding: 0 20px;
  background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent);
  border-radius: 30px;
  line-height: 2;
}

/* Buttons - ORIGINAL DESIGN PRESERVED */
.buttons {
  display: flex;
  flex-direction: column;
  gap: 12px;  /* Slightly more gap for premium breathing room */
}

.btn {
  display: flex;
  align-items: center;
  padding: 16px 22px;
  text-decoration: none;
  background: rgba(14, 17, 23, 0.6);
  border: 1.5px solid transparent;
  background-image: linear-gradient(#0e1117, #0e1117), 
                    linear-gradient(90deg, #d4af37, #4169e1, #d4af37);
  background-origin: border-box;
  background-clip: padding-box, border-box;
  border-radius: 60px;
  transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
  color: #ffffff;
  font-size: 14px;
  font-weight: 400;
  backdrop-filter: blur(8px);
  position: relative;
  overflow: hidden;
}

/* Inner shine effect */
.btn::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -60%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
}

.btn:hover::after {
  opacity: 0.3;
}

.btn:hover {
  transform: translateY(-3px) scale(1.01);
  box-shadow: 
    0 18px 30px -12px #000,
    0 0 0 1px rgba(212, 175, 55, 0.4),
    0 0 20px rgba(65, 105, 225, 0.2);
  background: rgba(20, 24, 32, 0.7);
}

.btn-icon {
  width: 28px;
  text-align: center;
  margin-right: 16px;
  position: relative;
}

.btn-icon img {
  width: 20px;
  height: 20px;
  filter: brightness(0) invert(1);
  transition: all 0.4s;
  opacity: 0.9;
}

.btn:hover .btn-icon img {
  filter: brightness(0) invert(0.9) sepia(0.5) hue-rotate(350deg);
  transform: scale(1.1);
}

.btn-text {
  flex: 1;
  color: #f5f5f5;
  font-weight: 350;
  letter-spacing: 0.3px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px;
}

.btn-arrow {
  opacity: 0.4;
  font-size: 18px;
  color: #d4af37;
  transition: all 0.3s;
  margin-left: 8px;
  font-family: 'Playfair Display', serif;
}

.btn:hover .btn-arrow {
  opacity: 1;
  color: #4169e1;
  transform: translateX(3px);
}

/* Footer - Premium minimal */
.footer {
  margin-top: 36px;
  text-align: center;
  font-size: 11px;
  color: #6e7485;
  line-height: 2;
  padding-top: 22px;
  position: relative;
  font-family: 'Plus Jakarta Sans', sans-serif;
  letter-spacing: 0.8px;
}

.footer::before {
  content: '';
  position: absolute;
  top: 0;
  left: 30%;
  width: 40%;
  height: 1px;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(212, 175, 55, 0.3), 
    rgba(65, 105, 225, 0.3), 
    rgba(212, 175, 55, 0.3), 
    transparent
  );
}

.footer span {
  font-family: 'Playfair Display', serif;
  font-size: 12px;
  color: #d4af37;
  font-weight: 500;
  letter-spacing: 1px;
}

/* Premium badge - NEW PREMIUM ELEMENT */
.premium-badge {
  text-align: center;
  margin: 15px 0 -10px;
  font-size: 10px;
  color: rgba(212, 175, 55, 0.4);
  letter-spacing: 5px;
  text-transform: uppercase;
  font-weight: 200;
  font-family: 'Plus Jakarta Sans', sans-serif;
  position: relative;
}

.premium-badge::before,
.premium-badge::after {
  content: '✦';
  margin: 0 10px;
  color: rgba(65, 105, 225, 0.4);
}

/* Loading animation - NEW PREMIUM ELEMENT */
.loading-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  background: linear-gradient(90deg, #d4af37, #4169e1, #d4af37);
  animation: loading 2s ease-out;
  z-index: 9999;
}

@keyframes loading {
  0% { width: 0; opacity: 1; }
  100% { width: 100%; opacity: 0; }
}

/* Responsive */
@media (max-width: 380px) {
  .container { padding: 35px 20px 30px; }
  .name { font-size: 32px; }
  .btn { padding: 14px 18px; }
  .btn-text { font-size: 14px; }
  .premium-badge::before,
  .premium-badge::after { display: none; }
}
</style>
</head>
<body>

<!-- Loading animation - NEW PREMIUM ELEMENT -->
<div class="loading-bar"></div>

<!-- Floating particles - NEW PREMIUM ELEMENT -->
<script>
  for(let i = 0; i < 15; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.top = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 15 + 's';
    particle.style.animationDuration = (10 + Math.random() * 20) + 's';
    document.body.appendChild(particle);
  }
</script>
