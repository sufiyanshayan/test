<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#fff;
    overflow-x:hidden;
}

/* Header */
header{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    border-bottom:1px solid #eee;
}

.menu{
    font-size:25px;
    cursor:pointer;
}

/* Sidebar */
.sidebar{
    position:fixed;
    right:-260px;
    top:0;
    width:260px;
    height:100%;
    background:#fff;
    transition:0.4s;
    box-shadow:-2px 0 15px rgba(0,0,0,0.1);
    padding-top:60px;
    z-index:1000;
}

.sidebar.active{
    right:0;
}

.sidebar a{
    display:block;
    padding:15px;
    text-decoration:none;
    color:#333;
    border-bottom:1px solid #eee;
}

/* Main */
.main{
    text-align:center;
    margin-top:120px;
    transition:0.4s;
}

/* Button */
.btn{
    padding:12px 25px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

/* 🔥 Loader */
.loader{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:2000;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.loader.active{
    opacity:1;
    pointer-events:all;
}

.spinner{
    width:40px;
    height:40px;
    border:4px solid #ddd;
    border-top:4px solid #2e7d32;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<header>
    <div>Welcome</div>
    <div class="menu" onclick="toggleMenu()">☰</div>
</header>

<div class="sidebar" id="sidebar">
    <a href="#" onclick="go('test')">Test</a>
    <a href="#" onclick="go('about')">About</a>
    <a href="#" onclick="go('contact')">Contact</a>
</div>

<div class="main">
    <h1>Welcome</h1>
    <button class="btn" onclick="go('test')">Get Started</button>
</div>

<!-- 🔥 Loader -->
<div class="loader" id="loader">
    <div class="spinner"></div>
</div>

<script>
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
}

// 🚀 Smooth Page Load
function go(page){
    document.getElementById("loader").classList.add("active");

    setTimeout(function(){
        window.location.href = page;
    }, 500);
}
</script>

</body>
</html>
