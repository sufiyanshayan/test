<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name - Minimal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #ffffff;
  font-family: 'Inter', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: #111111;
}
.wrapper { max-width: 400px; width: 100%; padding: 20px; }
.container { display: flex; flex-direction: column; gap: 12px; }
.profile img {
  width: 90px; height: 90px; border-radius: 50%;
  object-fit: cover; border: 1px solid #eaeaea;
  margin-bottom: 8px;
}
.name { font-size: 20px; font-weight: 400; letter-spacing: -0.3px; }
.title { font-size: 13px; color: #888; margin-bottom: 16px; font-weight: 300; }
.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px; border-radius: 30px; text-decoration: none;
  background: #ffffff; color: #000; font-size: 14px; font-weight: 400;
  border: 1px solid #f0f0f0; transition: all 0.2s;
}
.btn:hover { background: #fafafa; border-color: #ddd; }
.btn img { width: 16px; height: 16px; opacity: 0.7; }
.footer {
  margin-top: 30px; font-size: 11px; color: #aaa;
  text-align: center; font-weight: 300;
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="container">
    <div class="profile"><img src="Your_Profile_Picture_Link" alt=""></div>
    <div class="name">Your_Name</div>
    <div class="title">Your_Title</div>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/facebook/888888">Facebook</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/instagram/888888">Instagram</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/whatsapp/888888">WhatsApp</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/x/888888">Twitter (X)</a>
    <a class="btn" href="#"><img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" style="filter: grayscale(1);">Call Me</a>
  </div>
  <div class="footer">© 2026 Your_Name</div>
</div>
</body>
</html>
