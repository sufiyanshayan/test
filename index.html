<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM ECONOMY | Your_Name</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0C0C0C;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Classic Premium Texture */
        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, 
                    rgba(193, 164, 104, 0.02) 0px, 
                    rgba(193, 164, 104, 0.02) 2px,
                    transparent 2px, 
                    transparent 8px),
                radial-gradient(circle at 50% 50%, 
                    rgba(193, 164, 104, 0.05) 0%, 
                    transparent 50%);
            pointer-events: none;
        }

        /* Animated Gold Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.4;
        }

        .orb-1 {
            top: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #C1A468 0%, transparent 70%);
            animation: orbFloat 20s infinite;
        }

        .orb-2 {
            bottom: -150px;
            right: -150px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #8A6E4B 0%, transparent 70%);
            animation: orbFloat 25s infinite reverse;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, -50px) scale(1.1); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
            padding: 20px;
            margin: 20px auto;
        }

        /* Classic Premium Card */
        .premium-card {
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(193, 164, 104, 0.3);
            border-radius: 48px;
            padding: 40px 24px;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.5),
                0 0 0 1px rgba(193, 164, 104, 0.2) inset,
                0 0 40px rgba(193, 164, 104, 0.2);
        }

        /* Classic Profile Section */
        .profile-section {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        /* Classic Frame */
        .profile-frame {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            position: relative;
            animation: frameGlow 4s infinite;
        }

        .profile-frame::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border: 2px solid #C1A468;
            border-radius: 50%;
            border-top-color: transparent;
            border-bottom-color: transparent;
            animation: rotate 8s linear infinite;
        }

        .profile-frame::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 1px solid rgba(193, 164, 104, 0.3);
            border-radius: 50%;
            border-left-color: transparent;
            border-right-color: transparent;
            animation: rotate 12s linear infinite reverse;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes frameGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(193, 164, 104, 0.3)); }
            50% { filter: drop-shadow(0 0 40px rgba(193, 164, 104, 0.6)); }
        }

        .profile-frame img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #1a1a1a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Classic Badge */
        .economy-badge {
            position: absolute;
            bottom: -5px;
            right: 50%;
            transform: translateX(60px);
            background: #C1A468;
            color: #0C0C0C;
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            font-weight: 700;
            padding: 8px 24px;
            border-radius: 40px;
            letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(193, 164, 104, 0.4);
            border: 1px solid rgba(255,255,255,0.3);
            white-space: nowrap;
            animation: badgeGlow 3s infinite;
        }

        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 10px 25px rgba(193, 164, 104, 0.4); }
            50% { box-shadow: 0 15px 35px rgba(193, 164, 104, 0.8); }
        }

        /* Classic Typography */
        .classic-name {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: #C1A468;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .classic-title {
            font-size: 14px;
            color: #999;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: 300;
        }

        /* Premium Economy Stats */
        .economy-dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 35px;
            padding: 20px;
            background: rgba(193, 164, 104, 0.05);
            border-radius: 100px;
            border: 1px solid rgba(193, 164, 104, 0.2);
            position: relative;
            overflow: hidden;
        }

        .economy-dashboard::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(193, 164, 104, 0.1), transparent);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .metric {
            text-align: center;
            position: relative;
        }

        .metric-value {
            display: block;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: #C1A468;
            margin-bottom: 5px;
        }

        .metric-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Classic Button Grid - All Original Buttons */
        .button-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        /* Classic Premium Button */
        .classic-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: rgba(18, 18, 18, 0.6);
            border: 1px solid rgba(193, 164, 104, 0.2);
            border-radius: 100px;
            color: #fff;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
        }

        .classic-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(193, 164, 104, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .classic-btn:hover::before {
            left: 100%;
        }

        .btn-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-content img {
            width: 22px;
            height: 22px;
            filter: brightness(0) invert(1);
            transition: all 0.3s ease;
        }

        .btn-content span {
            font-size: 14px;
            font-weight: 500;
            color: #e0e0e0;
        }

        .btn-arrow {
            color: #C1A468;
            font-size: 12px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
            font-family: 'Playfair Display', serif;
        }

        .classic-btn:hover {
            background: rgba(193, 164, 104, 0.1);
            border-color: rgba(193, 164, 104, 0.4);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .classic-btn:hover .btn-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .classic-btn:hover .btn-content img {
            transform: scale(1.1);
            filter: brightness(0) invert(0.8) sepia(1) hue-rotate(5deg);
        }

        /* Premium Button Variant */
        .btn-gold {
            background: linear-gradient(135deg, rgba(193, 164, 104, 0.15), rgba(138, 110, 75, 0.05));
            border-color: rgba(193, 164, 104, 0.4);
        }

        .btn-gold .btn-content span {
            color: #C1A468;
            font-weight: 600;
        }

        .btn-gold::after {
            content: '✦';
            position: absolute;
            top: -5px;
            right: 20px;
            color: #C1A468;
            font-size: 16px;
            opacity: 0.5;
        }

        /* Footer with Classic Touch */
        .classic-footer {
            margin-top: 30px;
            text-align: center;
            padding: 20px 0;
            border-top: 1px solid rgba(193, 164, 104, 0.2);
            font-family: 'Playfair Display', serif;
            font-size: 12px;
            color: #666;
            letter-spacing: 2px;
            position: relative;
        }

        .classic-footer span {
            color: #C1A468;
            margin: 0 10px;
        }

        .classic-footer .ornament {
            font-size: 16px;
            color: #C1A468;
            opacity: 0.5;
            margin: 0 8px;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .premium-card {
                padding: 30px 16px;
                border-radius: 36px;
            }
            
            .classic-name {
                font-size: 28px;
            }
            
            .economy-badge {
                font-size: 12px;
                padding: 6px 18px;
                transform: translateX(50px);
            }
            
            .btn-content span {
                font-size: 13px;
            }
        }

        /* Smooth Scrolling */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
