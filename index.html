<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name</title>
<style>
body { margin:0; font-family:sans-serif; background:#111; color:#fff; }

/* ===== Login Overlay ===== */
#login-overlay {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.95);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
#login-overlay input {
    padding:0.8rem 1rem;
    margin:0.5rem 0;
    border-radius:8px;
    border:none;
    width:200px;
}
#login-overlay button {
    padding:0.8rem 1.5rem;
    border:none;
    border-radius:24px;
    background: linear-gradient(90deg,#ffa0ff,#a0ffff);
    font-weight:700;
    color:#111;
    cursor:pointer;
}
#error-msg { color:red; margin-top:0.5rem; font-size:0.9rem; }

/* ===== Existing main page ===== */
header { padding:1rem; background:#222; display:flex; justify-content:space-between; }
.main { padding:2rem; text-align:center; }
</style>
</head>
<body>

<!-- ===== LOGIN OVERLAY ===== -->
<div id="login-overlay">
    <h2 style="margin-bottom:1rem;">Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="login-btn">Login</button>
    <p id="error-msg"></p>
</div>

<!-- ===== Main Page ===== -->
<header>
    <div>Logo / Name</div>
    <div>Menu</div>
</header>
<div class="main">
    <h1>Welcome to Your Page</h1>
    <p>This is your existing content.</p>
</div>

<script>
// ===== Define allowed credentials =====
const ALLOWED = { username:"admin", password:"12345" };

// ===== Elements =====
const overlay = document.getElementById("login-overlay");
const loginBtn = document.getElementById("login-btn");
const errorMsg = document.getElementById("error-msg");

// ===== Login Function =====
loginBtn.addEventListener("click", ()=>{
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if(user === ALLOWED.username && pass === ALLOWED.password){
        overlay.style.display = "none"; // hide overlay
    } else {
        errorMsg.textContent = "Invalid username or password";
    }
});

// Optional: press Enter to login
document.getElementById("password").addEventListener("keypress", function(e){
    if(e.key === "Enter") loginBtn.click();
});
</script>

</body>
</html>
