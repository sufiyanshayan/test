<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Full Page UI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    font-family:'Poppins', sans-serif;
    background: linear-gradient(145deg, #e8f5e9, #ffffff);
    overflow-x:hidden;
}

/* Header */
header {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background: rgba(0,0,0,0.4);
    z-index:1002;
}

/* Hamburger Menu */
.menu {
    cursor:pointer;
    width:30px;
    height:22px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.menu div {
    height:3px;
    width:100%;
    background:white;
    border-radius:2px;
}

/* Overlay */
.overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.3);
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    z-index:900;
}

.overlay.active {
    opacity:1;
    pointer-events:all;
}

/* Sidebar */
.sidebar {
    position: fixed;
    top:0;
    right:-320px;
    width:320px;
    height:100%;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(25px);
    transition:0.4s;
    z-index:1000;
    padding-top:60px; /* space for header */
}

/* Sidebar active */
.sidebar.active {
    right:0;
}

/* Close Button */
.close-btn {
    position:absolute;
    top:15px;
    right:15px;
    font-size:24px;
    cursor:pointer;
}

/* Profile */
.profile {
    text-align:center;
    padding:20px;
    border-bottom:1px solid rgba(0,0,0,0.05);
}

.profile img {
    width:80px;
    height:80px;
    border-radius:50%;
    margin-bottom:10px;
}

/* Menu Links */
.sidebar a {
    display:block;
    padding:15px 25px;
    margin:10px 15px;
    color:#333;
    text-decoration:none;
    border-radius:12px;
    transition:0.3s;
}

.sidebar a:hover {
    background:#e0f2f1;
}

/* Main content */
.main {
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding-top:60px; /* avoid header overlap */
    box-sizing:border-box;
}

.card {
    max-width:400px;
    width:100%;
    padding:30px;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(25px);
    border-radius:25px;
    box-shadow:0 15px 30px rgba(0,0,0,0.1);
    text-align:center;
}

.card h2 { margin-bottom:15px; }
.card p { color:#555; }
</style>
</head>
<body>

<header>
    <div>My Site</div>
    <div class="menu" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>
</header>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="close-btn" onclick="closeMenu()">✕</div>
    <div class="profile">
        <img src="https://i.pravatar.cc/100" alt="Profile">
        <h3>Your Name</h3>
        <p>Welcome back</p>
    </div>
    <a onclick="go('home')">🏠 Home</a>
    <a onclick="go('test')">📄 Test</a>
    <a onclick="go('about')">ℹ️ About</a>
</div>

<div class="main">
    <div class="card">
        <h2>Welcome 👋</h2>
        <p>No cutting, header and hamburger fully visible on all devices.</p>
    </div>
</div>

<script>
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}
function closeMenu() {
    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}
function go(page){
    window.location.href = page;
}
</script>

</body>
</html>
