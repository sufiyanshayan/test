<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#f9f9f9;
}

/* Header */
header{
    padding:15px;
    text-align:center;
    font-weight:600;
    background:#fff;
    border-bottom:1px solid #eee;
}

/* Main */
.main{
    padding:20px;
    text-align:center;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
    margin-top:20px;
}

.btn{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    background:#2e7d32;
    color:#fff;
    border-radius:20px;
    cursor:pointer;
}

/* Bottom Nav */
.navbar{
    position:fixed;
    bottom:0;
    width:100%;
    height:60px;
    background:#fff;
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:1px solid #eee;
}

.nav-item{
    text-align:center;
    font-size:14px;
    cursor:pointer;
    color:#555;
}

.nav-item.active{
    color:#2e7d32;
    font-weight:600;
}

/* Loader */
.loader{
    position:fixed;
    width:100%;
    height:100%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.loader.active{
    opacity:1;
    pointer-events:all;
}

.spinner{
    width:40px;
    height:40px;
    border:4px solid #ddd;
    border-top:4px solid #2e7d32;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<header>My App 🚀</header>

<div class="main">

    <h2>Welcome</h2>

    <div class="card">
        <p>This is your pro level website</p>
        <button class="btn" onclick="go('test')">Open Test</button>
    </div>

</div>

<!-- Bottom Navigation -->
<div class="navbar">
    <div class="nav-item active" onclick="go('home')">Home</div>
    <div class="nav-item" onclick="go('test')">Test</div>
    <div class="nav-item" onclick="go('about')">About</div>
</div>

<!-- Loader -->
<div class="loader" id="loader">
    <div class="spinner"></div>
</div>

<script>
function go(page){
    document.getElementById("loader").classList.add("active");

    setTimeout(()=>{
        window.location.href = page;
    }, 400);
}
</script>

</body>
</html>
