<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Your_Name - Vintage</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Noto+Serif+Bengali&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #fefaf5;
  font-family: 'Playfair Display', serif;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
}
.wrapper { max-width: 400px; width: 100%; padding: 20px; }
.container {
  background: #ffffff;
  border: 1px solid #ece3d7;
  padding: 30px 20px;
  box-shadow: 8px 8px 0 rgba(0,0,0,0.02);
  display: flex; flex-direction: column; gap: 12px;
}
.profile img {
  width: 100px; height: 100px; border-radius: 50%;
  object-fit: cover;
  border: 2px solid #d4c9bc;
  filter: sepia(10%);
}
.name { font-size: 24px; font-weight: 500; color: #3f3a33; }
.title {
  font-size: 13px; color: #8f897c; text-transform: uppercase;
  letter-spacing: 2px; margin-bottom: 16px;
}
.btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 14px; text-decoration: none;
  background: #ffffff; color: #4a453c; font-size: 14px;
  border: 1px solid #e5dbcf;
  transition: 0.2s;
  font-family: 'Noto Serif Bengali', serif;
}
.btn:hover { background: #f9f3eb; border-color: #c9bcab; }
.btn img { width: 16px; height: 16px; opacity: 0.8; }
.footer {
  margin-top: 30px; font-size: 11px; color: #b7ab9b;
  text-align: center; font-family: 'Noto Serif Bengali', serif;
  border-top: 1px dashed #e2d6c8; padding-top: 16px;
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="container">
    <div class="profile"><img src="Your_Profile_Picture_Link"></div>
    <div class="name">Your_Name</div>
    <div class="title">Your_Title</div>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/facebook/7c756b">Facebook</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/instagram/7c756b">Instagram</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/whatsapp/7c756b">WhatsApp</a>
    <a class="btn" href="#"><img src="https://cdn.simpleicons.org/telegram/7c756b">Telegram</a>
    <a class="btn" href="#"><img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" style="filter: sepia(30%);">Call Me</a>
  </div>
  <div class="footer">© 2026 · Your_Name · classic touch</div>
</div>
</body>
</html>
