<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name · Executive Edition</title>

<!-- Fonts - Modern + Classic Fusion -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" type="image/png" href="Your_Favicon_Link">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #080b0f;
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
}

/* Premium light effects */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  right: -10%;
  width: 70%;
  height: 70%;
  background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: subtleFloat 15s infinite alternate ease-in-out;
}

body::after {
  content: '';
  position: fixed;
  bottom: -20%;
  left: -10%;
  width: 70%;
  height: 70%;
  background: radial-gradient(circle, rgba(65, 105, 225, 0.06) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: subtleFloat 18s infinite alternate-reverse ease-in-out;
}

@keyframes subtleFloat {
  0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
  100% { transform: translate(2%, 2%) scale(1.05); opacity: 0.8; }
}

.wrapper {
  max-width: 440px;
  width: 100%;
  position: relative;
  z-index: 2;
}

/* Main Card */
.container {
  background: #0e1117;
  border-radius: 40px;
  padding: 42px 26px 36px;
  box-shadow: 
    0 35px 70px -20px rgba(0, 0, 0, 0.9),
    0 0 0 1px rgba(212, 175, 55, 0.15),
    inset 0 1px 1px rgba(255, 255, 255, 0.02),
    inset 0 0 30px rgba(212, 175, 55, 0.03);
  position: relative;
  border: 1px solid rgba(212, 175, 55, 0.1);
  backdrop-filter: blur(1px);
}

/* Premium top bar */
.container::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 140px;
  height: 4px;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(212, 175, 55, 0.3), 
    #d4af37, 
    #4169e1, 
    #d4af37, 
    rgba(212, 175, 55, 0.3), 
    transparent
  );
  border-radius: 0 0 4px 4px;
  filter: blur(0.5px);
}

/* Corner accents */
.container::after {
  content: '';
  position: absolute;
  top: 24px;
  right: 24px;
  width: 40px;
  height: 40px;
  border-top: 1.5px solid rgba(212, 175, 55, 0.25);
  border-right: 1.5px solid rgba(212, 175, 55, 0.25);
  opacity: 0.8;
}

.corner-decoration {
  position: absolute;
  bottom: 24px;
  left: 24px;
  width: 40px;
  height: 40px;
  border-bottom: 1.5px solid rgba(65, 105, 225, 0.25);
  border-left: 1.5px solid rgba(65, 105, 225, 0.25);
  opacity: 0.8;
  pointer-events: none;
}

/* Profile Section */
.profile {
  text-align: center;
  margin-bottom: 22px;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}

.profile img {
  width: 105px;
  height: 105px;
  border-radius: 50%;
  object-fit: cover;
  position: relative;
  z-index: 3;
  border: 5px solid transparent;
  
  /* Base styling */
  box-shadow: 0 10px 20px -5px #000;
}

/* ===== CIRCULAR CHASE EFFECT - WITHOUT CLOCK HANDS ===== */
.profile::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 125px;
  height: 125px;
  border-radius: 50%;
  
  /* Simple alternating colors - like runners on a track */
  background: repeating-conic-gradient(
    from 0deg,
    #d4af37 0deg 30deg,
    #4169e1 30deg 60deg,
    #d4af37 60deg 90deg,
    #4169e1 90deg 120deg,
    #d4af37 120deg 150deg,
    #4169e1 150deg 180deg,
    #d4af37 180deg 210deg,
    #4169e1 210deg 240deg,
    #d4af37 240deg 270deg,
    #4169e1 270deg 300deg,
    #d4af37 300deg 330deg,
    #4169e1 330deg 360deg
  );
  
  /* Continuous flow animation - colors move smoothly around the circle */
  animation: flowAround 4s linear infinite;
  z-index: 2;
  
  /* Mask to create border effect */
  -webkit-mask: 
    linear-gradient(#fff 0 0) content-box, 
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  padding: 5px;
}

/* Second layer for more depth - flows opposite direction */
.profile::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 133px;
  height: 133px;
  border-radius: 50%;
  
  /* Opposite color pattern */
  background: repeating-conic-gradient(
    from 0deg,
    #4169e1 0deg 30deg,
    #d4af37 30deg 60deg,
    #4169e1 60deg 90deg,
    #d4af37 90deg 120deg,
    #4169e1 120deg 150deg,
    #d4af37 150deg 180deg,
    #4169e1 180deg 210deg,
    #d4af37 210deg 240deg,
    #4169e1 240deg 270deg,
    #d4af37 270deg 300deg,
    #4169e1 300deg 330deg,
    #d4af37 330deg 360deg
  );
  
  /* Flow opposite direction */
  animation: flowAroundReverse 5s linear infinite;
  z-index: 1;
  
  /* Mask for border effect */
  -webkit-mask: 
    linear-gradient(#fff 0 0) content-box, 
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  padding: 2px;
  opacity: 0.7;
}

/* Flow animations - no clock hands, just continuous flow */
@keyframes flowAround {
  from {
    transform: translate(-50%, -50%) rotate(0deg);
  }
  to {
    transform: translate(-50%, -50%) rotate(360deg);
  }
}

@keyframes flowAroundReverse {
  from {
    transform: translate(-50%, -50%) rotate(0deg);
  }
  to {
    transform: translate(-50%, -50%) rotate(-360deg);
  }
}

/* Name */
.name {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 600;
  color: #d4af37;
  text-align: center;
  letter-spacing: -0.3px;
  margin-top: 15px;
  margin-bottom: 6px;
  text-shadow: 
    0 2px 15px rgba(212, 175, 55, 0.2),
    0 0 30px rgba(65, 105, 225, 0.1);
  line-height: 1.2;
  position: relative;
  z-index: 5;
}

/* Title - PREMIUMECONOMY and EXECUTIVE */
.title-container {
  text-align: center;
  margin-bottom: 30px;
  position: relative;
  z-index: 5;
}

.premium-title {
  font-size: 16px;
  color: #d4af37;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: 'Plus Jakarta Sans', sans-serif;
  margin-bottom: 4px;
}

.executive-title {
  font-size: 14px;
  color: #8e9cd3;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-family: 'Plus Jakarta Sans', sans-serif;
  position: relative;
  display: inline-block;
  padding: 0 20px;
}

.executive-title::before,
.executive-title::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #d4af37, transparent);
}

.executive-title::before {
  left: -15px;
}

.executive-title::after {
  right: -15px;
}

/* ===== BUTTONS SECTION - CONTINUOUS FLOW EFFECT ===== */
.buttons {
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: relative;
  z-index: 5;
}

.btn {
  display: flex;
  align-items: center;
  padding: 16px 22px;
  text-decoration: none;
  background: rgba(14, 17, 23, 0.8);
  border-radius: 60px;
  transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
  color: #ffffff;
  font-size: 14px;
  font-weight: 400;
  backdrop-filter: blur(8px);
  position: relative;
  z-index: 2;
  
  /* Base border */
  border: 2.5px solid transparent;
}

/* Continuous flow effect for buttons */
.btn::before {
  content: '';
  position: absolute;
  top: -3px;
  left: -3px;
  right: -3px;
  bottom: -3px;
  border-radius: 62px;
  
  /* Alternating colors for continuous flow */
  background: repeating-linear-gradient(
    90deg,
    #d4af37 0px,
    #d4af37 8px,
    #4169e1 8px,
    #4169e1 16px,
    #d4af37 16px,
    #d4af37 24px,
    #4169e1 24px,
    #4169e1 32px,
    #d4af37 32px,
    #d4af37 40px,
    #4169e1 40px,
    #4169e1 48px,
    #d4af37 48px,
    #d4af37 56px,
    #4169e1 56px,
    #4169e1 64px,
    #d4af37 64px,
    #d4af37 72px,
    #4169e1 72px,
    #4169e1 80px
  );
  
  /* Flow animation - colors move horizontally */
  animation: flowHorizontal 3s linear infinite;
  z-index: -1;
  
  /* Mask for border effect */
  -webkit-mask: 
    linear-gradient(#fff 0 0) content-box, 
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  padding: 2.5px;
  
  background-size: 160px 100%;
}

/* Second runner for buttons */
.btn::after {
  content: '';
  position: absolute;
  top: -5px;
  left: -5px;
  right: -5px;
  bottom: -5px;
  border-radius: 64px;
  
  /* Opposite color pattern */
  background: repeating-linear-gradient(
    90deg,
    #4169e1 0px,
    #4169e1 8px,
    #d4af37 8px,
    #d4af37 16px,
    #4169e1 16px,
    #4169e1 24px,
    #d4af37 24px,
    #d4af37 32px,
    #4169e1 32px,
    #4169e1 40px,
    #d4af37 40px,
    #d4af37 48px,
    #4169e1 48px,
    #4169e1 56px,
    #d4af37 56px,
    #d4af37 64px,
    #4169e1 64px,
    #4169e1 72px,
    #d4af37 72px,
    #d4af37 80px
  );
  
  /* Flow opposite direction */
  animation: flowHorizontalReverse 4s linear infinite;
  z-index: -2;
  
  /* Mask for border effect */
  -webkit-mask: 
    linear-gradient(#fff 0 0) content-box, 
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  padding: 1.5px;
  opacity: 0.7;
  
  background-size: 160px 100%;
}

/* Flow animations - no clock hands, just continuous flow */
@keyframes flowHorizontal {
  from {
    background-position: 0 0;
  }
  to {
    background-position: 160px 0;
  }
}

@keyframes flowHorizontalReverse {
  from {
    background-position: 0 0;
  }
  to {
    background-position: -160px 0;
  }
}

.btn:hover::before {
  animation: flowHorizontal 1.5s linear infinite;
}

.btn:hover::after {
  animation: flowHorizontalReverse 2s linear infinite;
}

.btn:hover {
  transform: translateY(-3px) scale(1.01);
  background: rgba(20, 24, 32, 0.9);
  box-shadow: 0 18px 30px -12px #000;
}

.btn-icon {
  width: 28px;
  text-align: center;
  margin-right: 16px;
  position: relative;
  z-index: 3;
}

.btn-icon img {
  width: 20px;
  height: 20px;
  filter: brightness(0) invert(1);
  transition: all 0.4s;
  opacity: 0.9;
}

.btn:hover .btn-icon img {
  filter: brightness(0) invert(0.9) sepia(0.5) hue-rotate(350deg);
  transform: scale(1.1);
}

.btn-text {
  flex: 1;
  color: #f5f5f5;
  font-weight: 350;
  letter-spacing: 0.3px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px;
  position: relative;
  z-index: 3;
}

.btn-arrow {
  opacity: 0.4;
  font-size: 18px;
  color: #d4af37;
  transition: all 0.3s;
  margin-left: 8px;
  font-family: 'Playfair Display', serif;
  position: relative;
  z-index: 3;
}

.btn:hover .btn-arrow {
  opacity: 1;
  color: #4169e1;
  transform: translateX(3px);
}

/* Footer */
.footer {
  margin-top: 36px;
  text-align: center;
  font-size: 11px;
  color: #6e7485;
  line-height: 2;
  padding-top: 22px;
  position: relative;
  font-family: 'Plus Jakarta Sans', sans-serif;
  letter-spacing: 0.8px;
  z-index: 5;
}

.footer::before {
  content: '';
  position: absolute;
  top: 0;
  left: 30%;
  width: 40%;
  height: 1px;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(212, 175, 55, 0.3), 
    rgba(65, 105, 225, 0.3), 
    rgba(212, 175, 55, 0.3), 
    transparent
  );
}

.footer span {
  font-family: 'Playfair Display', serif;
  font-size: 12px;
  color: #d4af37;
  font-weight: 500;
  letter-spacing: 1px;
}

/* Premium badge */
.premium-badge {
  text-align: center;
  margin: 15px 0 -10px;
  font-size: 10px;
  color: rgba(212, 175, 55, 0.4);
  letter-spacing: 5px;
  text-transform: uppercase;
  font-weight: 200;
  font-family: 'Plus Jakarta Sans', sans-serif;
  position: relative;
  z-index: 5;
}

.premium-badge::before,
.premium-badge::after {
  content: '✦';
  margin: 0 10px;
  color: rgba(65, 105, 225, 0.4);
}

/* Loading animation */
.loading-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  background: linear-gradient(90deg, #d4af37, #4169e1, #d4af37);
  animation: loading 2s ease-out;
  z-index: 9999;
}

@keyframes loading {
  0% { width: 0; opacity: 1; }
  100% { width: 100%; opacity: 0; }
}

/* Responsive */
@media (max-width: 380px) {
  .container { padding: 35px 20px 30px; }
  .name { font-size: 32px; }
  .btn { padding: 14px 18px; }
  .btn-text { font-size: 14px; }
  .premium-badge::before,
  .premium-badge::after { display: none; }
}
</style>
</head>
