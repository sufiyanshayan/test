<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your_Name · Signature Edition</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" type="image/png" href="Your_Favicon_Link">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #fcf9f5;  /* Warm off-white */
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* Main card */
.wrapper {
  max-width: 420px;
  width: 100%;
}

.container {
  background: #ffffff;
  border-radius: 32px;
  padding: 40px 24px 32px;
  box-shadow: 
    0 20px 40px -15px rgba(0, 0, 0, 0.05),
    0 2px 8px rgba(0, 0, 0, 0.02),
    inset 0 0 0 1px rgba(255, 255, 255, 0.9);
  position: relative;
  border: 1px solid #f0e9e0;
}

/* Decorative line */
.container::before {
  content: '';
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 2px;
  background: #e8ddd0;
  border-radius: 2px;
}

/* Profile */
.profile {
  text-align: center;
  margin-bottom: 20px;
}

.profile img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #ffffff;
  box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.1);
}

/* Name */
.name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 500;
  color: #2e2b27;
  text-align: center;
  letter-spacing: -0.3px;
  margin-bottom: 4px;
}

/* Title */
.title {
  font-size: 13px;
  color: #a28e7a;
  text-align: center;
  font-weight: 400;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 28px;
}

/* Buttons */
.buttons {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  text-decoration: none;
  background: #ffffff;
  border: 1px solid #ede5db;
  border-radius: 50px;
  transition: all 0.2s ease;
  color: #2e2b27;
  font-size: 14px;
  font-weight: 400;
}

.btn:hover {
  background: #faf7f2;
  border-color: #d4c5b5;
  transform: translateY(-1px);
}

.btn-icon {
  width: 24px;
  text-align: center;
  margin-right: 14px;
}

.btn-icon img {
  width: 18px;
  height: 18px;
  opacity: 0.7;
}

.btn-text {
  flex: 1;
}

.btn-arrow {
  opacity: 0.3;
  font-size: 16px;
  transition: opacity 0.2s;
}

.btn:hover .btn-arrow {
  opacity: 0.8;
}

/* Small divider */
.section-divider {
  text-align: center;
  margin: 16px 0 10px;
  position: relative;
}

.section-divider span {
  background: #ffffff;
  padding: 0 12px;
  color: #b9aa9a;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.section-divider::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 0;
  width: 100%;
  height: 1px;
  background: #eee5db;
  z-index: -1;
}

/* Footer */
.footer {
  margin-top: 32px;
  text-align: center;
  font-size: 11px;
  color: #b8aa9c;
  line-height: 1.8;
  padding-top: 20px;
  border-top: 1px dashed #e8ddd0;
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 0.3px;
}

.footer span {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  opacity: 0.7;
}

/* Responsive */
@media (max-width: 360px) {
  .container { padding: 30px 18px; }
  .name { font-size: 28px; }
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="container">

    <!-- Profile -->
    <div class="profile">
      <img src="Your_Profile_Picture_Link" alt="Profile">
    </div>

    <!-- Name & Title -->
    <div class="name">Your_Name</div>
    <div class="title">Your_Title</div>

    <!-- All Buttons - Intact -->
    <div class="buttons">

      <!-- Facebook -->
      <a class="btn" href="https://www.facebook.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/facebook/8a7a6a"></span>
        <span class="btn-text">Facebook</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- Facebook Page -->
      <a class="btn" href="https://www.facebook.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/facebook/8a7a6a"></span>
        <span class="btn-text">Facebook Page</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- Instagram -->
      <a class="btn" href="https://www.instagram.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/instagram/8a7a6a"></span>
        <span class="btn-text">Instagram</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- WhatsApp -->
      <a class="btn" href="https://wa.me/8801234567890" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/whatsapp/8a7a6a"></span>
        <span class="btn-text">WhatsApp</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- TikTok -->
      <a class="btn" href="https://www.tiktok.com/@your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/tiktok/8a7a6a"></span>
        <span class="btn-text">TikTok</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- Telegram -->
      <a class="btn" href="https://t.me/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/telegram/8a7a6a"></span>
        <span class="btn-text">Telegram</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- Twitter (X) -->
      <a class="btn" href="https://x.com/your_username" target="_blank">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/x/8a7a6a"></span>
        <span class="btn-text">Twitter (X)</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- Divider -->
      <div class="section-divider">
        <span>More</span>
      </div>

      <!-- Call Me -->
      <a class="btn" href="tel:01234567890">
        <span class="btn-icon"><img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" style="width:18px;opacity:0.7;"></span>
        <span class="btn-text">Call Me</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- About Me -->
      <a class="btn" href="#">
        <span class="btn-icon"><img src="https://cdn.simpleicons.org/aboutdotme/8a7a6a"></span>
        <span class="btn-text">About Me</span>
        <span class="btn-arrow">↗</span>
      </a>

      <!-- My Website -->
      <a class="btn" href="#">
        <span class="btn-icon"><img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png" style="width:18px;opacity:0.7;"></span>
        <span class="btn-text">My Website</span>
        <span class="btn-arrow">↗</span>
      </a>

    </div>

    <!-- Footer -->
    <div class="footer">
      Copyright © 2026 MADE BY <br> "Your_Name". <br> <span>All Rights Reserved</span>
    </div>

  </div>
</div>

</body>
</html>
