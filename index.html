<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your_Name</title>
    <!-- favicon link - replace YOUR_FAVICON_LINK with your favicon URL -->
    <link rel="icon" href="YOUR_FAVICON_LINK" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(145deg, #0a0a0f, #1a1a2e);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* main app container - NO BLUR */
        .app {
            max-width: 480px;
            margin: 0 auto;
            background: #0f0f17;
            min-height: 100vh;
            position: relative;
            border-left: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* animated gradient background - NO BLUR */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 50, 100, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(80, 200, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(200, 100, 255, 0.15) 0%, transparent 50%),
                linear-gradient(145deg, #0a0a0f, #1a1a2e);
            z-index: -1;
            animation: breathe 10s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* floating particles - CRISP */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            from { transform: translateY(100vh) translateX(0); }
            to { transform: translateY(-100vh) translateX(100px); }
        }

        /* header — NO BLUR, solid */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 1.8rem;
            background: #14141e;
            border-bottom: 1px solid rgba(255,100,200,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #fff, #a0a0ff, #ffa0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.02em;
            text-shadow: 0 0 20px rgba(255,160,255,0.3);
            cursor: pointer;
        }

        .logo i {
            font-size: 1.2rem;
            color: #ffa0ff;
            -webkit-text-fill-color: initial;
            background: none;
            filter: drop-shadow(0 0 8px #ffa0ff);
        }

        .hologram-btn {
            width: 48px;
            height: 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border-radius: 40px;
            background: #1e1e2a;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255,100,200,0.2);
        }

        .hologram-btn:hover {
            background: #2a2a3a;
            border-color: rgba(255,200,255,0.3);
            box-shadow: 0 0 25px rgba(255,100,255,0.4);
        }

        .hologram-btn .line {
            width: 22px;
            height: 2px;
            background: linear-gradient(90deg, #ffa0ff, #a0a0ff);
            border-radius: 4px;
            transition: 0.2s;
        }

        /* overlay — NO BLUR, solid color */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 200;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        /* sidebar — SOLID, NO BLUR */
        .sidebar {
            position: fixed;
            right: -360px;
            top: 0;
            width: 340px;
            height: 100%;
            background: #1a1a26;
            box-shadow: -25px 0 50px rgba(0,0,0,0.5);
            transition: right 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 300;
            padding: 2.2rem 1.5rem;
            border-left: 1px solid rgba(255,100,255,0.3);
        }

        .sidebar.active {
            right: 0;
        }

        .close-btn {
            text-align: right;
            margin-bottom: 1.5rem;
            cursor: pointer;
        }

        .close-btn i {
            font-size: 1.6rem;
            color: rgba(255,200,255,0.8);
            text-shadow: 0 0 15px #ffa0ff;
            transition: transform 0.3s;
        }

        .close-btn:hover i {
            transform: rotate(180deg) scale(1.1);
        }

        /* profile — SOLID */
        .profile {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(255,100,255,0.2);
            margin-bottom: 2rem;
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff50a0, #a050ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 0 30px rgba(255,100,255,0.5);
            animation: avatarPulse 3s infinite;
        }

        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(255,100,255,0.5); }
            50% { box-shadow: 0 0 50px rgba(100,200,255,0.8); }
        }

        .profile-text h3 {
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 0.2rem;
            background: linear-gradient(135deg, #fff, #ffa0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-text p {
            font-size: 0.8rem;
            color: rgba(200,200,255,0.7);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(100,100,255,0.5);
        }

        /* menu items — SOLID */
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding: 1.1rem 1.2rem;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            border-radius: 16px;
            margin: 0.5rem 0;
            transition: all 0.3s;
            background: #252535;
            border: 1px solid rgba(255,100,255,0.2);
            opacity: 0;
            transform: translateX(30px);
            animation: neonSlide 0.5s forwards;
            text-shadow: 0 0 8px rgba(255,255,255,0.3);
            cursor: pointer;
        }

        .sidebar a:nth-child(4) { animation-delay: 0.07s; }
        .sidebar a:nth-child(5) { animation-delay: 0.14s; }
        .sidebar a:nth-child(6) { animation-delay: 0.21s; }
        .sidebar a:nth-child(7) { animation-delay: 0.28s; }

        .sidebar a i {
            font-size: 1.4rem;
            width: 30px;
            color: #ffa0ff;
            filter: drop-shadow(0 0 8px #ffa0ff);
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #353549;
            border-color: rgba(255,100,255,0.5);
            transform: translateX(10px) scale(1.02);
            box-shadow: 0 0 30px rgba(255,100,255,0.3);
        }

        .sidebar a:hover i {
            color: #fff;
            filter: drop-shadow(0 0 12px #fff);
        }

        @keyframes neonSlide {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* main content — SOLID card */
        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 1.8rem;
            position: relative;
            z-index: 2;
        }

        /* neon loader - NO BLUR */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            z-index: 400;
        }

        .loader.active {
            opacity: 1;
            pointer-events: all;
        }

        .neon-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,100,255,0.2);
            border-top: 4px solid #ffa0ff;
            border-right: 4px solid #a0ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 30px rgba(255,100,255,0.5);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* cyber divider */
        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffa0ff, #a0ffff, transparent);
            margin: 1.5rem auto;
        }

        /* colorful particle variations */
        .particle:nth-child(1) { background: #ff50a0; left: 10%; animation-duration: 15s; }
        .particle:nth-child(2) { background: #50ffa0; left: 30%; animation-duration: 25s; width: 6px; height: 6px; }
        .particle:nth-child(3) { background: #a050ff; left: 50%; animation-duration: 20s; }
        .particle:nth-child(4) { background: #ffa050; left: 70%; animation-duration: 18s; width: 3px; height: 3px; }
        .particle:nth-child(5) { background: #50a0ff; left: 90%; animation-duration: 22s; }
        .particle:nth-child(6) { background: #ff50ff; left: 20%; animation-duration: 30s; width: 8px; height: 8px; }
    </style>
</head>
<body>
    <!-- animated background -->
    <div class="cyber-bg"></div>
    
    <!-- floating particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="app">
        <header>
            <div class="logo" onclick="go('/')">
                <i class="fa-regular fa-crystal"></i> Your_Name
            </div>
            <div class="hologram-btn" onclick="openMenu()">
                <div class="line"></div>
                <div class="line"></div>
            </div>
        </header>

        <!-- Overlay - SOLID BLACK -->
        <div class="overlay" id="overlay" onclick="closeMenu()"></div>

        <!-- Sidebar — SOLID, NO BLUR -->
        <div class="sidebar" id="sidebar">
            <div class="close-btn" onclick="closeMenu()">
                <i class="fa-regular fa-xmark"></i>
            </div>

            <div class="profile">
                <div class="avatar">
                    <i class="fa-regular fa-robot"></i>
                </div>
                <div class="profile-text">
                    <h3>YOUR_NAME</h3>
                    <p>Your_Title</p>
                </div>
            </div>

            <a onclick="go('/')">
                <i class="fa-regular fa-crystal"></i> HOLO HOME
            </a>
            <a onclick="go('/test')">
                <i class="fa-regular fa-flask"></i> TEST
            </a>
            <a onclick="go('/about')">
                <i class="fa-regular fa-atom"></i> QUANTUM
            </a>
            <a onclick="go('/orbit')">
                <i class="fa-regular fa-satellite"></i> ORBIT
            </a>

            <div class="divider"></div>

            <a onclick="go('/settings')">
                <i class="fa-regular fa-sliders"></i> SETTINGS
            </a>
        </div>

        <!-- Main Content - will be filled dynamically -->
        <div class="main" id="main">
            <!-- Initial content will be loaded by JavaScript -->
        </div>

        <!-- Loader - SOLID -->
        <div class="loader" id="loader">
            <div class="neon-spinner"></div>
        </div>
    </div>

    <script>
        let touchStartX = 0;

        function openMenu() {
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeMenu() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        // Show loader
        function showLoader() {
            document.getElementById('loader').classList.add('active');
        }

        // Hide loader
        function hideLoader() {
            document.getElementById('loader').classList.remove('active');
        }

        // Load page content via AJAX
        function loadPageContent(url) {
            showLoader();
            
            // Fetch the HTML file (with .html extension)
            const fetchUrl = url === '/' ? '/index.html' : url + '.html';
            
            fetch(fetchUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Page not found');
                    }
                    return response.text();
                })
                .then(html => {
                    // Extract the content from the fetched HTML
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const mainContent = doc.querySelector('.main');
                    
                    if (mainContent) {
                        document.getElementById('main').innerHTML = mainContent.innerHTML;
                    } else {
                        // If .main not found, try to get body content
                        const bodyContent = doc.body.querySelector('.main') || doc.body;
                        document.getElementById('main').innerHTML = bodyContent.innerHTML;
                    }
                    
                    // Update page title
                    const newTitle = doc.querySelector('title');
                    if (newTitle) {
                        document.title = newTitle.textContent;
                    } else {
                        document.title = 'Your_Name';
                    }
                    
                    hideLoader();
                })
                .catch(error => {
                    console.error('Error loading page:', error);
                    // Show error message
                    document.getElementById('main').innerHTML = `
                        <div class="card">
                            <h2>Error</h2>
                            <p>Page not found. Please try again.</p>
                            <div class="economy-chip">
                                <i class="fa-regular fa-circle-exclamation"></i> 404
                            </div>
                        </div>
                    `;
                    hideLoader();
                });
        }

        // Navigation function - updates URL without reload
        function go(path) {
            // Close menu if open
            closeMenu();
            
            // Update URL using pushState
            history.pushState({}, '', path);
            
            // Load the page content
            loadPageContent(path);
        }

        // Handle browser back/forward buttons
        window.addEventListener('popstate', () => {
            const currentPath = window.location.pathname;
            loadPageContent(currentPath);
        });

        // Initial load - render based on current URL
        const initialPath = window.location.pathname;
        loadPageContent(initialPath);

        // Swipe gestures
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            const diff = touchEndX - touchStartX;

            if (diff > 50) { // swipe right
                openMenu();
            } else if (diff < -50) { // swipe left
                closeMenu();
            }
        }, { passive: true });

        // Close menu with Escape key
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeMenu();
        });

        // Create more particles dynamically
        for (let i = 0; i < 10; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (15 + Math.random() * 20) + 's';
            particle.style.background = `hsl(${Math.random() * 360}, 100%, 70%)`;
            document.body.appendChild(particle);
        }
    </script>
</body>
</html>
