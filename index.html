<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your_Name</title>

    <link rel="icon" href="YOUR_FAVICON_LINK">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- ✅ CSS SAME (UNCHANGED) -->
    <!-- ⚠️ এখানে তোমার আগের সব CSS 그대로 রাখো -->
</head>

<body>

<!-- ✅ EVERYTHING SAME (UNCHANGED UI) -->
<!-- ⚠️ এখানে তোমার আগের পুরো HTML body 그대로 থাকবে -->

<script>

let touchStartX = 0;

// MENU
function openMenu() {
    document.getElementById('sidebar').classList.add('active');
    document.getElementById('overlay').classList.add('active');
}

function closeMenu() {
    document.getElementById('sidebar').classList.remove('active');
    document.getElementById('overlay').classList.remove('active');
}

// ✅ FIXED NAVIGATION (Bug 2 fix)
function go(page) {
    const loader = document.getElementById('loader');
    loader.classList.add('active');

    setTimeout(() => {
        if (page === 'home') {
            window.location.href = '/'; // index.html
        } else {
            window.location.href = page + '.html';
        }
    }, 600);
}

// ✅ FIX BUG 1 (Back button loader stuck)
window.addEventListener("pageshow", function () {
    document.getElementById('loader').classList.remove('active');
});

// extra safety
window.addEventListener("popstate", function () {
    document.getElementById('loader').classList.remove('active');
});

// SWIPE (UNCHANGED)
document.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
}, { passive: true });

document.addEventListener('touchend', e => {
    const touchEndX = e.changedTouches[0].screenX;
    const diff = touchEndX - touchStartX;

    if (diff > 50) openMenu();
    else if (diff < -50) closeMenu();
}, { passive: true });

// ESC CLOSE
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeMenu();
});

// PARTICLES (UNCHANGED)
for (let i = 0; i < 10; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDuration = (15 + Math.random() * 20) + 's';
    particle.style.background = `hsl(${Math.random() * 360}, 100%, 70%)`;
    document.body.appendChild(particle);
}

</script>

</body>
</html>
